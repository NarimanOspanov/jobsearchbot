<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
        --switch-off: #3d4660;
        --switch-on: #4f7cff;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px 16px 84px; display: grid; gap: 16px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
      h1, h2 { margin: 0 0 12px; }
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
      .row:last-child { border-bottom: none; }
      .muted { color: var(--muted); }
      input, select, button {
        width: 100%; border-radius: 8px; border: 1px solid var(--border); background: #0f1730; color: var(--text); padding: 10px; font: inherit;
      }
      button { cursor: pointer; background: var(--accent); border-color: var(--accent); font-weight: 600; }
      .switch {
        position: relative; width: 52px; height: 32px; appearance: none; background: var(--switch-off);
        border-radius: 999px; border: none; outline: none; transition: background 0.2s ease;
      }
      .switch::before {
        content: ''; position: absolute; width: 26px; height: 26px; border-radius: 50%;
        top: 3px; left: 3px; background: #fff; transition: transform 0.2s ease;
      }
      .switch:checked { background: var(--switch-on); }
      .switch:checked::before { transform: translateX(20px); }
      .field { margin-bottom: 10px; }
      .bottom-nav {
        position: fixed; left: 0; right: 0; bottom: 0; background: #0f1730; border-top: 1px solid var(--border);
        display: flex; justify-content: flex-start; gap: 10px; padding: 10px 12px;
      }
      .nav-item { color: var(--muted); text-decoration: none; padding: 8px 12px; border-radius: 10px; border: 1px solid transparent; }
      .nav-item.active { color: var(--text); border-color: var(--border); background: #151f3c; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Profile</h1>

      <section class="card">
        <h2>User</h2>
        <div class="row"><span>Telegram</span><span id="profileUser" class="muted">loading...</span></div>
        <div class="row"><span>Chat ID</span><span id="profileChatId" class="muted">loading...</span></div>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <div class="row"><span>HeadHunter</span><input id="hhEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>LinkedIn</span><input id="linkedInEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Indeed</span><input id="indeedEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Company sites</span><input id="companySitesEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Email founders</span><input id="emailFoundersEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Email recruiters</span><input id="emailRecruitersEnabled" class="switch" type="checkbox" /></div>

        <div class="field">
          <label for="searchMode">Search mode</label>
          <select id="searchMode">
            <option value="not_urgent">not urgently</option>
            <option value="urgent">urgently</option>
          </select>
        </div>
        <div class="field">
          <label for="minimumSalary">Minimum salary</label>
          <input id="minimumSalary" type="number" min="0" step="1" placeholder="e.g. 3000" />
        </div>
        <button id="saveSettingsBtn">Save settings</button>
        <p id="saveStatus" class="muted"></p>
      </section>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="/app/applications">Applications</a>
      <a class="nav-item active" href="/app/profile">Profile</a>
    </nav>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      async function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        const response = await fetch(path, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function readSettings() {
        return {
          hhEnabled: document.getElementById('hhEnabled').checked,
          linkedInEnabled: document.getElementById('linkedInEnabled').checked,
          indeedEnabled: document.getElementById('indeedEnabled').checked,
          companySitesEnabled: document.getElementById('companySitesEnabled').checked,
          emailFoundersEnabled: document.getElementById('emailFoundersEnabled').checked,
          emailRecruitersEnabled: document.getElementById('emailRecruitersEnabled').checked,
          searchMode: document.getElementById('searchMode').value,
          minimumSalary: document.getElementById('minimumSalary').value,
        };
      }

      function applyProfile(profile) {
        document.getElementById('profileUser').textContent = profile.telegramUserName ? `@${profile.telegramUserName}` : '(no username)';
        document.getElementById('profileChatId').textContent = profile.telegramChatId;
        const s = profile.settings || {};
        document.getElementById('hhEnabled').checked = !!s.hhEnabled;
        document.getElementById('linkedInEnabled').checked = !!s.linkedInEnabled;
        document.getElementById('indeedEnabled').checked = !!s.indeedEnabled;
        document.getElementById('companySitesEnabled').checked = !!s.companySitesEnabled;
        document.getElementById('emailFoundersEnabled').checked = !!s.emailFoundersEnabled;
        document.getElementById('emailRecruitersEnabled').checked = !!s.emailRecruitersEnabled;
        document.getElementById('searchMode').value = s.searchMode || 'not_urgent';
        document.getElementById('minimumSalary').value = s.minimumSalary ?? '';
      }

      async function loadProfile() {
        const profile = await api('/api/app/profile');
        applyProfile(profile);
      }

      document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
        const statusEl = document.getElementById('saveStatus');
        statusEl.textContent = 'Saving...';
        try {
          await api('/api/app/profile/settings', { method: 'PATCH', body: JSON.stringify(readSettings()) });
          statusEl.textContent = 'Saved';
        } catch (err) {
          statusEl.textContent = `Failed: ${err.message}`;
        }
      });

      loadProfile().catch((err) => alert(`Failed to load profile: ${err.message}`));
    </script>
  </body>
</html>
