<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #111111;
        --card: #1a1a1a;
        --text: #f0f0f0;
        --muted: #888888;
        --accent: #e0e0e0;
        --border: #2e2e2e;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px; display: grid; gap: 16px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
      h1, h2 { margin: 0 0 12px; }
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
      .row:last-child { border-bottom: none; }
      .row-stack { display: grid; gap: 4px; flex: 1; min-width: 0; }
      .row-title { font-weight: 600; }
      .row-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }
      .muted { color: var(--muted); }
      .bad { color: #ef4444; font-size: 13px; margin-top: 8px; }
      .hidden { display: none !important; }
      .toggle {
        position: relative;
        width: 48px;
        height: 28px;
        flex-shrink: 0;
        border: none;
        padding: 0;
        border-radius: 999px;
        background: #333333;
        cursor: pointer;
        transition: background 0.2s;
      }
      .toggle::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #888888;
        transition: transform 0.2s;
      }
      .toggle.on { background: #3a3a3a; }
      .toggle.on::after { transform: translateX(20px); background: #f0f0f0; }
      .toggle:disabled { opacity: 0.5; cursor: not-allowed; }
      .field { display: grid; gap: 8px; padding: 12px 0; border-bottom: 1px solid var(--border); }
      .field:last-of-type { border-bottom: none; }
      .field-label { font-weight: 600; }
      .field-hint { font-size: 13px; color: var(--muted); line-height: 1.4; margin: 0; }
      select {
        width: 100%;
        background: #161616;
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }
      select:focus { outline: 1px solid #444444; border-color: #444444; }
      .skills-picker { position: relative; width: 100%; }
      .skills-picker-btn {
        width: 100%;
        text-align: left;
        background: #161616;
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .skills-picker-menu {
        display: none;
        position: absolute;
        z-index: 20;
        left: 0;
        right: 0;
        margin-top: 6px;
        max-height: 240px;
        overflow: auto;
        background: #161616;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
      }
      .skills-picker-menu.open { display: block; }
      .skills-group { margin-bottom: 10px; }
      .skills-group:last-child { margin-bottom: 0; }
      .skills-group-title {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 6px;
        font-weight: 600;
      }
      .skill-check {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 4px;
        font-size: 14px;
        cursor: pointer;
      }
      .ok { color: #22c55e; font-size: 13px; margin-top: 8px; }
      button {
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--accent);
        border-color: var(--accent);
        color: #111111;
        padding: 8px 12px;
        font: inherit;
      }
      button:focus-visible { outline: 1px solid #444444; }
      input[type="checkbox"], input[type="radio"] { accent-color: #888888; }
      .ghost-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .resume-file-input { display: none; }
      .resume-file-picker {
        display: block;
        border: 1px dashed #444444;
        border-radius: 10px;
        min-height: 72px;
        padding: 12px;
        text-align: center;
        background: #161616;
        color: var(--muted);
        cursor: pointer;
      }
      .resume-file-picker:hover { border-color: #666666; color: var(--text); }
      .resume-file-picker-name { margin-top: 6px; font-size: 12px; }
      .resume-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .resume-actions button { flex: 1; min-width: 120px; }
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.7);
        display: none; align-items: center; justify-content: center; z-index: 9999;
      }
      .modal-backdrop.on { display: flex; }
      .modal-card {
        width: min(1100px, 95vw); height: min(85vh, 900px); background: #111111;
        border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: grid;
        grid-template-rows: auto 1fr;
      }
      .modal-head {
        display: flex; justify-content: space-between; align-items: center; gap: 8px;
        padding: 8px 10px; border-bottom: 1px solid var(--border);
      }
      .modal-body iframe { width: 100%; height: 100%; border: 0; background: #fff; }
      .loader {
        display: none;
        width: 16px;
        height: 16px;
        margin-top: 8px;
        border: 2px solid rgba(150, 150, 150, 0.3);
        border-top-color: #888888;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader.on { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

  </head>
  <body>
    <div class="wrap">
      <h1 id="pageTitle">Profile</h1>

      <section class="card">
        <h2 id="userSectionTitle">User</h2>
        <div class="row"><span id="telegramLabel">Telegram</span><span id="profileUser" class="muted">loading...</span></div>
        <div class="row"><span id="chatIdLabel">Chat ID</span><span id="profileChatId" class="muted">loading...</span></div>
      </section>

      <section class="card">
        <h2 id="resumeSectionTitle">Resume</h2>
        <p id="resumeStatus" class="field-hint">No resume uploaded yet.</p>
        <div class="resume-actions">
          <button id="viewResumeBtn" type="button" class="ghost-btn" disabled>View resume</button>
        </div>
        <div class="field" style="padding-bottom:0;border-bottom:none">
          <input id="resumeFileInput" class="resume-file-input" type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" />
          <label for="resumeFileInput" id="resumeFilePickerLabel" class="resume-file-picker">
            <div>
              <div id="resumePickerTitle">Tap to choose a file</div>
              <div class="resume-file-picker-name">PDF/JPG/PNG/WEBP — up to 15 MB</div>
            </div>
          </label>
          <button id="uploadResumeBtn" type="button" disabled style="width:100%;margin-top:10px">Upload resume</button>
          <span id="uploadResumeLoader" class="loader" aria-hidden="true"></span>
          <p id="resumeUploadMsg" class="bad hidden" role="alert"></p>
        </div>
      </section>

      <section class="card">
        <h2 id="notificationsSectionTitle">Notifications</h2>
        <div class="row">
          <div class="row-stack">
            <span id="pushNotificationsLabel" class="row-title">Push notifications</span>
            <span id="pushNotificationsDesc" class="row-desc">Receive job updates and service announcements</span>
          </div>
          <button
            id="pushNotificationsToggle"
            type="button"
            class="toggle on"
            role="switch"
            aria-checked="true"
            aria-labelledby="pushNotificationsLabel"
          ></button>
        </div>
        <p id="pushNotificationsMsg" class="bad hidden" role="alert"></p>
      </section>

      <section class="card">
        <h2 id="jobSearchSectionTitle">Job search</h2>

        <div class="field">
          <span id="searchModeLabel" class="field-label">Search mode</span>
          <select id="searchModeSel" aria-labelledby="searchModeLabel">
            <option value="not_urgent">Not urgent</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>

        <div class="field">
          <span id="skillsLabel" class="field-label">Skills</span>
          <p id="skillsHint" class="field-hint">Roles used to personalize job recommendations</p>
          <div class="skills-picker">
            <button id="skillPickerBtn" type="button" class="skills-picker-btn">All roles</button>
            <div id="skillPickerMenu" class="skills-picker-menu" role="listbox" aria-multiselectable="true"></div>
          </div>
        </div>

        <div class="field">
          <span id="workAuthLabel" class="field-label">Work authorization countries</span>
          <div class="skills-picker">
            <button id="countryPickerBtn" type="button" class="skills-picker-btn">Not specified</button>
            <div id="countryPickerMenu" class="skills-picker-menu" role="listbox" aria-multiselectable="true"></div>
          </div>
        </div>

        <p id="jobPrefsMsg" class="bad hidden" role="alert"></p>
      </section>

      <section id="jobSearchSettings" class="card hidden" aria-hidden="true"></section>
    </div>

    <div id="cvModal" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <strong id="cvModalTitle">Resume</strong>
          <button id="cvModalClose" type="button" class="ghost-btn">Close</button>
        </div>
        <div class="modal-body">
          <iframe id="cvModalFrame" title="Resume preview"></iframe>
        </div>
      </div>
    </div>

    <script src="/app/tma-i18n.js"></script>
    <script src="/app/seeker-jobs-i18n.js"></script>
    <script src="/app/tma-bottom-nav.js"></script>
    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      const I18N = {
        ru: {
          pageTitle: 'Профиль',
          userSection: 'Пользователь',
          notificationsSection: 'Уведомления',
          pushNotifications: 'Push-уведомления',
          pushNotificationsDesc: 'Получать рассылки о вакансиях и новостях сервиса',
          telegram: 'Telegram',
          chatId: 'Chat ID',
          loading: 'загрузка...',
          noUsername: '(без username)',
          loadError: 'Не удалось загрузить профиль',
          saveError: 'Не удалось сохранить настройку',
          resumeSection: 'Резюме',
          resumeNone: 'Резюме ещё не загружено.',
          viewResume: 'Открыть резюме',
          pickFile: 'Нажмите, чтобы выбрать файл',
          fileSelected: 'Выбран файл',
          uploadResume: 'Загрузить резюме',
          resumeUploadOk: 'Резюме обновлено',
          errPickFile: 'Выберите файл',
          errFileSize: 'Файл больше 15 MB',
          errFileType: 'Поддерживаются PDF, JPG, PNG, WEBP',
          errUploadResume: 'Не удалось загрузить резюме',
          jobSearchSection: 'Поиск работы',
          searchModeLabel: 'Режим поиска',
          searchModeNotUrgent: 'Не срочный',
          searchModeUrgent: 'Срочный',
          skillsLabel: 'Навыки',
          skillsHint: 'Роли для персонализации подбора вакансий',
          allRoles: 'Все роли',
          rolesSelected: 'Выбрано: {count}',
          workAuthLabel: 'Страны с разрешением на работу',
          workAuthAny: 'Не указано',
          workAuthSelected: 'Выбрано: {count}',
          savedJobPrefs: 'Сохранено',
        },
        en: {
          pageTitle: 'Profile',
          userSection: 'User',
          notificationsSection: 'Notifications',
          pushNotifications: 'Push notifications',
          pushNotificationsDesc: 'Receive job updates and service announcements',
          telegram: 'Telegram',
          chatId: 'Chat ID',
          loading: 'loading...',
          noUsername: '(no username)',
          loadError: 'Failed to load profile',
          saveError: 'Failed to save setting',
          resumeSection: 'Resume',
          resumeNone: 'No resume uploaded yet.',
          viewResume: 'View resume',
          pickFile: 'Tap to choose a file',
          fileSelected: 'File selected',
          uploadResume: 'Upload resume',
          resumeUploadOk: 'Resume updated',
          errPickFile: 'Choose a file first',
          errFileSize: 'File is larger than 15 MB',
          errFileType: 'Use PDF, JPG, PNG, or WEBP',
          errUploadResume: 'Failed to upload resume',
          jobSearchSection: 'Job search',
          searchModeLabel: 'Search mode',
          searchModeNotUrgent: 'Not urgent',
          searchModeUrgent: 'Urgent',
          skillsLabel: 'Skills',
          skillsHint: 'Roles used to personalize job recommendations',
          allRoles: 'All roles',
          rolesSelected: '{count} selected',
          workAuthLabel: 'Work authorization countries',
          workAuthAny: 'Not specified',
          workAuthSelected: '{count} selected',
          savedJobPrefs: 'Saved',
        },
      };

      let pushNotificationsEnabled = true;
      let isSavingPush = false;
      let isSavingJobPrefs = false;
      let isApplyingProfile = false;
      let jobPrefsSaveTimer = null;
      let isSkillPickerOpen = false;
      let isCountryPickerOpen = false;
      let skillsCatalog = [];
      let uiLang = 'en';
      let currentResumeUrl = '';
      let isUploadingResume = false;

      function telegramLang() {
        const code = String(tg?.initDataUnsafe?.user?.language_code || '').toLowerCase();
        return code === 'ru' || code.startsWith('ru-') ? 'ru' : 'en';
      }

      function fmt(template, params = {}) {
        return String(template).replace(/\{(\w+)\}/g, (_, key) => String(params[key] ?? ''));
      }

      function esc(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function attrEsc(value) {
        return esc(value).replace(/'/g, '&#39;');
      }

      function strings(lang) {
        return I18N[lang === 'ru' ? 'ru' : 'en'];
      }

      function applyLocale(lang) {
        const s = strings(lang);
        document.documentElement.lang = lang;
        document.title = s.pageTitle;
        document.getElementById('pageTitle').textContent = s.pageTitle;
        document.getElementById('userSectionTitle').textContent = s.userSection;
        document.getElementById('resumeSectionTitle').textContent = s.resumeSection;
        document.getElementById('viewResumeBtn').textContent = s.viewResume;
        document.getElementById('uploadResumeBtn').textContent = s.uploadResume;
        document.getElementById('notificationsSectionTitle').textContent = s.notificationsSection;
        document.getElementById('pushNotificationsLabel').textContent = s.pushNotifications;
        document.getElementById('pushNotificationsDesc').textContent = s.pushNotificationsDesc;
        document.getElementById('telegramLabel').textContent = s.telegram;
        document.getElementById('chatIdLabel').textContent = s.chatId;
        document.getElementById('jobSearchSectionTitle').textContent = s.jobSearchSection;
        document.getElementById('searchModeLabel').textContent = s.searchModeLabel;
        renderSearchModeOptions();
        document.getElementById('skillsLabel').textContent = s.skillsLabel;
        document.getElementById('skillsHint').textContent = s.skillsHint;
        document.getElementById('workAuthLabel').textContent = s.workAuthLabel;
        renderSkillPickerSummary();
        renderCountryPickerSummary();
        renderResumeUi();
        const profileUser = document.getElementById('profileUser');
        if (profileUser.dataset.noUsername === '1') {
          profileUser.textContent = s.noUsername;
        }
      }

      function setJobPrefsMsg(text, isOk = false) {
        const el = document.getElementById('jobPrefsMsg');
        if (!text) {
          el.textContent = '';
          el.className = 'bad hidden';
          return;
        }
        el.textContent = text;
        el.className = isOk ? 'ok' : 'bad';
        el.classList.remove('hidden');
      }

      function getSelectedSkillIds() {
        const checked = document.querySelectorAll('#skillPickerMenu input[type="checkbox"]:checked');
        return [...checked]
          .map((opt) => Number.parseInt(String(opt.value || ''), 10))
          .filter((id) => Number.isSafeInteger(id) && id > 0);
      }

      function applySelectedSkillIds(ids) {
        const selected = new Set((Array.isArray(ids) ? ids : []).map((id) => String(id)));
        document.querySelectorAll('#skillPickerMenu input[type="checkbox"]').forEach((opt) => {
          opt.checked = selected.has(String(opt.value));
        });
        renderSkillPickerSummary();
      }

      function renderSkillPickerSummary() {
        const btn = document.getElementById('skillPickerBtn');
        const ids = getSelectedSkillIds();
        const s = strings(uiLang);
        btn.textContent = ids.length ? fmt(s.rolesSelected, { count: ids.length }) : s.allRoles;
      }

      function renderSkillPickerOptions() {
        const menu = document.getElementById('skillPickerMenu');
        const grouped = new Map();
        for (const item of skillsCatalog) {
          const roleName = String(item.roleName || item.RoleName || '').trim() || (uiLang === 'ru' ? 'Другое' : 'Other');
          const skillName = String(item.name || item.Name || item.id || '').trim() || String(item.id);
          if (!grouped.has(roleName)) grouped.set(roleName, []);
          grouped.get(roleName).push({ id: item.id, name: skillName });
        }
        menu.innerHTML = [...grouped.entries()]
          .sort(([a], [b]) => a.localeCompare(b))
          .map(([roleName, items]) => {
            const optionsHtml = items
              .sort((a, b) => a.name.localeCompare(b.name))
              .map(
                (row) =>
                  `<label class="skill-check"><input type="checkbox" value="${attrEsc(row.id)}" />${esc(row.name)}</label>`
              )
              .join('');
            return `<div class="skills-group"><div class="skills-group-title">${esc(roleName)}</div>${optionsHtml}</div>`;
          })
          .join('');
      }

      function getSelectedCountriesCsv() {
        return SeekerJobsI18n.getWorkAuthCountriesCsv(document.getElementById('countryPickerMenu'));
      }

      function applySelectedCountriesCsv(csv) {
        SeekerJobsI18n.applyWorkAuthCountriesCsv(document.getElementById('countryPickerMenu'), csv);
        renderCountryPickerSummary();
      }

      function renderCountryPickerOptions(selectedCsv = '') {
        SeekerJobsI18n.renderWorkAuthCountryMenu(
          document.getElementById('countryPickerMenu'),
          uiLang,
          selectedCsv,
          esc,
          attrEsc
        );
        renderCountryPickerSummary();
      }

      function renderCountryPickerSummary() {
        const btn = document.getElementById('countryPickerBtn');
        const csv = getSelectedCountriesCsv();
        const count = csv ? csv.split(',').filter(Boolean).length : 0;
        btn.textContent = SeekerJobsI18n.workAuthPickerSummary(uiLang, count);
      }

      function getSearchMode() {
        const sel = document.getElementById('searchModeSel');
        const value = String(sel?.value || '').trim();
        return value === 'urgent' ? 'urgent' : 'not_urgent';
      }

      function applySearchMode(mode) {
        const sel = document.getElementById('searchModeSel');
        if (!sel) return;
        sel.value = String(mode || '').trim() === 'urgent' ? 'urgent' : 'not_urgent';
      }

      function renderSearchModeOptions() {
        const sel = document.getElementById('searchModeSel');
        if (!sel) return;
        const s = strings(uiLang);
        const current = getSearchMode();
        sel.innerHTML = `
          <option value="not_urgent">${esc(s.searchModeNotUrgent)}</option>
          <option value="urgent">${esc(s.searchModeUrgent)}</option>
        `;
        sel.value = current;
      }

      function openSkillPicker() {
        isSkillPickerOpen = true;
        document.getElementById('skillPickerMenu').classList.add('open');
      }

      function closeSkillPicker() {
        isSkillPickerOpen = false;
        document.getElementById('skillPickerMenu').classList.remove('open');
      }

      function openCountryPicker() {
        isCountryPickerOpen = true;
        document.getElementById('countryPickerMenu').classList.add('open');
      }

      function closeCountryPicker() {
        isCountryPickerOpen = false;
        document.getElementById('countryPickerMenu').classList.remove('open');
      }

      async function loadSkillsCatalog() {
        const payload = await api('/api/admin/skills');
        skillsCatalog = payload.skills || payload || [];
        renderSkillPickerOptions();
      }

      function setJobPrefsControlsDisabled(disabled) {
        document.getElementById('skillPickerBtn').disabled = disabled;
        document.getElementById('countryPickerBtn').disabled = disabled;
        document.getElementById('searchModeSel').disabled = disabled;
        document.querySelectorAll('#skillPickerMenu input, #countryPickerMenu input').forEach((el) => {
          el.disabled = disabled;
        });
      }

      function scheduleJobPreferencesSave() {
        if (isApplyingProfile) return;
        clearTimeout(jobPrefsSaveTimer);
        jobPrefsSaveTimer = setTimeout(() => {
          saveJobPreferences().catch(() => {});
        }, 350);
      }

      async function saveJobPreferences() {
        if (isSavingJobPrefs) return;
        isSavingJobPrefs = true;
        setJobPrefsControlsDisabled(true);
        setJobPrefsMsg('');
        try {
          const result = await api('/api/app/profile/settings', {
            method: 'PATCH',
            body: JSON.stringify({
              skills: getSelectedSkillIds(),
              workAuthorizationCountries: getSelectedCountriesCsv(),
              searchMode: getSearchMode(),
            }),
          });
          isApplyingProfile = true;
          applySelectedSkillIds(result?.skills || []);
          applySelectedCountriesCsv(result?.workAuthorizationCountries || '');
          applySearchMode(result?.settings?.searchMode || 'not_urgent');
          isApplyingProfile = false;
          setJobPrefsMsg(strings(uiLang).savedJobPrefs, true);
          setTimeout(() => setJobPrefsMsg(''), 2000);
        } catch (err) {
          setJobPrefsMsg(`${strings(uiLang).saveError}: ${err.message}`);
        } finally {
          isSavingJobPrefs = false;
          setJobPrefsControlsDisabled(false);
        }
      }

      function setResumeMsg(text, isOk = false) {
        const el = document.getElementById('resumeUploadMsg');
        if (!text) {
          el.textContent = '';
          el.className = 'bad hidden';
          return;
        }
        el.textContent = text;
        el.className = isOk ? 'ok' : 'bad';
        el.classList.remove('hidden');
      }

      function onLoading(id, on) {
        const el = document.getElementById(id);
        if (el) el.className = on ? 'loader on' : 'loader';
      }

      function attachMiniAppAuthHeaders(headers) {
        const data = String(tg?.initData || '').trim();
        if (data) {
          headers['x-init-data'] = data;
          headers.Authorization = `tma ${data}`;
        }
      }

      function renderResumeUi() {
        const s = strings(uiLang);
        const status = document.getElementById('resumeStatus');
        const viewBtn = document.getElementById('viewResumeBtn');
        if (currentResumeUrl) {
          status.textContent = '';
          status.classList.add('hidden');
          viewBtn.disabled = false;
        } else {
          status.textContent = s.resumeNone;
          status.classList.remove('hidden');
          viewBtn.disabled = true;
        }
        refreshResumeFileUi();
      }

      function refreshResumeFileUi() {
        const s = strings(uiLang);
        const input = document.getElementById('resumeFileInput');
        const uploadBtn = document.getElementById('uploadResumeBtn');
        const picker = document.getElementById('resumeFilePickerLabel');
        const pickerTitle = document.getElementById('resumePickerTitle');
        const file = input?.files?.[0] || null;
        if (!file) {
          if (uploadBtn) uploadBtn.disabled = true;
          if (pickerTitle) pickerTitle.textContent = s.pickFile;
          return;
        }
        if (uploadBtn) uploadBtn.disabled = isUploadingResume;
        if (pickerTitle) pickerTitle.textContent = s.fileSelected;
        if (picker) {
          picker.innerHTML = `<div><div>${esc(s.fileSelected)}</div><div class="resume-file-picker-name">${esc(file.name)}</div></div>`;
        }
      }

      function openCvModal(url) {
        document.getElementById('cvModalTitle').textContent = strings(uiLang).viewResume;
        document.getElementById('cvModalFrame').src = url || 'about:blank';
        document.getElementById('cvModal').classList.add('on');
      }

      function closeCvModal() {
        document.getElementById('cvModal').classList.remove('on');
        document.getElementById('cvModalFrame').src = 'about:blank';
      }

      async function uploadResumeFromUi() {
        const fileInput = document.getElementById('resumeFileInput');
        const file = fileInput?.files?.[0];
        if (!file) throw new Error(strings(uiLang).errPickFile);
        if (file.size > 15 * 1024 * 1024) throw new Error(strings(uiLang).errFileSize);
        const allowedTypes = ['application/pdf', 'image/png', 'image/jpeg', 'image/webp'];
        if (!allowedTypes.includes(file.type)) throw new Error(strings(uiLang).errFileType);

        isUploadingResume = true;
        refreshResumeFileUi();
        onLoading('uploadResumeLoader', true);
        setResumeMsg('');
        try {
          const resolveExtension = () => {
            const name = String(file.name || '').toLowerCase();
            const extMatch = name.match(/\.([a-z0-9]+)$/);
            if (extMatch?.[1]) return extMatch[1];
            if (file.type === 'application/pdf') return 'pdf';
            if (file.type === 'image/png') return 'png';
            if (file.type === 'image/webp') return 'webp';
            return 'jpg';
          };
          const headers = {
            'Content-Type': 'application/octet-stream',
            'x-file-name': `resume-${Date.now()}.${resolveExtension()}`,
            'x-file-type': file.type || 'application/octet-stream',
          };
          attachMiniAppAuthHeaders(headers);
          const response = await fetch('/api/app/profile/resume-upload', {
            method: 'POST',
            headers,
            body: await file.arrayBuffer(),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(typeof payload?.error === 'string' ? payload.error : strings(uiLang).errUploadResume);
          }
          currentResumeUrl = String(payload?.resumeUrl || '').trim();
          if (!currentResumeUrl) throw new Error(strings(uiLang).errUploadResume);
          fileInput.value = '';
          renderResumeUi();
          setResumeMsg(strings(uiLang).resumeUploadOk, true);
          setTimeout(() => setResumeMsg(''), 2000);
        } finally {
          isUploadingResume = false;
          onLoading('uploadResumeLoader', false);
          refreshResumeFileUi();
        }
      }

      function setPushMsg(text) {
        const el = document.getElementById('pushNotificationsMsg');
        if (!text) {
          el.textContent = '';
          el.classList.add('hidden');
          return;
        }
        el.textContent = text;
        el.classList.remove('hidden');
      }

      function renderPushToggle() {
        const btn = document.getElementById('pushNotificationsToggle');
        btn.classList.toggle('on', pushNotificationsEnabled);
        btn.setAttribute('aria-checked', pushNotificationsEnabled ? 'true' : 'false');
        btn.disabled = isSavingPush;
      }

      async function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        const response = await fetch(path, { ...options, headers });
        if (!response.ok) {
          const body = await response.text();
          let message = body;
          try {
            const parsed = JSON.parse(body);
            message = parsed.error || body;
          } catch {
            // keep raw body
          }
          throw new Error(message);
        }
        return response.json();
      }

      async function savePushNotifications(enabled) {
        isSavingPush = true;
        renderPushToggle();
        setPushMsg('');
        try {
          const result = await api('/api/app/profile/settings', {
            method: 'PATCH',
            body: JSON.stringify({ pushNotificationsEnabled: enabled }),
          });
          pushNotificationsEnabled = result?.settings?.pushNotificationsEnabled !== false;
        } finally {
          isSavingPush = false;
          renderPushToggle();
        }
      }

      function applyProfile(profile) {
        uiLang = telegramLang();
        const lang = uiLang;
        const s = strings(lang);
        const profileUser = document.getElementById('profileUser');
        if (profile.telegramUserName) {
          profileUser.textContent = `@${profile.telegramUserName}`;
          profileUser.dataset.noUsername = '0';
        } else {
          profileUser.textContent = s.noUsername;
          profileUser.dataset.noUsername = '1';
        }
        document.getElementById('profileChatId').textContent = profile.telegramChatId;
        currentResumeUrl = String(profile?.resumeUrl || '').trim();
        pushNotificationsEnabled = profile?.settings?.pushNotificationsEnabled !== false;
        isApplyingProfile = true;
        applySelectedSkillIds(profile?.skills || []);
        renderCountryPickerOptions(profile?.workAuthorizationCountries || '');
        applySearchMode(profile?.settings?.searchMode || 'not_urgent');
        isApplyingProfile = false;
        renderPushToggle();
        applyLocale(lang);
        TmaBottomNav.mount({ active: 'profile', lang });
      }

      document.getElementById('viewResumeBtn').addEventListener('click', () => {
        if (currentResumeUrl) openCvModal(currentResumeUrl);
      });
      document.getElementById('cvModalClose').addEventListener('click', closeCvModal);
      document.getElementById('cvModal').addEventListener('click', (event) => {
        if (event.target.id === 'cvModal') closeCvModal();
      });
      document.getElementById('resumeFileInput').addEventListener('change', refreshResumeFileUi);
      document.getElementById('uploadResumeBtn').addEventListener('click', () => {
        uploadResumeFromUi().catch((err) => setResumeMsg(err.message));
      });

      document.getElementById('pushNotificationsToggle').addEventListener('click', async () => {
        if (isSavingPush) return;
        const next = !pushNotificationsEnabled;
        try {
          await savePushNotifications(next);
        } catch (err) {
          renderPushToggle();
          setPushMsg(`${strings(telegramLang()).saveError}: ${err.message}`);
        }
      });

      document.getElementById('searchModeSel').addEventListener('change', () => {
        scheduleJobPreferencesSave();
      });
      document.getElementById('skillPickerBtn').addEventListener('click', () => {
        if (isSkillPickerOpen) closeSkillPicker();
        else openSkillPicker();
      });
      document.getElementById('skillPickerMenu').addEventListener('change', () => {
        renderSkillPickerSummary();
        scheduleJobPreferencesSave();
      });
      document.getElementById('countryPickerBtn').addEventListener('click', () => {
        if (isCountryPickerOpen) closeCountryPicker();
        else openCountryPicker();
      });
      document.getElementById('countryPickerMenu').addEventListener('change', () => {
        renderCountryPickerSummary();
        scheduleJobPreferencesSave();
      });
      document.addEventListener('click', (event) => {
        const picker = event.target.closest('.skills-picker');
        if (!picker) {
          if (isSkillPickerOpen) closeSkillPicker();
          if (isCountryPickerOpen) closeCountryPicker();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (isSkillPickerOpen) closeSkillPicker();
          if (isCountryPickerOpen) closeCountryPicker();
        }
      });

      async function loadProfile() {
        uiLang = telegramLang();
        await loadSkillsCatalog();
        const profile = await api('/api/app/profile');
        applyProfile(profile);
      }

      loadProfile().catch((err) => {
        alert(`${strings(telegramLang()).loadError}: ${err.message}`);
      });
    </script>
  </body>
</html>
