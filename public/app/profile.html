<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px; display: grid; gap: 16px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
      h1, h2 { margin: 0 0 12px; }
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
      .row:last-child { border-bottom: none; }
      .muted { color: var(--muted); }
      .hidden { display: none !important; }
    </style>
  <!-- Yandex.Metrika counter -->

    (function(m,e,t,r,i,k,a){
      m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
      m[i].l=1*new Date();

      k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a);

    ym(108983922, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
  </script>
  <!-- /Yandex.Metrika counter -->
  </head>
  <body>
    <div class="wrap">
      <h1 id="pageTitle">Profile</h1>

      <section class="card">
        <h2 id="userSectionTitle">User</h2>
        <div class="row"><span id="telegramLabel">Telegram</span><span id="profileUser" class="muted">loading...</span></div>
        <div class="row"><span id="chatIdLabel">Chat ID</span><span id="profileChatId" class="muted">loading...</span></div>
      </section>

      <section id="jobSearchSettings" class="card hidden" aria-hidden="true"></section>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      const I18N = {
        ru: {
          pageTitle: 'Профиль',
          userSection: 'Пользователь',
          telegram: 'Telegram',
          chatId: 'Chat ID',
          loading: 'загрузка...',
          noUsername: '(без username)',
          loadError: 'Не удалось загрузить профиль',
        },
        en: {
          pageTitle: 'Profile',
          userSection: 'User',
          telegram: 'Telegram',
          chatId: 'Chat ID',
          loading: 'loading...',
          noUsername: '(no username)',
          loadError: 'Failed to load profile',
        },
      };

      function telegramLang() {
        const code = String(tg?.initDataUnsafe?.user?.language_code || '').toLowerCase();
        return code === 'ru' || code.startsWith('ru-') ? 'ru' : 'en';
      }

      function t(lang) {
        return I18N[lang === 'ru' ? 'ru' : 'en'];
      }

      function applyLocale(lang) {
        const strings = t(lang);
        document.documentElement.lang = lang;
        document.title = strings.pageTitle;
        document.getElementById('pageTitle').textContent = strings.pageTitle;
        document.getElementById('userSectionTitle').textContent = strings.userSection;
        document.getElementById('telegramLabel').textContent = strings.telegram;
        document.getElementById('chatIdLabel').textContent = strings.chatId;
        const profileUser = document.getElementById('profileUser');
        if (profileUser.dataset.noUsername === '1') {
          profileUser.textContent = strings.noUsername;
        }
      }

      async function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        const response = await fetch(path, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function applyProfile(profile) {
        const lang = telegramLang();
        const strings = t(lang);
        const profileUser = document.getElementById('profileUser');
        if (profile.telegramUserName) {
          profileUser.textContent = `@${profile.telegramUserName}`;
          profileUser.dataset.noUsername = '0';
        } else {
          profileUser.textContent = strings.noUsername;
          profileUser.dataset.noUsername = '1';
        }
        document.getElementById('profileChatId').textContent = profile.telegramChatId;
        applyLocale(lang);
      }

      async function loadProfile() {
        const profile = await api('/api/app/profile');
        applyProfile(profile);
      }

      loadProfile().catch((err) => {
        alert(`${t(telegramLang()).loadError}: ${err.message}`);
      });
    </script>
  </body>
</html>
