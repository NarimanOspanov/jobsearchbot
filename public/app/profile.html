<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профиль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
        --switch-off: #3d4660;
        --switch-on: #4f7cff;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px; display: grid; gap: 16px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
      h1, h2 { margin: 0 0 12px; }
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
      .row:last-child { border-bottom: none; }
      .muted { color: var(--muted); }
      input, select, button {
        width: 100%; border-radius: 8px; border: 1px solid var(--border); background: #0f1730; color: var(--text); padding: 10px; font: inherit;
      }
      button { cursor: pointer; background: var(--accent); border-color: var(--accent); font-weight: 600; }
      .switch {
        position: relative; width: 52px; height: 32px; appearance: none; background: var(--switch-off);
        border-radius: 999px; border: none; outline: none; transition: background 0.2s ease;
      }
      .switch::before {
        content: ''; position: absolute; width: 26px; height: 26px; border-radius: 50%;
        top: 3px; left: 3px; background: #fff; transition: transform 0.2s ease;
      }
      .switch:checked { background: var(--switch-on); }
      .switch:checked::before { transform: translateX(20px); }
      .field { margin-bottom: 10px; }
      .money-input { position: relative; }
      .money-input .prefix {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
      }
      .money-input input { padding-left: 28px; }
      .hidden { display: none !important; }
    </style>
  <!-- Yandex.Metrika counter -->

      m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};

      k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a);

  </head>
  <body>
    <div class="wrap">
      <h1 id="pageTitle">Профиль</h1>

      <section class="card">
        <h2 id="userSectionTitle">Пользователь</h2>
        <div class="row"><span id="telegramLabel">Telegram</span><span id="profileUser" class="muted">загрузка...</span></div>
        <div class="row"><span id="chatIdLabel">Chat ID</span><span id="profileChatId" class="muted">загрузка...</span></div>
      </section>

      <section class="card">
        <h2 id="languageSectionTitle">Язык</h2>
        <div class="field">
          <label for="languageSelect" id="languageFieldLabel">Язык интерфейса</label>
          <select id="languageSelect">
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
        </div>
        <p id="languageStatus" class="muted"></p>
      </section>

      <section id="jobSearchSettings" class="card hidden" aria-hidden="true">
        <h2>Настройки</h2>
        <div class="row"><span>HeadHunter</span><input id="hhEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>LinkedIn</span><input id="linkedInEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Indeed</span><input id="indeedEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Telegram</span><input id="telegramEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Сайты компаний</span><input id="companySitesEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Email фаундеров</span><input id="emailFoundersEnabled" class="switch" type="checkbox" /></div>
        <div class="row"><span>Email рекрутеров</span><input id="emailRecruitersEnabled" class="switch" type="checkbox" /></div>

        <div class="field">
          <label for="searchMode">Режим поиска</label>
          <select id="searchMode">
            <option value="not_urgent">не срочно</option>
            <option value="urgent">срочно</option>
          </select>
        </div>
        <div class="field">
          <label for="minimumSalary">Минимальная зарплата</label>
          <div class="money-input">
            <span class="prefix">$</span>
            <input id="minimumSalary" type="number" min="0" step="1" placeholder="например, 3000" />
          </div>
        </div>
        <div class="row"><span>Только удаленка</span><input id="remoteOnly" class="switch" type="checkbox" /></div>
      </section>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      const I18N = {
        ru: {
          pageTitle: 'Профиль',
          userSection: 'Пользователь',
          telegram: 'Telegram',
          chatId: 'Chat ID',
          languageSection: 'Язык',
          languageField: 'Язык интерфейса',
          langRu: 'Русский',
          langEn: 'English',
          loading: 'загрузка...',
          noUsername: '(без username)',
          saving: 'Сохраняем...',
          saved: 'Сохранено',
          saveError: 'Ошибка',
          loadError: 'Не удалось загрузить профиль',
        },
        en: {
          pageTitle: 'Profile',
          userSection: 'User',
          telegram: 'Telegram',
          chatId: 'Chat ID',
          languageSection: 'Language',
          languageField: 'Interface language',
          langRu: 'Russian',
          langEn: 'English',
          loading: 'loading...',
          noUsername: '(no username)',
          saving: 'Saving...',
          saved: 'Saved',
          saveError: 'Error',
          loadError: 'Failed to load profile',
        },
      };

      let currentLanguage = 'ru';

      function t(lang) {
        return I18N[lang === 'en' ? 'en' : 'ru'];
      }

      function applyLocale(lang) {
        currentLanguage = lang === 'en' ? 'en' : 'ru';
        const strings = t(currentLanguage);
        document.documentElement.lang = currentLanguage;
        document.title = strings.pageTitle;
        document.getElementById('pageTitle').textContent = strings.pageTitle;
        document.getElementById('userSectionTitle').textContent = strings.userSection;
        document.getElementById('telegramLabel').textContent = strings.telegram;
        document.getElementById('chatIdLabel').textContent = strings.chatId;
        document.getElementById('languageSectionTitle').textContent = strings.languageSection;
        document.getElementById('languageFieldLabel').textContent = strings.languageField;
        const select = document.getElementById('languageSelect');
        select.options[0].textContent = strings.langRu;
        select.options[1].textContent = strings.langEn;
        const profileUser = document.getElementById('profileUser');
        if (profileUser.dataset.noUsername === '1') {
          profileUser.textContent = strings.noUsername;
        }
      }

      async function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        const response = await fetch(path, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function applyProfile(profile) {
        const strings = t(profile.language || 'ru');
        const profileUser = document.getElementById('profileUser');
        if (profile.telegramUserName) {
          profileUser.textContent = `@${profile.telegramUserName}`;
          profileUser.dataset.noUsername = '0';
        } else {
          profileUser.textContent = strings.noUsername;
          profileUser.dataset.noUsername = '1';
        }
        document.getElementById('profileChatId').textContent = profile.telegramChatId;
        document.getElementById('languageSelect').value = profile.language === 'en' ? 'en' : 'ru';
        applyLocale(profile.language || 'ru');
      }

      async function loadProfile() {
        const profile = await api('/api/app/profile');
        applyProfile(profile);
      }

      document.getElementById('languageSelect').addEventListener('change', async (event) => {
        const selected = event.target.value === 'en' ? 'en' : 'ru';
        const statusEl = document.getElementById('languageStatus');
        const strings = t(selected);
        statusEl.textContent = strings.saving;
        try {
          const result = await api('/api/app/profile/settings', {
            method: 'PATCH',
            body: JSON.stringify({ language: selected }),
          });
          applyLocale(result.language || selected);
          statusEl.textContent = t(currentLanguage).saved;
        } catch (err) {
          statusEl.textContent = `${strings.saveError}: ${err.message}`;
          event.target.value = currentLanguage;
        }
      });

      loadProfile().catch((err) => {
        const strings = t(currentLanguage);
        alert(`${strings.loadError}: ${err.message}`);
      });
    </script>
  </body>
</html>
