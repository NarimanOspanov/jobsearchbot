    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px; display: grid; gap: 12px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
      .help-q { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; border:1px solid var(--border); color:var(--muted); font-size:11px; line-height:1; cursor:help; user-select:none; }
      .company-card { cursor: pointer; transition: background 0.12s, border-color 0.12s; }
      .company-card:hover, .company-card:focus { background: #1a2240; border-color: var(--accent); outline: none; }
      .modal { position: fixed; inset: 0; background: rgba(5,10,20,0.78); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 999; }
      .modal.on { display: flex; }
      .modal-card { width: min(560px, 100%); background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
      .modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
      .modal-close { background: transparent; border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 4px 10px; cursor: pointer; font: inherit; }
      .modal-card h3 { margin: 0; font-size: 20px; }
      .modal-card .modal-desc { margin: 12px 0; line-height: 1.5; }
      .modal-card .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
      .modal-prefs { margin: 14px 0 6px; border-top: 1px solid var(--border); padding-top: 12px; display: grid; gap: 10px; }
      .pref-row { display: flex; align-items: flex-start; gap: 8px; }
      .pref-label-wrap { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; flex: 1 1 auto; }
      .pref-row input[type="checkbox"] { width: 18px; height: 18px; margin-top: 1px; accent-color: var(--accent); cursor: pointer; flex: 0 0 auto; }
      .pref-row input[type="checkbox"]:disabled { cursor: default; opacity: 0.6; }
      .pref-row .pref-label { line-height: 1.35; }
      .pref-row .help-q { flex: 0 0 auto; margin-top: 1px; }
      .pref-row.busy { opacity: 0.6; }
      .pref-msg { font-size: 13px; min-height: 0; }
      .pref-msg.error { color: #ff8f9d; }
      .pref-msg.ok { color: #8fe3a6; }
      .resume-gate { margin-top: 4px; border: 1px dashed var(--border); border-radius: 10px; padding: 12px; display: grid; gap: 10px; background: #0f1730; }
      .resume-gate[hidden] { display: none; }
      .resume-gate .gate-text { margin: 0; font-size: 13px; line-height: 1.45; }
      .resume-gate .gate-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .resume-gate input[type="file"] { color: var(--muted); font: inherit; max-width: 100%; }
      .btn-accent { border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 8px; padding: 8px 14px; font: inherit; cursor: pointer; }
      .btn-accent:disabled { opacity: 0.6; cursor: default; }
      .mini-spinner { width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
      .mini-spinner[hidden] { display: none; }
      .title { margin: 0; font-size: 22px; }
      .muted { color: var(--muted); font-size: 14px; }
      a { color: var(--accent); word-break: break-all; }
      .toolbar { display: grid; gap: 10px; }
      .toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .count-pill {
        margin-left: auto;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }
      .text-search {
        width: 100%;
        border: 1px solid var(--border);
        background: #0f1730;
        color: var(--text);
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
      }
      .text-search::placeholder { color: var(--muted); }
      .picker { position: relative; flex: 1 1 220px; min-width: 0; }
      .picker-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border: 1px solid var(--border);
        background: #0f1730;
        color: var(--text);
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
        cursor: pointer;
        text-align: left;
      }
      .picker-btn .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .picker-btn .chev { color: var(--muted); flex: 0 0 auto; }
      .picker-menu {
        display: none;
        position: absolute;
        z-index: 20;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        max-height: min(60vh, 360px);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #10182f;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .picker-menu.open { display: grid; grid-template-rows: auto auto 1fr auto; }
      .picker-search {
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }
      .picker-actions {
        display: flex;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }
      .ghost-btn {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        border-radius: 8px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      .picker-list { overflow: auto; padding: 6px; }
      .picker-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
      }
      .picker-item:hover { background: rgba(79, 124, 255, 0.08); }
      .picker-item input { margin-top: 2px; accent-color: var(--accent); }
      .picker-item span { line-height: 1.35; }
      .section-title {
        margin: 12px 0 8px;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .industry-tag {
        display: inline-block;
        margin-top: 8px;
        margin-right: 6px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
      .industry-tag.tag-filter { cursor: pointer; transition: background 0.12s, border-color 0.12s, color 0.12s; }
      .industry-tag.tag-filter:hover { border-color: var(--accent); color: var(--text); }
      .industry-tag.tag-filter.active { background: var(--accent); border-color: var(--accent); color: #fff; }
      .loading {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        padding: 8px 0;
      }
      .loading[hidden] { display: none !important; }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { color: #ff8f9d; }

  <body>
    <div class="wrap">
      <h1 class="title" id="pageTitle">Remote companies</h1>
      <p class="muted" id="pageSubtitle">Select one or more industries — the list updates automatically.</p>

      <section class="card toolbar">
        <input id="textSearch" class="text-search" type="search" placeholder="Search by name, website or description..." autocomplete="off" />
        <label class="muted" for="industryPickerBtn" id="industryLabel">Industries</label>
        <div class="toolbar-row">
          <div class="picker" id="industryPicker">
            <button id="industryPickerBtn" type="button" class="picker-btn" aria-haspopup="listbox" aria-expanded="false">
              <span class="label" id="industryPickerLabel">All industries</span>
              <span class="chev">▾</span>
            </button>
            <div id="industryPickerMenu" class="picker-menu" role="listbox" aria-multiselectable="true">
              <input id="industrySearch" class="picker-search" type="search" placeholder="Search industry..." />
              <div class="picker-actions">
                <button type="button" class="ghost-btn" id="clearIndustriesBtn">Clear</button>
              </div>
              <div id="industryOptions" class="picker-list"></div>
            </div>
          </div>
          <span style="display:inline-flex;align-items:center;gap:6px">
            <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--text)">
              <input type="checkbox" id="relocationChk" style="width:16px;height:16px;cursor:pointer" />
              <span id="relocationLabel">Relocation friendly</span>
            </label>
            <span id="relocationHelp" class="help-q" tabindex="0" role="img" aria-label="info">?</span>
          </span>
          <div id="resultCount" class="count-pill">—</div>
        </div>
      </section>

      <div id="status" class="loading" hidden>
        <div class="spinner"></div>
        <span id="loadingText">Loading companies...</span>
      </div>
      <div id="companiesList"></div>
    </div>

    <div id="companyModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="companyModalName">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="companyModalName"></h3>
          <button type="button" id="companyModalClose" class="modal-close">Close</button>
        </div>
        <div id="companyModalTags" class="modal-tags"></div>
        <p id="companyModalDesc" class="modal-desc muted"></p>
        <a id="companyModalLink" href="#" target="_blank" rel="noopener noreferrer"></a>

        <div class="modal-prefs">
          <div class="pref-row" id="prefNotifyRow">
            <label class="pref-label-wrap">
              <input type="checkbox" id="prefNotify" />
              <span class="pref-label" id="prefNotifyLabel">Notify me about matching positions</span>
            </label>
            <span id="prefNotifyHelp" class="help-q" tabindex="0" role="img" aria-label="info">?</span>
          </div>
          <div class="pref-row" id="prefAutoApplyRow">
            <label class="pref-label-wrap">
              <input type="checkbox" id="prefAutoApply" />
              <span class="pref-label" id="prefAutoApplyLabel">Apply for me automatically</span>
            </label>
            <span id="prefAutoApplyHelp" class="help-q" tabindex="0" role="img" aria-label="info">?</span>
          </div>
          <div class="pref-msg" id="prefMsg"></div>

          <div class="resume-gate" id="resumeGate" hidden>
            <p class="gate-text muted" id="resumeGateText">
              To enable this we need your main resume. Upload it (PDF or image) — our AI reads your skills and work authorization automatically.
            </p>
            <div class="gate-row">
              <input type="file" id="resumeFileInput" accept=".pdf,image/png,image/jpeg,image/webp" />
              <button type="button" id="resumeUploadBtn" class="btn-accent">Upload resume</button>
              <span id="resumeUploadSpinner" class="mini-spinner" hidden></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const STRINGS = {
        en: {
          pageTitle: 'Remote companies',
          pageSubtitle: 'Select one or more industries — the list updates automatically.',
          industryLabel: 'Industries',
          allIndustries: 'All industries',
          searchPlaceholder: 'Search industry...',
          textSearchPlaceholder: 'Search by name, website or description...',
          clear: 'Clear',
          loading: 'Loading companies...',
          count: '{n} companies',
          noSearchResults: 'Nothing found',
          noCompanies: 'No companies for the selected industries.',
          noIndustry: 'No industry',
          loadCompaniesError: 'Failed to load companies',
          loadIndustriesError: 'Failed to load industries',
          requestTimeout: 'Request timed out. Please try again.',
          visitWebsite: 'Visit website',
          noDescription: 'No description yet.',
          close: 'Close',
          relocationLabel: 'Relocation friendly',
          relocationHelp: 'According to reviews and feedback from other employees, the company helps with relocation or sponsors visas.',
          prefNotifyLabel: 'Notify me about matching positions',
          prefNotifyHelp: 'When our AI finds a position at this company that matches your resume, you’ll get a Telegram message.',
          prefAutoApplyLabel: 'Apply for me automatically',
          prefAutoApplyHelp: 'When a matching position appears at this company, we’ll apply on your behalf using your main resume.',
          resumeGateText: 'To enable this we need your main resume. Upload it (PDF or image) — our AI reads your skills and work authorization automatically.',
          resumeUploadBtn: 'Upload resume',
          resumeUploading: 'Uploading…',
          resumeUploadedProcessing: 'Resume uploaded — our AI is reading your skills. Done!',
          prefSaveError: 'Could not save. Please try again.',
          resumeTypeError: 'Unsupported file. Use PDF or an image (JPG/PNG/WEBP).',
          resumeSizeError: 'File is too large (max 15 MB).',
          resumePickError: 'Please choose a file first.',
        },
        ru: {
          pageTitle: 'Компании с удаленкой',
          pageSubtitle: 'Выберите одну или несколько отраслей — список обновится автоматически.',
          industryLabel: 'Отрасли',
          allIndustries: 'Все отрасли',
          searchPlaceholder: 'Поиск отрасли...',
          textSearchPlaceholder: 'Поиск по названию, сайту или описанию...',
          clear: 'Сбросить',
          loading: 'Загрузка компаний...',
          count: '{n} компаний',
          noSearchResults: 'Ничего не найдено',
          noCompanies: 'Нет компаний для выбранных отраслей.',
          noIndustry: 'Без отрасли',
          loadCompaniesError: 'Не удалось загрузить компании',
          loadIndustriesError: 'Не удалось загрузить отрасли',
          requestTimeout: 'Превышено время ожидания. Попробуйте ещё раз.',
          visitWebsite: 'Перейти на сайт',
          noDescription: 'Описание пока отсутствует.',
          close: 'Закрыть',
          relocationLabel: 'Дружелюбны к релокации',
          relocationHelp: 'По отзывам и обратной связи других сотрудников, компания помогает с релокацией или спонсирует визу.',
          prefNotifyLabel: 'Уведомлять о подходящих вакансиях',
          prefNotifyHelp: 'Когда наш ИИ найдёт в этой компании вакансию, подходящую под ваше резюме, вы получите сообщение в Telegram.',
          prefAutoApplyLabel: 'Откликаться за меня автоматически',
          prefAutoApplyHelp: 'Когда в этой компании появится подходящая вакансия, мы откликнемся за вас, используя ваше основное резюме.',
          resumeGateText: 'Чтобы включить это, нужно ваше основное резюме. Загрузите его (PDF или изображение) — наш ИИ сам считает навыки и право на работу.',
          resumeUploadBtn: 'Загрузить резюме',
          resumeUploading: 'Загрузка…',
          resumeUploadedProcessing: 'Резюме загружено — ИИ анализирует ваши навыки. Готово!',
          prefSaveError: 'Не удалось сохранить. Попробуйте ещё раз.',
          resumeTypeError: 'Неподдерживаемый файл. Используйте PDF или изображение (JPG/PNG/WEBP).',
          resumeSizeError: 'Файл слишком большой (макс. 15 МБ).',
          resumePickError: 'Сначала выберите файл.',
        },
      };

      const tg = window.Telegram?.WebApp;
      const urlParams = new URLSearchParams(window.location.search);
      const lang = window.TmaI18n ? window.TmaI18n.resolveLang(tg, urlParams) : 'en';
      const t = (key, params) => (window.TmaI18n ? window.TmaI18n.t(STRINGS, lang, key, params) : key);
      const API_TIMEOUT_MS = 30000;

      if (tg) tg.ready();

      let industries = [];
      let companies = [];
      let selectedIndustryIds = new Set();
      let loadSeq = 0;
      let pickerOpen = false;
      // Per-company opt-ins for the current user (loaded once, kept in sync).
      let subs = { hasResume: false, notify: new Set(), autoApply: new Set() };
      let modalCompanyId = null;
      let pendingPrefType = null; // pref the user tried to enable before uploading a resume

      function applyI18n() {
        document.documentElement.lang = lang;
        document.title = t('pageTitle');
        document.getElementById('pageTitle').textContent = t('pageTitle');
        document.getElementById('pageSubtitle').textContent = t('pageSubtitle');
        document.getElementById('industryLabel').textContent = t('industryLabel');
        document.getElementById('industrySearch').placeholder = t('searchPlaceholder');
        document.getElementById('textSearch').placeholder = t('textSearchPlaceholder');
        document.getElementById('clearIndustriesBtn').textContent = t('clear');
        document.getElementById('loadingText').textContent = t('loading');
        document.getElementById('relocationLabel').textContent = t('relocationLabel');
        document.getElementById('relocationHelp').title = t('relocationHelp');
        document.getElementById('prefNotifyLabel').textContent = t('prefNotifyLabel');
        document.getElementById('prefNotifyHelp').title = t('prefNotifyHelp');
        document.getElementById('prefAutoApplyLabel').textContent = t('prefAutoApplyLabel');
        document.getElementById('prefAutoApplyHelp').title = t('prefAutoApplyHelp');
        document.getElementById('resumeGateText').textContent = t('resumeGateText');
        document.getElementById('resumeUploadBtn').textContent = t('resumeUploadBtn');
      }

      function getTgInitDataString() {
        const direct = String(tg?.initData || '').trim();
        if (direct) return direct;
        try {
          const hash = String(window.location.hash || '').replace(/^#/, '');
          if (hash) {
            const params = new URLSearchParams(hash);
            const fromHash = String(params.get('tgWebAppData') || '').trim();
            if (fromHash) return fromHash;
          }
        } catch {
          // ignore
        }
        return String(window.Telegram?.WebView?.initParams?.tgWebAppData || '').trim();
      }

      function attachMiniAppAuthHeaders(headers) {
        const data = getTgInitDataString();
        if (data) {
          headers['x-init-data'] = data;
          headers.Authorization = `tma ${data}`;
        }
      }

      async function waitForTelegramInitData(maxMs = 15000) {
        if (tg?.expand) {
          try { tg.expand(); } catch { /* ignore */ }
        }
        const start = Date.now();
        while (Date.now() - start < maxMs) {
          if (String(getTgInitDataString()).trim()) return;
          await new Promise((resolve) => setTimeout(resolve, 50));
        }
      }

      async function api(path) {
        const headers = {};
        attachMiniAppAuthHeaders(headers);
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
        try {
          const response = await fetch(path, { headers, signal: controller.signal });
          if (!response.ok) throw new Error(await response.text());
          return response.json();
        } catch (err) {
          if (err?.name === 'AbortError') throw new Error(t('requestTimeout'));
          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      // POST JSON; returns { ok, status, data } without throwing on non-2xx
      // so callers can branch on status (e.g. 409 resume_required).
      async function apiPost(path, body) {
        const headers = { 'Content-Type': 'application/json' };
        attachMiniAppAuthHeaders(headers);
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
        try {
          const response = await fetch(path, {
            method: 'POST',
            headers,
            body: JSON.stringify(body || {}),
            signal: controller.signal,
          });
          const data = await response.json().catch(() => ({}));
          return { ok: response.ok, status: response.status, data };
        } catch (err) {
          if (err?.name === 'AbortError') throw new Error(t('requestTimeout'));
          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      function esc(value) {
        return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function apiLangQuery() {
        return `lang=${encodeURIComponent(lang)}`;
      }

      function companiesUrl() {
        const ids = [...selectedIndustryIds];
        const params = new URLSearchParams();
        params.set('lang', lang);
        if (ids.length) params.set('industryIds', ids.join(','));
        return `/api/app/companies?${params.toString()}`;
      }

      function industriesUrl() {
        return `/api/app/companies/industries?${apiLangQuery()}`;
      }

      function updatePickerLabel() {
        const label = document.getElementById('industryPickerLabel');
        if (!selectedIndustryIds.size) {
          label.textContent = t('allIndustries');
          return;
        }
        const names = industries
          .filter((item) => selectedIndustryIds.has(item.id))
          .map((item) => item.name);
        if (names.length <= 2) {
          label.textContent = names.join(', ');
          return;
        }
        label.textContent = `${names.slice(0, 2).join(', ')} +${names.length - 2}`;
      }

      function renderIndustryOptions(filterText = '') {
        const root = document.getElementById('industryOptions');
        const q = String(filterText || '').trim().toLowerCase();
        const visible = industries.filter((item) => !q || item.name.toLowerCase().includes(q));
        if (!visible.length) {
          root.innerHTML = `<p class="muted" style="padding:8px 10px">${esc(t('noSearchResults'))}</p>`;
          return;
        }
        root.innerHTML = visible
          .map(
            (item) => `
              <label class="picker-item">
                <input type="checkbox" value="${item.id}" ${selectedIndustryIds.has(item.id) ? 'checked' : ''} />
                <span>${esc(item.name)}</span>
              </label>
            `
          )
          .join('');
        for (const input of root.querySelectorAll('input[type="checkbox"]')) {
          input.addEventListener('change', () => {
            const id = Number(input.value);
            if (input.checked) selectedIndustryIds.add(id);
            else selectedIndustryIds.delete(id);
            updatePickerLabel();
            loadCompanies();
          });
        }
      }

      function setPickerOpen(open) {
        pickerOpen = open;
        const menu = document.getElementById('industryPickerMenu');
        const btn = document.getElementById('industryPickerBtn');
        menu.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) {
          document.getElementById('industrySearch').value = '';
          renderIndustryOptions('');
          document.getElementById('industrySearch').focus();
        }
      }

      function companyCard(row) {
        const tags = (row.industries || [])
          .map(
            (item) =>
              `<span class="industry-tag tag-filter${selectedIndustryIds.has(item.id) ? ' active' : ''}" data-industry-id="${esc(item.id)}" role="button" tabindex="0">${esc(item.name)}</span>`
          )
          .join('');
        const desc = row.shortDescription
          ? `<p class="muted" style="margin:8px 0 0">${esc(row.shortDescription)}</p>`
          : '';
        return `
          <article class="card company-card" data-company-id="${esc(row.Id)}" role="button" tabindex="0">
            <h3 style="margin:0 0 8px;font-size:18px">${esc(row.Name)}</h3>
            ${tags ? `<div>${tags}</div>` : ''}
            ${desc}
          </article>
        `;
      }

      function renderCompanies() {
        const list = document.getElementById('companiesList');
        const countEl = document.getElementById('resultCount');

        // Relocation filter (client-side): checked => only companies that help with relocation.
        const relOnly = document.getElementById('relocationChk').checked;
        let visible = relOnly ? companies.filter((c) => c.helpsWithRelocation === true) : companies;

        // Text search (client-side): match name, website (Url) or any description.
        const q = String(document.getElementById('textSearch').value || '').trim().toLowerCase();
        if (q) {
          visible = visible.filter((c) => {
            const hay = [c.Name, c.Url, c.shortDescription, c.shortDescriptionRu, c.shortDescriptionEng]
              .filter(Boolean)
              .join(' ')
              .toLowerCase();
            return hay.includes(q);
          });
        }

        countEl.textContent = t('count', { n: visible.length });

        if (!visible.length) {
          list.innerHTML = `<div class="card"><p class="muted">${esc(t('noCompanies'))}</p></div>`;
          return;
        }

        // Flat list ordered by name (companies can have multiple categories, so no grouping).
        const sorted = [...visible].sort((a, b) => String(a.Name).localeCompare(String(b.Name), lang));
        list.innerHTML = sorted.map((row) => companyCard(row)).join('');
      }

      async function loadCompanies() {
        const seq = ++loadSeq;
        const status = document.getElementById('status');
        const list = document.getElementById('companiesList');
        status.hidden = false;
        list.innerHTML = '';
        try {
          const rows = await api(companiesUrl());
          if (seq !== loadSeq) return;
          companies = rows;
          renderCompanies();
        } catch (err) {
          if (seq !== loadSeq) return;
          list.innerHTML = `<div class="card"><p class="error">${esc(t('loadCompaniesError'))}: ${esc(err.message)}</p></div>`;
          document.getElementById('resultCount').textContent = '—';
        } finally {
          if (seq === loadSeq) status.hidden = true;
        }
      }

      // Toggle an industry filter (used by both the picker and the clickable card tags).
      function toggleIndustry(id) {
        const industryId = Number(id);
        if (!Number.isFinite(industryId)) return;
        if (selectedIndustryIds.has(industryId)) selectedIndustryIds.delete(industryId);
        else selectedIndustryIds.add(industryId);
        updatePickerLabel();
        renderIndustryOptions(document.getElementById('industrySearch').value);
        loadCompanies();
      }

      document.getElementById('industryPickerBtn').addEventListener('click', () => {
        setPickerOpen(!pickerOpen);
      });

      document.getElementById('industrySearch').addEventListener('input', (event) => {
        renderIndustryOptions(event.target.value);
      });

      document.getElementById('relocationChk').addEventListener('change', () => {
        renderCompanies();
      });

      document.getElementById('textSearch').addEventListener('input', () => {
        renderCompanies();
      });

      document.getElementById('clearIndustriesBtn').addEventListener('click', () => {
        selectedIndustryIds = new Set();
        updatePickerLabel();
        renderIndustryOptions(document.getElementById('industrySearch').value);
        loadCompanies();
      });

      document.addEventListener('click', (event) => {
        const picker = document.getElementById('industryPicker');
        if (!picker.contains(event.target)) setPickerOpen(false);
      });

      // --- Per-company opt-ins (notify / auto-apply) ---
      function setPrefMsg(text, kind) {
        const el = document.getElementById('prefMsg');
        el.textContent = text || '';
        el.className = 'pref-msg' + (kind ? ' ' + kind : '');
      }

      function setResumeGateVisible(visible) {
        document.getElementById('resumeGate').hidden = !visible;
      }

      // Reflect the current user's saved prefs for the open company onto the checkboxes.
      function reflectPrefs() {
        const idNum = Number(modalCompanyId);
        document.getElementById('prefNotify').checked = subs.notify.has(idNum);
        document.getElementById('prefAutoApply').checked = subs.autoApply.has(idNum);
      }

      function setPrefRowsBusy(busy) {
        for (const id of ['prefNotify', 'prefAutoApply']) document.getElementById(id).disabled = busy;
        document.getElementById('prefNotifyRow').classList.toggle('busy', busy);
        document.getElementById('prefAutoApplyRow').classList.toggle('busy', busy);
      }

      async function togglePref(type, enabled, checkboxEl) {
        // Resume required to enable either option — prompt upload, defer the toggle.
        if (enabled && !subs.hasResume) {
          checkboxEl.checked = false;
          pendingPrefType = type;
          setResumeGateVisible(true);
          setPrefMsg('');
          return;
        }
        setPrefRowsBusy(true);
        setPrefMsg('');
        try {
          const res = await apiPost('/api/app/companies/subscriptions', {
            companyId: Number(modalCompanyId),
            type,
            enabled,
          });
          if (res.status === 409 && res.data?.error === 'resume_required') {
            subs.hasResume = false;
            checkboxEl.checked = false;
            pendingPrefType = type;
            setResumeGateVisible(true);
            return;
          }
          if (!res.ok) throw new Error(res.data?.error || 'failed');
          const set = type === 'notify' ? subs.notify : subs.autoApply;
          if (enabled) set.add(Number(modalCompanyId));
          else set.delete(Number(modalCompanyId));
        } catch (err) {
          checkboxEl.checked = !enabled; // revert
          setPrefMsg(t('prefSaveError'), 'error');
        } finally {
          setPrefRowsBusy(false);
        }
      }

      async function uploadResumeAndContinue() {
        const fileInput = document.getElementById('resumeFileInput');
        const file = fileInput?.files?.[0];
        if (!file) { setPrefMsg(t('resumePickError'), 'error'); return; }
        if (file.size > 15 * 1024 * 1024) { setPrefMsg(t('resumeSizeError'), 'error'); return; }
        const allowed = ['application/pdf', 'image/png', 'image/jpeg', 'image/webp'];
        if (!allowed.includes(file.type)) { setPrefMsg(t('resumeTypeError'), 'error'); return; }

        const btn = document.getElementById('resumeUploadBtn');
        const spinner = document.getElementById('resumeUploadSpinner');
        btn.disabled = true;
        spinner.hidden = false;
        setPrefMsg(t('resumeUploading'));
        try {
          const ext = (String(file.name).match(/\.([a-z0-9]+)$/i)?.[1])
            || (file.type === 'application/pdf' ? 'pdf' : file.type === 'image/png' ? 'png' : file.type === 'image/webp' ? 'webp' : 'jpg');
          const headers = {
            'Content-Type': 'application/octet-stream',
            'x-file-name': `resume-${Date.now()}.${ext}`,
            'x-file-type': file.type || 'application/octet-stream',
          };
          attachMiniAppAuthHeaders(headers);
          const response = await fetch('/api/app/profile/resume-upload', {
            method: 'POST',
            headers,
            body: await file.arrayBuffer(),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || !payload?.resumeUrl) {
            throw new Error(typeof payload?.error === 'string' ? payload.error : 'upload_failed');
          }
          subs.hasResume = true;
          fileInput.value = '';
          setResumeGateVisible(false);
          setPrefMsg(t('resumeUploadedProcessing'), 'ok');
          // Apply the toggle the user originally wanted.
          const type = pendingPrefType;
          pendingPrefType = null;
          if (type) {
            const cb = document.getElementById(type === 'notify' ? 'prefNotify' : 'prefAutoApply');
            cb.checked = true;
            await togglePref(type, true, cb);
          }
        } catch (err) {
          setPrefMsg(t('prefSaveError'), 'error');
        } finally {
          btn.disabled = false;
          spinner.hidden = true;
        }
      }

      // Company details modal (Name, short description, link, opt-ins).
      function openCompanyModal(id) {
        const row = companies.find((c) => String(c.Id) === String(id));
        if (!row) return;
        modalCompanyId = row.Id;
        pendingPrefType = null;
        document.getElementById('companyModalName').textContent = row.Name || '';
        document.getElementById('companyModalTags').innerHTML = (row.industries || [])
          .map((i) => `<span class="industry-tag">${esc(i.name)}</span>`).join('');
        document.getElementById('companyModalDesc').textContent = row.shortDescription || t('noDescription');
        const link = document.getElementById('companyModalLink');
        if (row.Url) { link.href = row.Url; link.textContent = t('visitWebsite'); link.style.display = ''; }
        else { link.removeAttribute('href'); link.textContent = ''; link.style.display = 'none'; }
        setPrefRowsBusy(false);
        setPrefMsg('');
        setResumeGateVisible(false);
        document.getElementById('resumeFileInput').value = '';
        reflectPrefs();
        document.getElementById('companyModal').classList.add('on');
      }
      function closeCompanyModal() {
        document.getElementById('companyModal').classList.remove('on');
        modalCompanyId = null;
        pendingPrefType = null;
      }

      document.getElementById('prefNotify').addEventListener('change', (e) => {
        togglePref('notify', e.target.checked, e.target);
      });
      document.getElementById('prefAutoApply').addEventListener('change', (e) => {
        togglePref('autoApply', e.target.checked, e.target);
      });
      document.getElementById('resumeUploadBtn').addEventListener('click', uploadResumeAndContinue);
      document.getElementById('companiesList').addEventListener('click', (event) => {
        const tag = event.target.closest('.tag-filter');
        if (tag) { event.stopPropagation(); toggleIndustry(tag.getAttribute('data-industry-id')); return; }
        const card = event.target.closest('.company-card');
        if (card) openCompanyModal(card.getAttribute('data-company-id'));
      });
      document.getElementById('companiesList').addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const tag = event.target.closest('.tag-filter');
        if (tag) { event.preventDefault(); event.stopPropagation(); toggleIndustry(tag.getAttribute('data-industry-id')); return; }
        const card = event.target.closest('.company-card');
        if (card) { event.preventDefault(); openCompanyModal(card.getAttribute('data-company-id')); }
      });
      document.getElementById('companyModalClose').addEventListener('click', closeCompanyModal);
      document.getElementById('companyModal').addEventListener('click', (event) => {
        if (event.target.id === 'companyModal') closeCompanyModal();
      });
      document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeCompanyModal(); });

      applyI18n();
      document.getElementById('companyModalClose').textContent = t('close');

      async function loadSubscriptions() {
        try {
          const data = await api('/api/app/companies/subscriptions');
          subs = {
            hasResume: !!data.hasResume,
            notify: new Set((data.notify || []).map(Number)),
            autoApply: new Set((data.autoApply || []).map(Number)),
          };
        } catch {
          // Non-fatal: keep defaults; checkboxes will simply start unchecked.
        }
      }

      (async () => {
        try {
          await waitForTelegramInitData();
          const rows = await api(industriesUrl());
          industries = rows;
          updatePickerLabel();
          renderIndustryOptions('');
          await Promise.all([loadCompanies(), loadSubscriptions()]);
        } catch (err) {
          document.getElementById('companiesList').innerHTML =
            `<div class="card"><p class="error">${esc(t('loadIndustriesError'))}: ${esc(err.message)}</p></div>`;
          document.getElementById('status').hidden = true;
        }
      })();
    </script>
</body>
</html>
