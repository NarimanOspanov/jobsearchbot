<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote companies</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/app/tma-i18n.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px; display: grid; gap: 12px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
      .title { margin: 0; font-size: 22px; }
      .muted { color: var(--muted); font-size: 14px; }
      a { color: var(--accent); word-break: break-all; }
      .toolbar { display: grid; gap: 10px; }
      .toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .count-pill {
        margin-left: auto;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }
      .picker { position: relative; flex: 1 1 220px; min-width: 0; }
      .picker-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border: 1px solid var(--border);
        background: #0f1730;
        color: var(--text);
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
        cursor: pointer;
        text-align: left;
      }
      .picker-btn .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .picker-btn .chev { color: var(--muted); flex: 0 0 auto; }
      .picker-menu {
        display: none;
        position: absolute;
        z-index: 20;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        max-height: min(60vh, 360px);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #10182f;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .picker-menu.open { display: grid; grid-template-rows: auto auto 1fr auto; }
      .picker-search {
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }
      .picker-actions {
        display: flex;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }
      .ghost-btn {
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        border-radius: 8px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      .picker-list { overflow: auto; padding: 6px; }
      .picker-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
      }
      .picker-item:hover { background: rgba(79, 124, 255, 0.08); }
      .picker-item input { margin-top: 2px; accent-color: var(--accent); }
      .picker-item span { line-height: 1.35; }
      .section-title {
        margin: 12px 0 8px;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .industry-tag {
        display: inline-block;
        margin-top: 8px;
        margin-right: 6px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
      .loading {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        padding: 8px 0;
      }
      .loading[hidden] { display: none !important; }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error { color: #ff8f9d; }
    </style>

  </head>
  <body>
    <div class="wrap">
      <h1 class="title" id="pageTitle">Remote companies</h1>
      <p class="muted" id="pageSubtitle">Select one or more industries — the list updates automatically.</p>

      <section class="card toolbar">
        <label class="muted" for="industryPickerBtn" id="industryLabel">Industries</label>
        <div class="toolbar-row">
          <div class="picker" id="industryPicker">
            <button id="industryPickerBtn" type="button" class="picker-btn" aria-haspopup="listbox" aria-expanded="false">
              <span class="label" id="industryPickerLabel">All industries</span>
              <span class="chev">▾</span>
            </button>
            <div id="industryPickerMenu" class="picker-menu" role="listbox" aria-multiselectable="true">
              <input id="industrySearch" class="picker-search" type="search" placeholder="Search industry..." />
              <div class="picker-actions">
                <button type="button" class="ghost-btn" id="clearIndustriesBtn">Clear</button>
              </div>
              <div id="industryOptions" class="picker-list"></div>
            </div>
          </div>
          <div id="resultCount" class="count-pill">—</div>
        </div>
      </section>

      <div id="status" class="loading" hidden>
        <div class="spinner"></div>
        <span id="loadingText">Loading companies...</span>
      </div>
      <div id="companiesList"></div>
    </div>
    <script>
      const STRINGS = {
        en: {
          pageTitle: 'Remote companies',
          pageSubtitle: 'Select one or more industries — the list updates automatically.',
          industryLabel: 'Industries',
          allIndustries: 'All industries',
          searchPlaceholder: 'Search industry...',
          clear: 'Clear',
          loading: 'Loading companies...',
          count: '{n} companies',
          noSearchResults: 'Nothing found',
          noCompanies: 'No companies for the selected industries.',
          noIndustry: 'No industry',
          loadCompaniesError: 'Failed to load companies',
          loadIndustriesError: 'Failed to load industries',
          requestTimeout: 'Request timed out. Please try again.',
        },
        ru: {
          pageTitle: 'Компании с удаленкой',
          pageSubtitle: 'Выберите одну или несколько отраслей — список обновится автоматически.',
          industryLabel: 'Отрасли',
          allIndustries: 'Все отрасли',
          searchPlaceholder: 'Поиск отрасли...',
          clear: 'Сбросить',
          loading: 'Загрузка компаний...',
          count: '{n} компаний',
          noSearchResults: 'Ничего не найдено',
          noCompanies: 'Нет компаний для выбранных отраслей.',
          noIndustry: 'Без отрасли',
          loadCompaniesError: 'Не удалось загрузить компании',
          loadIndustriesError: 'Не удалось загрузить отрасли',
          requestTimeout: 'Превышено время ожидания. Попробуйте ещё раз.',
        },
      };

      const tg = window.Telegram?.WebApp;
      const urlParams = new URLSearchParams(window.location.search);
      const lang = window.TmaI18n ? window.TmaI18n.resolveLang(tg, urlParams) : 'en';
      const t = (key, params) => (window.TmaI18n ? window.TmaI18n.t(STRINGS, lang, key, params) : key);
      const API_TIMEOUT_MS = 30000;

      if (tg) tg.ready();

      let industries = [];
      let companies = [];
      let selectedIndustryIds = new Set();
      let loadSeq = 0;
      let pickerOpen = false;

      function applyI18n() {
        document.documentElement.lang = lang;
        document.title = t('pageTitle');
        document.getElementById('pageTitle').textContent = t('pageTitle');
        document.getElementById('pageSubtitle').textContent = t('pageSubtitle');
        document.getElementById('industryLabel').textContent = t('industryLabel');
        document.getElementById('industrySearch').placeholder = t('searchPlaceholder');
        document.getElementById('clearIndustriesBtn').textContent = t('clear');
        document.getElementById('loadingText').textContent = t('loading');
      }

      function getTgInitDataString() {
        const direct = String(tg?.initData || '').trim();
        if (direct) return direct;
        try {
          const hash = String(window.location.hash || '').replace(/^#/, '');
          if (hash) {
            const params = new URLSearchParams(hash);
            const fromHash = String(params.get('tgWebAppData') || '').trim();
            if (fromHash) return fromHash;
          }
        } catch {
          // ignore
        }
        return String(window.Telegram?.WebView?.initParams?.tgWebAppData || '').trim();
      }

      function attachMiniAppAuthHeaders(headers) {
        const data = getTgInitDataString();
        if (data) {
          headers['x-init-data'] = data;
          headers.Authorization = `tma ${data}`;
        }
      }

      async function waitForTelegramInitData(maxMs = 15000) {
        if (tg?.expand) {
          try { tg.expand(); } catch { /* ignore */ }
        }
        const start = Date.now();
        while (Date.now() - start < maxMs) {
          if (String(getTgInitDataString()).trim()) return;
          await new Promise((resolve) => setTimeout(resolve, 50));
        }
      }

      async function api(path) {
        const headers = {};
        attachMiniAppAuthHeaders(headers);
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
        try {
          const response = await fetch(path, { headers, signal: controller.signal });
          if (!response.ok) throw new Error(await response.text());
          return response.json();
        } catch (err) {
          if (err?.name === 'AbortError') throw new Error(t('requestTimeout'));
          throw err;
        } finally {
          clearTimeout(timer);
        }
      }

      function esc(value) {
        return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function apiLangQuery() {
        return `lang=${encodeURIComponent(lang)}`;
      }

      function companiesUrl() {
        const ids = [...selectedIndustryIds];
        const params = new URLSearchParams();
        params.set('lang', lang);
        if (ids.length) params.set('industryIds', ids.join(','));
        return `/api/app/companies?${params.toString()}`;
      }

      function industriesUrl() {
        return `/api/app/companies/industries?${apiLangQuery()}`;
      }

      function updatePickerLabel() {
        const label = document.getElementById('industryPickerLabel');
        if (!selectedIndustryIds.size) {
          label.textContent = t('allIndustries');
          return;
        }
        const names = industries
          .filter((item) => selectedIndustryIds.has(item.id))
          .map((item) => item.name);
        if (names.length <= 2) {
          label.textContent = names.join(', ');
          return;
        }
        label.textContent = `${names.slice(0, 2).join(', ')} +${names.length - 2}`;
      }

      function renderIndustryOptions(filterText = '') {
        const root = document.getElementById('industryOptions');
        const q = String(filterText || '').trim().toLowerCase();
        const visible = industries.filter((item) => !q || item.name.toLowerCase().includes(q));
        if (!visible.length) {
          root.innerHTML = `<p class="muted" style="padding:8px 10px">${esc(t('noSearchResults'))}</p>`;
          return;
        }
        root.innerHTML = visible
          .map(
            (item) => `
              <label class="picker-item">
                <input type="checkbox" value="${item.id}" ${selectedIndustryIds.has(item.id) ? 'checked' : ''} />
                <span>${esc(item.name)}</span>
              </label>
            `
          )
          .join('');
        for (const input of root.querySelectorAll('input[type="checkbox"]')) {
          input.addEventListener('change', () => {
            const id = Number(input.value);
            if (input.checked) selectedIndustryIds.add(id);
            else selectedIndustryIds.delete(id);
            updatePickerLabel();
            loadCompanies();
          });
        }
      }

      function setPickerOpen(open) {
        pickerOpen = open;
        const menu = document.getElementById('industryPickerMenu');
        const btn = document.getElementById('industryPickerBtn');
        menu.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open) {
          document.getElementById('industrySearch').value = '';
          renderIndustryOptions('');
          document.getElementById('industrySearch').focus();
        }
      }

      function companyCard(row) {
        const tags = (row.industries || [])
          .map((item) => `<span class="industry-tag">${esc(item.name)}</span>`)
          .join('');
        return `
          <article class="card">
            <h3 style="margin:0 0 8px;font-size:18px">${esc(row.Name)}</h3>
            <a href="${esc(row.Url)}" target="_blank" rel="noopener noreferrer">${esc(row.Url)}</a>
            ${tags ? `<div>${tags}</div>` : ''}
            ${row.Notes ? `<p class="muted" style="margin:8px 0 0; white-space:pre-wrap">${esc(row.Notes)}</p>` : ''}
          </article>
        `;
      }

      function renderCompanies() {
        const list = document.getElementById('companiesList');
        const countEl = document.getElementById('resultCount');
        countEl.textContent = t('count', { n: companies.length });

        if (!companies.length) {
          list.innerHTML = `<div class="card"><p class="muted">${esc(t('noCompanies'))}</p></div>`;
          return;
        }

        if (selectedIndustryIds.size > 0) {
          const sorted = [...companies].sort((a, b) => String(a.Name).localeCompare(String(b.Name), lang));
          list.innerHTML = sorted.map((row) => companyCard(row)).join('');
          return;
        }

        const noIndustryLabel = t('noIndustry');
        const groups = new Map();
        for (const row of companies) {
          const key = row.primaryIndustry?.slug || 'other';
          const label = row.primaryIndustry?.name || noIndustryLabel;
          if (!groups.has(key)) groups.set(key, { label, rows: [] });
          groups.get(key).rows.push(row);
        }

        const orderedKeys = [...groups.keys()].sort((a, b) => {
          const labelA = groups.get(a).label;
          const labelB = groups.get(b).label;
          if (labelA === noIndustryLabel) return 1;
          if (labelB === noIndustryLabel) return -1;
          return labelA.localeCompare(labelB, lang);
        });

        list.innerHTML = orderedKeys
          .map((key) => {
            const group = groups.get(key);
            group.rows.sort((a, b) => String(a.Name).localeCompare(String(b.Name), lang));
            return `
              <section>
                <h2 class="section-title">${esc(group.label)}</h2>
                ${group.rows.map((row) => companyCard(row)).join('')}
              </section>
            `;
          })
          .join('');
      }

      async function loadCompanies() {
        const seq = ++loadSeq;
        const status = document.getElementById('status');
        const list = document.getElementById('companiesList');
        status.hidden = false;
        list.innerHTML = '';
        try {
          const rows = await api(companiesUrl());
          if (seq !== loadSeq) return;
          companies = rows;
          renderCompanies();
        } catch (err) {
          if (seq !== loadSeq) return;
          list.innerHTML = `<div class="card"><p class="error">${esc(t('loadCompaniesError'))}: ${esc(err.message)}</p></div>`;
          document.getElementById('resultCount').textContent = '—';
        } finally {
          if (seq === loadSeq) status.hidden = true;
        }
      }

      document.getElementById('industryPickerBtn').addEventListener('click', () => {
        setPickerOpen(!pickerOpen);
      });

      document.getElementById('industrySearch').addEventListener('input', (event) => {
        renderIndustryOptions(event.target.value);
      });

      document.getElementById('clearIndustriesBtn').addEventListener('click', () => {
        selectedIndustryIds = new Set();
        updatePickerLabel();
        renderIndustryOptions(document.getElementById('industrySearch').value);
        loadCompanies();
      });

      document.addEventListener('click', (event) => {
        const picker = document.getElementById('industryPicker');
        if (!picker.contains(event.target)) setPickerOpen(false);
      });

      applyI18n();

      (async () => {
        try {
          await waitForTelegramInitData();
          const rows = await api(industriesUrl());
          industries = rows;
          updatePickerLabel();
          renderIndustryOptions('');
          await loadCompanies();
        } catch (err) {
          document.getElementById('companiesList').innerHTML =
            `<div class="card"><p class="error">${esc(t('loadIndustriesError'))}: ${esc(err.message)}</p></div>`;
          document.getElementById('status').hidden = true;
        }
      })();
    </script>
</body>
</html>
