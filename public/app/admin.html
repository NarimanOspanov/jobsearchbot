<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
        --ok: #22c55e;
        --bad: #ef4444;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { width: 100%; max-width: 100%; margin: 0 auto; padding: 14px; display: grid; gap: 12px; box-sizing: border-box; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
      h1, h2, h3 { margin: 0 0 10px; }
      .muted { color: var(--muted); }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      input, select, button, textarea {
        border-radius: 8px; border: 1px solid var(--border); background: #0f1730; color: var(--text); padding: 8px; font: inherit;
      }
      button { cursor: pointer; background: var(--accent); border-color: var(--accent); }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid var(--border); padding: 8px; text-align: left; vertical-align: top; }
      th { color: var(--muted); font-weight: 600; }
      #jobsBody tr { cursor: pointer; }
      #jobsBody tr:hover { background: rgba(79, 124, 255, 0.08); }
      .ok { color: var(--ok); }
      .bad { color: var(--bad); }
      .layout {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
        align-items: stretch;
      }
      @media (min-width: 1024px) {
        .layout {
          grid-template-columns: minmax(0, 10%) minmax(0, 45%) minmax(0, 45%);
          min-height: calc(100vh - 100px);
        }
        .layout .card.layout-col {
          min-height: 0;
          max-height: calc(100vh - 100px);
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }
        .layout .layout-col-body {
          flex: 1;
          min-height: 0;
          overflow: auto;
        }
      }
      .users-list button { width: 100%; text-align: left; margin: 4px 0; }
      .selected { outline: 2px solid var(--accent); }
      .artifacts a { color: #8ab4ff; display: inline-block; margin-right: 10px; text-decoration: underline; font-weight: 600; }
      a { color: #9ec5ff; text-decoration: underline; font-weight: 600; }
      a:hover { color: #c7ddff; }
      .loader {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(158, 176, 209, 0.45);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
      }
      .loader.on { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      button:disabled, input:disabled, select:disabled, textarea:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      textarea { width: 100%; min-height: 130px; }
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.7);
        display: none; align-items: center; justify-content: center; z-index: 9999;
      }
      .modal-backdrop.on { display: flex; }
      .modal-card {
        width: min(1100px, 95vw); height: min(85vh, 900px); background: #0a1020;
        border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: grid;
        grid-template-rows: auto 1fr;
      }
      .modal-head {
        display: flex; justify-content: space-between; align-items: center; gap: 8px;
        padding: 8px 10px; border-bottom: 1px solid var(--border);
      }
      .modal-body iframe { width: 100%; height: 100%; border: 0; background: #fff; }
      .tag-remote {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        background: #1e3a5f;
        color: #93c5fd;
        border: 1px solid #3b82f6;
        cursor: help;
        vertical-align: middle;
      }
      .job-detail { color: var(--text); }
      .job-detail .sub { color: var(--muted); font-size: 13px; }
      .job-summary { margin: 10px 0; line-height: 1.45; color: var(--text); }
      .skills-block { margin-top: 12px; }
      .skills-block h4 { margin: 8px 0 6px; font-size: 13px; color: var(--muted); font-weight: 600; }
      .skill-tag {
        display: inline-block;
        margin: 2px 6px 2px 0;
        padding: 3px 8px;
        border-radius: 6px;
        background: #1a2540;
        border: 1px solid var(--border);
        font-size: 12px;
        cursor: help;
        line-height: 1.35;
      }
      .skill-tag.primary { border-color: #3b82f6; background: #152038; }
      .user-info-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }
      .user-info-grid .item {
        background: #0f1730;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
      }
      .user-info-grid .k {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 4px;
      }
      .date-range {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }
      .date-range-row {
        margin-top: 8px;
      }
      .section-separator {
        height: 1px;
        border: 0;
        background: var(--border);
        margin: 10px 0 8px;
      }
      .section-head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .ghost-btn {
        background: #0f1730;
        border: 1px solid var(--border);
      }
      .pager {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Admin Panel</h1>
      <p id="globalMsg" class="muted"></p>

      <div class="layout">
        <section class="card layout-col">
          <h2>Users</h2>
          <div id="usersList" class="users-list layout-col-body"></div>
        </section>

        <section class="card layout-col">
          <div class="section-head-row">
            <h2>User information and applications</h2>
            <button id="toggleUserInfoBtn" type="button" class="ghost-btn">Hide user info</button>
          </div>
          <div id="userInfoSection">
            <div id="selectedUserInfo" class="muted">Select a user to view user information.</div>
            <div class="row">
              <button id="openResumeBtn" type="button">Open resume</button>
            </div>
            <hr class="section-separator" />
          </div>
          <div class="row date-range-row">
            <span class="date-range">
              <label>From <input id="fromDate" type="date" /></label>
              <label>To <input id="toDate" type="date" /></label>
            </span>
          </div>
          <div class="row date-range-row">
            <label>Skill <select id="skillId"><option value="">All</option></select></label>
            <label>Source
              <select id="sourceSel">
                <option value="">All</option>
                <option value="Linkedin">Linkedin</option>
                <option value="Indeed">Indeed</option>
                <option value="hirehi">hirehi</option>
              </select>
            </label>
          </div>
          <div class="row date-range-row">
            <button id="syncBtn">Search remote jobs</button>
            <span id="syncLoader" class="loader" aria-hidden="true"></span>
            <span class="pager">
              <button id="prevPageBtn" type="button" class="ghost-btn">Prev</button>
              <span id="pageInfo" class="muted">Page 1</span>
              <button id="nextPageBtn" type="button" class="ghost-btn">Next</button>
              <label>Page size
                <select id="pageSizeSel">
                  <option value="50">50</option>
                  <option value="100" selected>100</option>
                  <option value="200">200</option>
                </select>
              </label>
            </span>
          </div>
          <p id="dashMsg" class="muted"></p>
          <div class="layout-col-body">
            <table>
              <thead>
                <tr>
                  <th>Id</th><th>Title</th><th>Company</th><th>Location</th><th>Posted</th><th>Apply type</th><th>Status</th>
                </tr>
              </thead>
              <tbody id="jobsBody"></tbody>
            </table>
          </div>
        </section>

        <section class="card layout-col">
          <h2>Job details</h2>
          <div class="layout-col-body">
            <div id="jobInfo" class="muted">Select a job to continue.</div>
            <div id="jobActions" style="display:none">
              <div class="row">
                <label>Status
                  <select id="statusSel">
                    <option value="new">new</option>
                    <option value="applied">applied</option>
                    <option value="skipped">skipped</option>
                  </select>
                </label>
                <button id="genBtn">Generate Tailored CV + Cover Letter</button>
                <span id="jobLoader" class="loader" aria-hidden="true"></span>
              </div>
              <div class="artifacts" id="artifactLinks" style="margin-top:8px"></div>
              <label>Cover Letter</label>
              <textarea id="coverPreview" readonly></textarea>
              <p id="jobMsg" class="muted"></p>
            </div>
            <div id="jobNotesBlock" class="job-detail" style="display:none;margin-top:12px">
              <div class="skills-block">
                <h4>Admin notes</h4>
                <textarea id="notesText" aria-label="Admin notes"></textarea>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
    <div id="cvModal" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <strong id="cvModalTitle">Document</strong>
          <button id="cvModalClose" type="button">Close</button>
        </div>
        <div class="modal-body">
          <iframe id="cvModalFrame" title="Document preview"></iframe>
        </div>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      const API_BASE = '';
      const USERS_URL = `/api/app/admin/users`;
      const SKILLS_URL = '/api/admin/skills';
      const POSITIONS_URL = '/api/admin/positions';

      let users = [];
      let skills = [];
      let positions = [];
      let applications = [];
      let selectedJob = null;
      let selectedApplication = null;
      let jobsSort = { key: 'id', dir: 'desc' };
      let isSyncing = false;
      let isJobBusy = false;
      let isUserInfoHidden = false;
      let pageInfo = { page: 1, pageSize: 100, hasMore: false, count: 0 };

      function q() {
        const p = new URLSearchParams(location.search);
        return {
          seekerId: p.get('seekerId') || '',
          from: p.get('from') || '',
          to: p.get('to') || '',
          skillId: p.get('skillId') || '',
          source: p.get('source') || '',
          jobId: p.get('jobId') || '',
          page: p.get('page') || '1',
          pageSize: p.get('pageSize') || '100',
        };
      }
      function setQ(next) {
        const p = new URLSearchParams(location.search);
        Object.entries(next).forEach(([k, v]) => {
          if (v == null || v === '') p.delete(k); else p.set(k, String(v));
        });
        history.replaceState(null, '', `?${p.toString()}`);
      }
      function setMsg(id, txt, isErr = false) {
        const el = document.getElementById(id);
        el.textContent = txt || '';
        el.className = isErr ? 'bad' : 'muted';
      }
      function esc(v) {
        return String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      /** For HTML attribute values (e.g. title tooltips). */
      function attrEsc(v) {
        return String(v || '')
          .replace(/\r\n|\r|\n/g, ' ')
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;');
      }
      function skillDisplayLine(s) {
        const roleName = String(s.roleName || '').trim() || '—';
        const name = String(s.name || '').trim() || '—';
        return `${roleName} : ${name}`;
      }
      function remoteTagHtml(remoteReasoning) {
        const r = String(remoteReasoning || '').trim();
        if (!r) return '';
        return `<span class="tag-remote" title="${attrEsc(r)}">Remote</span>`;
      }
      function renderJobSkillsHtml(skills) {
        const list = Array.isArray(skills) ? skills : [];
        const primary = list.filter((s) => s.isHighlyRelevant === true);
        const secondary = list.filter((s) => s.isHighlyRelevant !== true);
        const chips = (arr, cls) =>
          arr
            .map((s) => {
              const label = esc(skillDisplayLine(s));
              const tip = attrEsc(s.justification || '');
              return `<span class="skill-tag ${cls}" title="${tip}">${label}</span>`;
            })
            .join('');
        let out = '<div class="skills-block">';
        out += `<h4>Primary skills</h4><div>${chips(primary, 'primary') || '<span class="muted">None</span>'}</div>`;
        out += `<h4>Secondary skills</h4><div>${chips(secondary, '') || '<span class="muted">None</span>'}</div>`;
        out += '</div>';
        return out;
      }
      function formatPostedDate(v) {
        const s = String(v || '').trim();
        if (!s) return '';
        if (s.includes('T')) return s.split('T')[0];
        return s;
      }
      function sortArrow(key) {
        if (jobsSort.key !== key) return '';
        return jobsSort.dir === 'asc' ? ' ▲' : ' ▼';
      }
      function asComparableDate(v) {
        const t = new Date(String(v || '')).getTime();
        return Number.isFinite(t) ? t : 0;
      }
      function compareJobs(a, b) {
        const appA = appByScreenlyId(a.id);
        const appB = appByScreenlyId(b.id);
        const dir = jobsSort.dir === 'asc' ? 1 : -1;
        let va = '';
        let vb = '';
        switch (jobsSort.key) {
          case 'id':
            return (Number(a.id) - Number(b.id)) * dir;
          case 'title':
            va = String(a.title || '').toLowerCase();
            vb = String(b.title || '').toLowerCase();
            break;
          case 'company':
            va = String(a.company || '').toLowerCase();
            vb = String(b.company || '').toLowerCase();
            break;
          case 'location':
            va = String(a.location || '').toLowerCase();
            vb = String(b.location || '').toLowerCase();
            break;
          case 'posted':
            return (asComparableDate(a.publishedAt) - asComparableDate(b.publishedAt)) * dir;
          case 'status':
            va = String(appA?.Status || 'new').toLowerCase();
            vb = String(appB?.Status || 'new').toLowerCase();
            break;
          default:
            va = String(a.title || '').toLowerCase();
            vb = String(b.title || '').toLowerCase();
            break;
        }
        if (va < vb) return -1 * dir;
        if (va > vb) return 1 * dir;
        return 0;
      }
      function setJobsSort(key) {
        if (jobsSort.key === key) {
          jobsSort.dir = jobsSort.dir === 'asc' ? 'desc' : 'asc';
        } else {
          jobsSort.key = key;
          jobsSort.dir = (key === 'posted' || key === 'id') ? 'desc' : 'asc';
        }
        renderJobs();
      }
      function onLoading(id, on) {
        const el = document.getElementById(id);
        el.className = on ? 'loader on' : 'loader';
      }
      function setSyncBusy(on) {
        isSyncing = on;
        onLoading('syncLoader', on);
        ['syncBtn', 'fromDate', 'toDate', 'skillId', 'sourceSel', 'openResumeBtn', 'prevPageBtn', 'nextPageBtn', 'pageSizeSel'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.disabled = on;
        });
      }
      function updatePagerUi() {
        const info = document.getElementById('pageInfo');
        const prev = document.getElementById('prevPageBtn');
        const next = document.getElementById('nextPageBtn');
        const sizeSel = document.getElementById('pageSizeSel');
        if (info) info.textContent = `Page ${pageInfo.page} · ${pageInfo.count} item(s)`;
        if (prev) prev.disabled = isSyncing || pageInfo.page <= 1;
        if (next) next.disabled = isSyncing || !pageInfo.hasMore;
        if (sizeSel) sizeSel.value = String(pageInfo.pageSize);
      }
      function setJobBusy(on) {
        isJobBusy = on;
        onLoading('jobLoader', on);
        ['statusSel', 'notesText', 'genBtn'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.disabled = on;
        });
      }
      function setUserInfoVisibility(hidden) {
        isUserInfoHidden = !!hidden;
        const section = document.getElementById('userInfoSection');
        const btn = document.getElementById('toggleUserInfoBtn');
        if (section) section.style.display = isUserInfoHidden ? 'none' : '';
        if (btn) btn.textContent = isUserInfoHidden ? 'Show user info' : 'Hide user info';
      }
      function openCvModal(title, url) {
        document.getElementById('cvModalTitle').textContent = title || 'Document';
        document.getElementById('cvModalFrame').src = url || 'about:blank';
        document.getElementById('cvModal').classList.add('on');
      }
      function closeCvModal() {
        document.getElementById('cvModal').classList.remove('on');
        document.getElementById('cvModalFrame').src = 'about:blank';
      }
      async function api(url, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        const res = await fetch(url, { ...options, headers });
        if (!res.ok) throw new Error(await res.text());
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (ct.includes('application/json')) return res.json();
        return res.text();
      }

      async function loadUsers() {
        const rows = await api(USERS_URL);
        users = (rows || []).filter((u) => !!u.resumeUrl);
        renderUsers();
      }
      function renderUsers() {
        const root = document.getElementById('usersList');
        const qs = q();
        if (!users.length) {
          root.innerHTML = '<p class="muted">No users with resume data.</p>';
          return;
        }
        root.innerHTML = users.map((u) => `
          <button data-id="${u.id}" class="${String(u.id) === qs.seekerId ? 'selected' : ''}">
            #${u.id}
            ${esc([String(u.firstName || '').trim(), String(u.lastName || '').trim()].filter(Boolean).join(' ') || u.telegramUserName || '')}
            (${esc(u.telegramChatId)})
          </button>
        `).join('');
        root.querySelectorAll('button[data-id]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = btn.getAttribute('data-id');
            setQ({ seekerId: id });
            renderUsers();
            renderSelectedUserInfo();
          });
        });
      }
      function renderSelectedUserInfo() {
        const el = document.getElementById('selectedUserInfo');
        const u = getSelectedUser();
        if (!u) {
          el.className = 'muted';
          el.innerHTML = 'Select a user to view user information.';
          return;
        }
        const username = String(u.telegramUserName || '').trim();
        const firstName = String(u.firstName || '').trim();
        const lastName = String(u.lastName || '').trim();
        const usernameNoAt = username.replace(/^@/, '');
        const usernameHtml = usernameNoAt
          ? `<a href="https://t.me/${encodeURIComponent(usernameNoAt)}" target="_blank" rel="noopener noreferrer">${esc(usernameNoAt)}</a>`
          : '—';
        el.className = 'job-detail';
        el.innerHTML = `
          <div class="user-info-grid">
            <div class="item">
              <div class="k">Telegram username</div>
              <div>${usernameHtml}</div>
            </div>
            <div class="item">
              <div class="k">First name</div>
              <div>${esc(firstName || '—')}</div>
            </div>
            <div class="item">
              <div class="k">Last name</div>
              <div>${esc(lastName || '—')}</div>
            </div>
            <div class="item">
              <div class="k">User Id</div>
              <div>${esc(String(u.id || '—'))}</div>
            </div>
            <div class="item">
              <div class="k">TelegramChatId</div>
              <div>${esc(String(u.telegramChatId || '—'))}</div>
            </div>
          </div>
        `;
      }

      async function loadSkills() {
        const payload = await api(SKILLS_URL);
        skills = payload.skills || payload || [];
        const sel = document.getElementById('skillId');
        const labelOf = (s) => {
          const roleName = String(s.roleName || s.RoleName || '').trim();
          const name = String(s.name || s.Name || `${s.id}`).trim();
          if (roleName && name) return `${roleName}:${name}`;
          return roleName || name || String(s.id);
        };
        sel.innerHTML = '<option value="">All</option>' + skills.map((s) =>
          `<option value="${s.id}">${esc(labelOf(s))}</option>`
        ).join('');
      }

      async function loadApplicationsByUser(userId) {
        applications = await api(`${API_BASE}/api/app/applications/by-user?userId=${encodeURIComponent(userId)}&limit=100&offset=0`);
      }

      async function syncJobs() {
        if (isSyncing) return;
        const seekerId = q().seekerId;
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const skillId = document.getElementById('skillId').value;
        const source = document.getElementById('sourceSel').value;
        const query = q();
        const page = Math.max(1, Number.parseInt(String(query.page || '1'), 10) || 1);
        const pageSize = Math.min(200, Math.max(1, Number.parseInt(String(query.pageSize || '100'), 10) || 100));
        if (!seekerId) throw new Error('Select seeker first.');
        if (!from || !to) throw new Error('Set from and to dates.');

        setQ({ seekerId, from, to, skillId, source, page, pageSize });
        setSyncBusy(true);
        try {
          const posUrl = `${POSITIONS_URL}?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}${skillId ? `&skillId=${encodeURIComponent(skillId)}` : ''}${source ? `&source=${encodeURIComponent(source)}` : ''}&page=${encodeURIComponent(page)}&pageSize=${encodeURIComponent(pageSize)}`;
          const data = await api(posUrl);
          positions = data.positions || [];
          pageInfo = {
            page: Number(data.page || page),
            pageSize: Number(data.pageSize || pageSize),
            hasMore: !!data.hasMore,
            count: Number(data.count || positions.length),
          };
          await loadApplicationsByUser(seekerId);
          renderJobs();
          updatePagerUi();
          setMsg('dashMsg', `Loaded ${pageInfo.count} jobs (page ${pageInfo.page}).`);
        } finally {
          setSyncBusy(false);
          updatePagerUi();
        }
      }

      function appByScreenlyId(screenlyId) {
        return applications.find((a) => Number(a.ScreenlyJobId) === Number(screenlyId)) || null;
      }

      function renderJobs() {
        const body = document.getElementById('jobsBody');
        const headRow = document.querySelector('table thead tr');
        headRow.innerHTML = `
          <th><button type="button" data-sort="id">Id${sortArrow('id')}</button></th>
          <th><button type="button" data-sort="title">Title${sortArrow('title')}</button></th>
          <th><button type="button" data-sort="company">Company${sortArrow('company')}</button></th>
          <th><button type="button" data-sort="location">Location${sortArrow('location')}</button></th>
          <th><button type="button" data-sort="posted">Posted${sortArrow('posted')}</button></th>
          <th>Apply type</th>
          <th><button type="button" data-sort="status">Status${sortArrow('status')}</button></th>
        `;
        headRow.querySelectorAll('button[data-sort]').forEach((btn) => {
          btn.addEventListener('click', () => setJobsSort(btn.getAttribute('data-sort')));
        });

        if (!positions.length) {
          body.innerHTML = '<tr><td colspan="7" class="muted">No jobs loaded.</td></tr>';
          return;
        }
        const sorted = [...positions].sort(compareJobs);
        body.innerHTML = sorted.map((p) => {
          const app = appByScreenlyId(p.id);
          return `<tr data-open="${p.id}">
            <td>${esc(p.id)}</td>
            <td>${esc(p.title)}</td>
            <td>${esc(p.company)}</td>
            <td>${esc(p.location)}</td>
            <td>${esc(formatPostedDate(p.publishedAt))}</td>
            <td>${esc(p.applyType || '—')}</td>
            <td>${esc(app?.Status || 'new')}</td>
          </tr>`;
        }).join('');
        body.querySelectorAll('tr[data-open]').forEach((row) => {
          row.addEventListener('click', () => {
            const id = Number(row.getAttribute('data-open'));
            setQ({ jobId: id });
            openJobById(id);
          });
        });
      }

      async function ensureApplication(seekerId, job) {
        let app = appByScreenlyId(job.id);
        if (app) return app;
        app = await api(`${API_BASE}/api/app/applications`, {
          method: 'POST',
          body: JSON.stringify({
            userId: Number(seekerId),
            screenlyJobId: Number(job.id),
            vacancyTitle: job.title,
            companyName: job.company,
            source: job.source,
            appliedAt: job.publishedAt,
            metaJson: {
              positionId: job.id,
              applyUrl: job.applyUrl || null,
              location: job.location || null,
              shortSummary: job.shortSummary || null,
            },
          }),
        });
        await loadApplicationsByUser(seekerId);
        return appByScreenlyId(job.id) || app;
      }

      function openJobById(id) {
        const job = positions.find((x) => Number(x.id) === Number(id));
        if (!job) {
          document.getElementById('jobNotesBlock').style.display = 'none';
          document.getElementById('jobActions').style.display = 'none';
          return;
        }
        selectedJob = job;
        selectedApplication = appByScreenlyId(job.id);
        document.getElementById('jobInfo').classList.remove('muted');
        document.getElementById('jobNotesBlock').style.display = 'block';
        document.getElementById('jobActions').style.display = 'block';
        const remoteHtml = String(job.remoteReasoning || '').trim()
          ? `<div class="skills-block" style="margin-top:10px"><div>${remoteTagHtml(job.remoteReasoning)}</div></div>`
          : '';
        const sumHtml = String(job.shortSummary || '').trim()
          ? `<div class="skills-block" style="margin-top:10px"><h4>Summary</h4><p class="job-summary" style="margin:0">${esc(job.shortSummary)}</p></div>`
          : '';
        document.getElementById('jobInfo').innerHTML =
          `<div class="job-detail">` +
          `<div><strong>${esc(job.title)}</strong></div>` +
          `<div class="sub">${esc(job.company)} · ${esc(job.location)}</div>` +
          `<div style="margin-top:6px"><a href="${esc(job.applyUrl || '#')}" target="_blank" rel="noopener noreferrer">Open source job link</a></div>` +
          remoteHtml +
          sumHtml +
          renderJobSkillsHtml(job.skills) +
          `</div>`;
        document.getElementById('statusSel').value = selectedApplication?.Status || 'new';
        document.getElementById('notesText').value = selectedApplication?.Notes || '';
        renderArtifacts();
      }

      function renderArtifacts() {
        const links = document.getElementById('artifactLinks');
        const cover = document.getElementById('coverPreview');
        if (!selectedApplication) {
          links.innerHTML = '';
          cover.value = '';
          return;
        }
        links.innerHTML = selectedApplication.TailoredCVURL
          ? `
            <button type="button" id="openTailoredCvBtn">Tailored CV (open)</button>
            <a href="${esc(selectedApplication.TailoredCVURL)}" download target="_blank" rel="noopener noreferrer">Download Tailored CV</a>
          `
          : '';
        const openBtn = document.getElementById('openTailoredCvBtn');
        if (openBtn) {
          openBtn.addEventListener('click', () => {
            openCvModal('Tailored CV', selectedApplication.TailoredCVURL);
          });
        }
        cover.value = selectedApplication.CoverLetter || '';
      }

      async function saveStatus() {
        if (isJobBusy) return;
        const seekerId = q().seekerId;
        if (!selectedJob) throw new Error('Open a job first.');
        if (!seekerId) throw new Error('Select seeker first.');
        setJobBusy(true);
        try {
          const app = await ensureApplication(seekerId, selectedJob);
          const updated = await api(`${API_BASE}/api/app/applications/${app.Id}`, {
            method: 'PATCH',
            body: JSON.stringify({
              status: document.getElementById('statusSel').value,
              notes: document.getElementById('notesText').value,
            }),
          });
          selectedApplication = updated;
          await loadApplicationsByUser(seekerId);
          renderJobs();
          renderArtifacts();
          setMsg('jobMsg', 'Status saved.');
        } finally {
          setJobBusy(false);
        }
      }

      function getSelectedUser() {
        const seekerId = q().seekerId;
        if (!seekerId) return null;
        return users.find((u) => String(u.id) === String(seekerId)) || null;
      }

      function openSelectedUserResume() {
        const u = getSelectedUser();
        if (!u || !u.resumeUrl) {
          setMsg('dashMsg', 'Selected user has no resumeUrl.', true);
          return;
        }
        openCvModal(`Resume: #${u.id}`, u.resumeUrl);
      }

      async function generateMaterials() {
        if (isJobBusy) return;
        const seekerId = q().seekerId;
        if (!selectedJob) throw new Error('Open a job first.');
        if (!seekerId) throw new Error('Select seeker first.');
        setJobBusy(true);
        try {
          const app = await ensureApplication(seekerId, selectedJob);
          const resumePayload = await api(`${API_BASE}/api/app/admin/users/${encodeURIComponent(seekerId)}/resume-text`);
          const mainResumeText = String(resumePayload.resumeText || '').trim();
          if (!mainResumeText) throw new Error('Resume text is empty for selected user.');

          const [tailored, cover] = await Promise.all([
            api(`${API_BASE}/api/tailored-resume/upload`, {
              method: 'POST',
              body: JSON.stringify({
                seekerId: Number(seekerId),
                screenlyJobId: Number(selectedJob.id),
                jobTitle: selectedJob.title || '',
                jobDescription: `${selectedJob.shortSummary || ''}\n\n${selectedJob.contacts || ''}`,
                mainResumeText,
              }),
            }),
            api(`${API_BASE}/api/cover-letter`, {
              method: 'POST',
              body: JSON.stringify({
                jobTitle: selectedJob.title || '',
                jobDescription: `${selectedJob.shortSummary || ''}\n\n${selectedJob.contacts || ''}`,
                mainResumeText,
              }),
            }),
          ]);

          const updated = await api(`${API_BASE}/api/app/applications/${app.Id}`, {
            method: 'PATCH',
            body: JSON.stringify({
              tailoredCvUrl: tailored.tailoredCvUrl,
              coverLetter: cover.coverLetter,
              notes: document.getElementById('notesText').value,
            }),
          });
          selectedApplication = updated;
          await loadApplicationsByUser(seekerId);
          renderJobs();
          renderArtifacts();
          setMsg('jobMsg', 'Tailored CV + cover letter generated and saved.');
        } finally {
          setJobBusy(false);
        }
      }

      function hydrateStateToInputs() {
        const s = q();
        if (s.from && s.to) {
          document.getElementById('fromDate').value = s.from;
          document.getElementById('toDate').value = s.to;
          return;
        }
        const now = new Date();
        const to = now.toISOString().slice(0, 10);
        const prev = new Date(now);
        prev.setMonth(prev.getMonth() - 1);
        const from = prev.toISOString().slice(0, 10);
        document.getElementById('fromDate').value = from;
        document.getElementById('toDate').value = to;
      }

      async function boot() {
        hydrateStateToInputs();
        await Promise.all([loadUsers(), loadSkills()]);
        renderSelectedUserInfo();
        const s = q();
        if (s.skillId) document.getElementById('skillId').value = s.skillId;
        if (s.source) document.getElementById('sourceSel').value = s.source;
        document.getElementById('pageSizeSel').value = String(Math.min(200, Math.max(1, Number.parseInt(String(s.pageSize || '100'), 10) || 100)));
        updatePagerUi();
        if (s.seekerId && s.from && s.to) {
          await syncJobs();
          if (s.jobId) openJobById(Number(s.jobId));
        }
      }

      document.getElementById('syncBtn').addEventListener('click', () => syncJobs().catch((e) => setMsg('dashMsg', e.message, true)));
      document.getElementById('prevPageBtn').addEventListener('click', () => {
        const cur = q();
        const nextPage = Math.max(1, (Number.parseInt(String(cur.page || '1'), 10) || 1) - 1);
        setQ({ page: nextPage });
        syncJobs().catch((e) => setMsg('dashMsg', e.message, true));
      });
      document.getElementById('nextPageBtn').addEventListener('click', () => {
        const cur = q();
        const nextPage = (Number.parseInt(String(cur.page || '1'), 10) || 1) + 1;
        setQ({ page: nextPage });
        syncJobs().catch((e) => setMsg('dashMsg', e.message, true));
      });
      document.getElementById('pageSizeSel').addEventListener('change', () => {
        const nextSize = Math.min(200, Math.max(1, Number.parseInt(document.getElementById('pageSizeSel').value, 10) || 100));
        setQ({ pageSize: nextSize, page: 1 });
        syncJobs().catch((e) => setMsg('dashMsg', e.message, true));
      });
      document.getElementById('toggleUserInfoBtn').addEventListener('click', () => {
        setUserInfoVisibility(!isUserInfoHidden);
      });
      document.getElementById('statusSel').addEventListener('change', () => saveStatus().catch((e) => setMsg('jobMsg', e.message, true)));
      document.getElementById('notesText').addEventListener('blur', () => saveStatus().catch((e) => setMsg('jobMsg', e.message, true)));
      document.getElementById('genBtn').addEventListener('click', () => generateMaterials().catch((e) => setMsg('jobMsg', e.message, true)));
      document.getElementById('openResumeBtn').addEventListener('click', openSelectedUserResume);
      document.getElementById('cvModalClose').addEventListener('click', closeCvModal);
      document.getElementById('cvModal').addEventListener('click', (e) => {
        if (e.target.id === 'cvModal') closeCvModal();
      });

      boot().catch((err) => {
        setMsg('globalMsg', `Failed to initialize admin panel: ${err.message}`, true);
      });
    </script>
  </body>
</html>
