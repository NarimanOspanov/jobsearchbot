<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applications</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px 16px 84px; display: grid; gap: 16px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
      h1, h2 { margin: 0 0 12px; }
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }
      input, select, textarea, button {
        width: 100%; border-radius: 8px; border: 1px solid var(--border); background: #0f1730; color: var(--text); padding: 10px; font: inherit;
      }
      button { cursor: pointer; background: var(--accent); border-color: var(--accent); font-weight: 600; }
      textarea { min-height: 80px; resize: vertical; }
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .full { grid-column: 1 / -1; }
      .apps { display: grid; gap: 10px; }
      .app-item { border: 1px solid var(--border); border-radius: 10px; padding: 10px; background: #10182d; }
      .pill { border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; font-size: 12px; color: var(--muted); }
      .muted { color: var(--muted); }
      .bottom-nav {
        position: fixed; left: 0; right: 0; bottom: 0; background: #0f1730; border-top: 1px solid var(--border);
        display: flex; justify-content: flex-start; gap: 10px; padding: 10px 12px;
      }
      .nav-item {
        color: var(--muted); text-decoration: none; padding: 8px 12px; border-radius: 10px; border: 1px solid transparent;
      }
      .nav-item.active { color: var(--text); border-color: var(--border); background: #151f3c; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Applications</h1>

      <section class="card">
        <h2>Add application</h2>
        <form id="appForm" class="form-grid">
          <input class="full" id="vacancyTitle" placeholder="Vacancy title *" required />
          <input id="companyName" placeholder="Company name" />
          <select id="source">
            <option value="">Source</option>
            <option value="headhunter">HeadHunter</option>
            <option value="linkedin">LinkedIn</option>
            <option value="indeed">Indeed</option>
            <option value="company_site">Company site</option>
            <option value="founder_email">Founder email</option>
            <option value="recruiter_email">Recruiter email</option>
          </select>
          <select id="status">
            <option value="applied">Applied</option>
            <option value="interview">Interview</option>
            <option value="rejected">Rejected</option>
            <option value="offer">Offer</option>
          </select>
          <textarea id="notes" class="full" placeholder="Notes (optional)"></textarea>
          <button class="full" type="submit">Add application</button>
        </form>
      </section>

      <section class="card">
        <h2>Applications</h2>
        <div id="appsList" class="apps"></div>
      </section>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item active" href="/app/applications">Applications</a>
      <a class="nav-item" href="/app/profile">Profile</a>
    </nav>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      async function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        const response = await fetch(path, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function renderApplications(rows) {
        const list = document.getElementById('appsList');
        if (!rows.length) {
          list.innerHTML = '<p class="muted">No applications yet.</p>';
          return;
        }
        list.innerHTML = rows.map((row) => {
          const appliedAt = row.AppliedAt ? new Date(row.AppliedAt).toLocaleString() : '-';
          return `
            <article class="app-item">
              <div style="display:flex;justify-content:space-between;gap:10px;">
                <strong>${(row.VacancyTitle || '').replace(/</g, '&lt;')}</strong>
                <span class="pill">${(row.Status || 'applied').replace(/</g, '&lt;')}</span>
              </div>
              <div class="muted" style="margin-top:6px;">${(row.CompanyName || 'Unknown company').replace(/</g, '&lt;')}</div>
              <div class="muted" style="margin-top:4px;">Source: ${(row.Source || '-').replace(/</g, '&lt;')}</div>
              <div class="muted" style="margin-top:4px;">Applied: ${appliedAt}</div>
              ${row.Notes ? `<div style="margin-top:8px;">${String(row.Notes).replace(/</g, '&lt;')}</div>` : ''}
            </article>`;
        }).join('');
      }

      async function loadApplications() {
        const rows = await api('/api/app/applications?limit=100&offset=0');
        renderApplications(rows);
      }

      document.getElementById('appForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = {
          vacancyTitle: document.getElementById('vacancyTitle').value.trim(),
          companyName: document.getElementById('companyName').value.trim(),
          source: document.getElementById('source').value || null,
          status: document.getElementById('status').value || 'applied',
          notes: document.getElementById('notes').value.trim(),
        };
        if (!payload.vacancyTitle) return;
        await api('/api/app/applications', { method: 'POST', body: JSON.stringify(payload) });
        event.target.reset();
        await loadApplications();
      });

      loadApplications().catch((err) => alert(`Failed to load applications: ${err.message}`));
    </script>
  </body>
</html>
