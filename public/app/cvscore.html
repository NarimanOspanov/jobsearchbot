<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a38;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #f0f0f8;
    --muted: #8888aa;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding-bottom: 32px;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 28px 20px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .header-label {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-family: 'Syne', sans-serif;
  }
  .candidate-name { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 4px; }
  .candidate-title { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
  .score-ring-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
  .ring-container { position: relative; width: 120px; height: 120px; }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }
  .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
  .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-score { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1; }
  .ring-max { font-size: 11px; color: var(--muted); }
  .grade-badge {
    display: inline-block; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    padding: 4px 14px; border-radius: 20px; background: rgba(108,99,255,0.2); border: 1px solid rgba(108,99,255,0.5); color: var(--accent);
  }
  .content { padding: 0 16px; margin-top: 16px; }
  .roast-card {
    background: linear-gradient(135deg, rgba(255,101,132,0.12), rgba(255,101,132,0.05));
    border: 1px solid rgba(255,101,132,0.25); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px;
  }
  .section-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; }
  .section-title:first-child { margin-top: 0; }
  .category-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .cat-score { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); }
  .bar-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); width: 0%; }
  .cat-feedback { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  .list-item { display: flex; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; }
  .list-item:last-child { border-bottom: none; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; color: var(--muted); font-size: 14px; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-state { display: none; padding: 40px 20px; text-align: center; color: var(--muted); }
  #report { display: none; }
  .subscribe-backdrop {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); align-items: center; justify-content: center; padding: 16px;
  }
  .subscribe-backdrop.on { display: flex; }
  .subscribe-card {
    width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; text-align: center;
  }
  .subscribe-card h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin: 12px 0 8px; }
  .subscribe-card p { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
  .subscribe-card button {
    width: 100%; margin-top: 8px; padding: 12px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font: inherit; font-weight: 600; cursor: pointer;
  }
  .subscribe-card button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .subscribe-card button:disabled { opacity: 0.5; cursor: not-allowed; }
  #subscribeGateMsg { margin-top: 10px; font-size: 13px; min-height: 1.2em; }
</style>

  function getLang() {
    const raw = tg?.initDataUnsafe?.user?.language_code || navigator.language || 'en';
    const code = raw.split('-')[0].toLowerCase();
    return I18N[code] ? code : 'en';
  }

  const T = I18N[getLang()];

  document.getElementById('txt-loading').textContent       = T.loading;
  document.getElementById('txt-report-label').textContent  = T.reportLabel;
  document.getElementById('txt-breakdown-title').textContent = T.breakdown;
  document.getElementById('txt-strengths-title').textContent = T.strengthsTitle;
  document.getElementById('txt-fixes-title').textContent   = T.fixesTitle;
  document.getElementById('error-msg').innerHTML           = T.noResult;
  const SUB = {
    subscribeTitle: T.subscribeTitle || I18N.en.subscribeTitle,
    subscribeBody: T.subscribeBody || I18N.en.subscribeBody,
    openChannel: T.openChannel || I18N.en.openChannel,
    verifySubscribe: T.verifySubscribe || I18N.en.verifySubscribe,
    subscribeStill: T.subscribeStill || I18N.en.subscribeStill,
    channelMissing: T.channelMissing || I18N.en.channelMissing,
    verifyFail: T.verifyFail || I18N.en.verifyFail,
  };
  document.getElementById('txt-subscribe-title').textContent = SUB.subscribeTitle;
  document.getElementById('txt-subscribe-body').textContent = SUB.subscribeBody;
  document.getElementById('openRequiredChannelBtn').textContent = SUB.openChannel;
  document.getElementById('verifySubscriptionBtn').textContent = SUB.verifySubscribe;

  function escapeHtml(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function translateCategoryName(name) {
    const map = T.categories || I18N.en.categories;
    return map[name] || name;
  }
  function scoreColor(s) { if (s >= 75) return 'var(--accent3)'; if (s >= 50) return '#ffd166'; return 'var(--accent2)'; }
  function barColor(s) { if (s >= 75) return 'linear-gradient(90deg, #43e97b, #38f9d7)'; if (s >= 50) return 'linear-gradient(90deg, #f7971e, #ffd200)'; return 'linear-gradient(90deg, #ff6584, #ff8e53)'; }
  function ringColor(s) { if (s >= 75) return '#43e97b'; if (s >= 50) return '#ffd166'; return '#ff6584'; }
  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').innerHTML = msg;
    document.getElementById('error-state').style.display = 'block';
  }
  function renderReport(d) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('report').style.display = 'block';
    document.getElementById('cand-name').textContent = d.name || 'Candidate';
    document.getElementById('cand-title').textContent = d.title || '';
    document.getElementById('grade-badge').textContent = `${T.grade}: ${d.grade || '-'}`;
    const score = Number(d.ats_score || 0);
    const circumference = 314;
    const fill = document.getElementById('ring-fill');
    fill.style.stroke = ringColor(score);
    document.getElementById('ring-score').textContent = String(score);
    document.getElementById('ring-score').style.color = ringColor(score);
    setTimeout(() => { fill.style.strokeDashoffset = String(circumference - (score / 100) * circumference); }, 80);
    const catContainer = document.getElementById('categories-container');
    catContainer.innerHTML = '';
    (d.categories || []).forEach((cat, i) => {
      const max = Number(cat.max || 100) || 100;
      const val = Number(cat.score || 0);
      const pct = Math.max(0, Math.min(100, Math.round((val / max) * 100)));
      const catLabel = translateCategoryName(cat.name || 'Category');
      const el = document.createElement('div');
      el.className = 'category-item';
      el.innerHTML = `
        <div class="cat-header">
          <span>${escapeHtml(catLabel)}</span>
          <span class="cat-score" style="color:${scoreColor(pct)}">${val}<span style="color:var(--muted);font-size:11px">/${max}</span></span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="bar-${i}" style="background:${barColor(pct)}"></div></div>
        <div class="cat-feedback">${escapeHtml(cat.feedback || '')}</div>
      `;
      catContainer.appendChild(el);
      setTimeout(() => { const b = document.getElementById(`bar-${i}`); if (b) b.style.width = `${pct}%`; }, 160 + i * 60);
    });
    const fixes = document.getElementById('fixes-list');
    const fixItems = d.critical_fixes || [];
    fixes.innerHTML = fixItems.length
      ? fixItems.map((f) => `<div class="list-item"><span>${escapeHtml(f)}</span></div>`).join('')
      : `<div class="list-item"><span style="color:var(--muted)">${escapeHtml(T.noFixes || I18N.en.noFixes)}</span></div>`;
    const strengths = document.getElementById('strengths-list');
    const strengthItems = d.strengths || [];
    strengths.innerHTML = strengthItems.length
      ? strengthItems.map((s) => `<div class="list-item"><span>${escapeHtml(s)}</span></div>`).join('')
      : `<div class="list-item"><span style="color:var(--muted)">${escapeHtml(T.noStrengths || I18N.en.noStrengths)}</span></div>`;
  }
  function getTgInitDataString() {
    return String(tg?.initData || window.Telegram?.WebView?.initParams?.tgWebAppData || '').trim();
  }

  function attachMiniAppAuthHeaders(headers) {
    const data = getTgInitDataString();
    if (data) {
      headers['x-init-data'] = data;
      headers.Authorization = `tma ${data}`;
    }
  }

  function setSubscribeMsg(text, isError) {
    const el = document.getElementById('subscribeGateMsg');
    el.textContent = text || '';
    el.style.color = isError ? 'var(--accent2)' : 'var(--muted)';
  }

  function openSubscribeRequiredModal(payload) {
    const channels = Array.isArray(payload?.channels) ? payload.channels : [];
    const openBtn = document.getElementById('openRequiredChannelBtn');
    const firstUrl = String(channels[0]?.joinUrl || '').trim();
    openBtn.dataset.url = firstUrl;
    openBtn.disabled = !firstUrl;
    setSubscribeMsg(firstUrl ? '' : SUB.channelMissing, !firstUrl);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('subscribeRequiredModal').classList.add('on');
  }

  function closeSubscribeRequiredModal() {
    document.getElementById('subscribeRequiredModal').classList.remove('on');
    setSubscribeMsg('');
  }

  function openTelegramLink(url) {
    if (!url) return false;
    if (tg?.openTelegramLink) {
      tg.openTelegramLink(url);
      return true;
    }
    window.open(url, '_blank');
    return true;
  }

  async function verifyRequiredChannels() {
    const headers = { 'Content-Type': 'application/json' };
    attachMiniAppAuthHeaders(headers);
    const res = await fetch('/api/app/required-channels/verify', {
      method: 'POST',
      headers,
      body: JSON.stringify({}),
    });
    const payload = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(payload?.error || SUB.verifyFail);
    if (payload?.ok) return true;
    openSubscribeRequiredModal(payload);
    return false;
  }

  async function loadReport() {
    if (!uid) return showError(T.noUser);
    try {
      const headers = {};
      attachMiniAppAuthHeaders(headers);
      const res = await fetch(`/api/cvscore-result?uid=${encodeURIComponent(uid)}`, { headers });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        if (res.status === 403 && data?.error === 'subscribe_required') {
          openSubscribeRequiredModal(data);
          return;
        }
        return showError(data.error || T.apiFail);
      }
      const data = await res.json();
      closeSubscribeRequiredModal();
      renderReport(data);
    } catch {
      showError(T.networkError);
    }
  }

  async function boot() {
    if (!uid) {
      showError(T.noUser);
      return;
    }
    if (!getTgInitDataString()) {
      await loadReport();
      return;
    }
    try {
      const ok = await verifyRequiredChannels();
      if (!ok) return;
      await loadReport();
    } catch (err) {
      showError(err?.message || T.networkError);
    }
  }

  document.getElementById('openRequiredChannelBtn').addEventListener('click', () => {
    const url = String(document.getElementById('openRequiredChannelBtn').dataset.url || '').trim();
    if (!url) {
      setSubscribeMsg(SUB.channelMissing, true);
      return;
    }
    openTelegramLink(url);
  });

  document.getElementById('verifySubscriptionBtn').addEventListener('click', async () => {
    setSubscribeMsg('');
    try {
      const ok = await verifyRequiredChannels();
      if (!ok) {
        setSubscribeMsg(SUB.subscribeStill, true);
        return;
      }
      closeSubscribeRequiredModal();
      document.getElementById('loading').style.display = 'flex';
      await loadReport();
    } catch (err) {
      setSubscribeMsg(err?.message || SUB.verifyFail, true);
    }
  });

  boot();
</script>
</body>
</html>
