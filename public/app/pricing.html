<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тарифы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { max-width: 760px; margin: 0 auto; padding: 16px; display: grid; gap: 12px; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
      h1, h2, h3 { margin: 0 0 10px; }
      .muted { color: var(--muted); }
      .bad { color: #ef4444; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      button {
        border-radius: 8px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: var(--text);
        padding: 10px 12px;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
      }
      .ghost { background: #0f1730; border-color: var(--border); }
      .meta { display: grid; gap: 6px; margin: 8px 0 10px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Тарифы</h1>
      <p id="statusMsg" class="muted">Загружаем тарифы...</p>
      <div id="plansList" class="row" style="display:grid;gap:10px"></div>
    </div>
    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();
      const urlParams = new URLSearchParams(window.location.search);
      const devTelegramId = String(urlParams.get('devTelegramId') || '').trim();

      function getTgInitDataString() {
        const fromSdk = String(tg?.initData || '').trim();
        if (fromSdk) return fromSdk;
        try {
          const q = new URLSearchParams(window.location.search);
          const raw = q.get('tgWebAppData');
          if (raw) {
            try {
              return decodeURIComponent(String(raw).replace(/\+/g, '%20'));
            } catch {
              return String(raw);
            }
          }
        } catch {
          // ignore
        }
        return '';
      }

      async function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        const initData = getTgInitDataString();
        if (initData) {
          headers['x-init-data'] = initData;
          headers.Authorization = `tma ${initData}`;
        } else if (devTelegramId) {
          headers['x-dev-telegram-id'] = devTelegramId;
        }
        const response = await fetch(path, { ...options, headers });
        if (!response.ok) throw new Error(await response.text());
        const ct = (response.headers.get('content-type') || '').toLowerCase();
        if (ct.includes('application/json')) return response.json();
        return response.text();
      }

      function esc(value) {
        return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function toUsdText(value) {
        const n = Number.parseFloat(String(value || '').trim());
        if (!Number.isFinite(n) || n <= 0) return '';
        return `$${n.toFixed(2)}`;
      }

      function openTelegramLinkAndCloseMiniApp(url) {
        const tgApp = window.Telegram?.WebApp;
        if (!tgApp?.openTelegramLink) return false;
        tgApp.openTelegramLink(url);
        // iOS can keep the mini app open; collapse it explicitly.
        setTimeout(() => {
          try {
            tgApp.close?.();
          } catch {
            // Ignore close errors; link opening already happened.
          }
        }, 220);
        return true;
      }

      async function openPayment(planCode) {
        const code = String(planCode || '').trim().toLowerCase();
        const endpoint = code
          ? `/api/app/monetization/pay-link?plan=${encodeURIComponent(code)}`
          : '/api/app/monetization/pay-link';
        const payload = await api(endpoint);
        const url = String(payload?.deepLink || '').trim();
        if (!url) throw new Error('Ссылка на оплату не найдена');
        if (openTelegramLinkAndCloseMiniApp(url)) return;
        window.open(url, '_blank', 'noopener,noreferrer');
      }

      function renderStatus(monetization, channelsOk) {
        const activePlanName = monetization?.activePlan?.name || 'Базовый';
        const remaining = Number(monetization?.remainingOpens || 0);
        const total = Number(monetization?.totalAllowance || 0);
        const ai = monetization?.canUseAiTools ? 'доступны' : 'недоступны';
        const text = `Текущий тариф: ${activePlanName}. Осталось открытий в этом месяце: ${remaining}/${total}. AI-инструменты: ${ai}. Обязательные каналы: ${channelsOk ? 'подписка подтверждена' : 'требуется подписка'}.`;
        const el = document.getElementById('statusMsg');
        el.className = 'muted';
        el.textContent = text;
      }

      function renderPlans(plans) {
        const list = document.getElementById('plansList');
        if (!Array.isArray(plans) || plans.length === 0) {
          list.innerHTML = '<div class="card muted">Сейчас нет доступных тарифов.</div>';
          return;
        }
        list.innerHTML = plans
          .map((plan) => {
            const code = String(plan?.code || '').toLowerCase();
            const description = String(plan?.description || '').trim();
            const usdText = toUsdText(plan?.priceUsd);
            const priceLabel = usdText
              ? `${Number(plan?.priceInStars || 0)} ⭐ (~${usdText})`
              : `${Number(plan?.priceInStars || 0)} ⭐`;
            const title = `${esc(plan?.name || code || 'Plan')} · ${priceLabel}`;
            return `<section class="card">
              <h3>${title}</h3>
              <div class="meta">
                <span class="muted">${Number(plan?.jobOpenMonthlyLimit || 0)} открытий/мес</span>
                <span class="muted">${Number(plan?.durationDays || 30)} дней</span>
                ${description ? `<span class="muted">${esc(description)}</span>` : ''}
              </div>
              <button type="button" data-plan-code="${esc(code)}">Купить ${esc(plan?.name || code || 'тариф')}</button>
            </section>`;
          })
          .join('');
        list.querySelectorAll('[data-plan-code]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const statusEl = document.getElementById('statusMsg');
            try {
              await openPayment(btn.getAttribute('data-plan-code'));
            } catch (err) {
              statusEl.className = 'bad';
              statusEl.textContent = err?.message || 'Не удалось открыть оплату.';
            }
          });
        });
      }

      async function boot() {
        const payload = await api('/api/app/monetization/status');
        renderStatus(payload?.monetization || {}, Boolean(payload?.requiredChannelsSatisfied));
        renderPlans(payload?.monetization?.plans || []);
      }

      boot().catch((err) => {
        const el = document.getElementById('statusMsg');
        el.className = 'bad';
        el.textContent = `Не удалось загрузить тарифы: ${err.message}`;
      });
    </script>
  </body>
</html>
