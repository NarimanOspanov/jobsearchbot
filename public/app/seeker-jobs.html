<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Search</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: var(--bg); color: var(--text); }
      .wrap { width: 100%; max-width: 100%; margin: 0 auto; padding: 14px; display: grid; gap: 12px; box-sizing: border-box; }
      .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
      h1, h2, h3 { margin: 0 0 10px; }
      .muted { color: var(--muted); }
      .bad { color: #ef4444; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      input, select, button, textarea {
        border-radius: 8px; border: 1px solid var(--border); background: #0f1730; color: var(--text); padding: 8px; font: inherit;
      }
      button { cursor: pointer; background: var(--accent); border-color: var(--accent); }
      .layout { display: grid; gap: 12px; grid-template-columns: 1fr; align-items: stretch; }
      .layout .card.layout-col {
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .layout .layout-col-body {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }
      @media (min-width: 1024px) {
        .layout .card.layout-col {
          max-height: calc(100vh - 100px);
        }
      }
      .jobs-list {
        display: grid;
        gap: 10px;
      }
      .job-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #10182d;
        padding: 10px;
        cursor: pointer;
      }
      .job-card:active { transform: scale(0.998); }
      .job-card:hover { border-color: var(--accent); }
      .job-card-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }
      .job-card-title { font-weight: 600; line-height: 1.35; }
      .job-card-sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
      .job-card-meta { margin-top: 8px; color: var(--muted); font-size: 12px; display: flex; flex-wrap: wrap; gap: 10px; }
      .job-status-pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }
      .artifacts a { color: #8ab4ff; display: inline-block; margin-right: 10px; text-decoration: underline; font-weight: 600; }
      a { color: #9ec5ff; text-decoration: underline; font-weight: 600; }
      a:hover { color: #c7ddff; }
      .loader {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(158, 176, 209, 0.45);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
      }
      .loader.on { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      button:disabled, input:disabled, select:disabled, textarea:disabled { opacity: 0.6; cursor: not-allowed; }
      textarea { width: 100%; min-height: 130px; }
      .job-detail { color: var(--text); }
      .job-detail .sub { color: var(--muted); font-size: 13px; }
      .job-summary { margin: 10px 0; line-height: 1.45; color: var(--text); }
      .skills-block { margin-top: 12px; }
      .skills-block h4 { margin: 8px 0 6px; font-size: 13px; color: var(--muted); font-weight: 600; }
      .skill-tag {
        display: inline-block;
        margin: 2px 6px 2px 0;
        padding: 3px 8px;
        border-radius: 6px;
        background: #1a2540;
        border: 1px solid var(--border);
        font-size: 12px;
        cursor: help;
        line-height: 1.35;
      }
      .skill-tag[data-justification] { cursor: pointer; }
      .skill-tag.primary { border-color: #3b82f6; background: #152038; }
      .remote-reason-btn { margin-top: 6px; }
      .date-range { display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
      .date-range-row { margin-top: 8px; }
      .pager { display: inline-flex; align-items: center; gap: 8px; }
      .ghost-btn { background: #0f1730; border: 1px solid var(--border); }
      .skills-picker {
        position: relative;
        min-width: 280px;
      }
      .skills-picker-btn {
        width: 100%;
        text-align: left;
        background: #0f1730;
        border: 1px solid var(--border);
      }
      .skills-picker-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        max-height: 260px;
        overflow: auto;
        z-index: 30;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #10182d;
        padding: 8px;
        display: none;
      }
      .skills-picker-menu.open { display: block; }
      .skills-group {
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid rgba(39, 51, 87, 0.45);
      }
      .skills-group:last-child {
        margin-bottom: 0;
        border-bottom: 0;
      }
      .skills-group-title {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
        font-weight: 600;
      }
      .skill-check {
        display: block;
        font-size: 13px;
        padding: 2px 0;
      }
      .skill-check input { margin-right: 6px; }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 10px;
      }
      .modal-backdrop.on { display: flex; }
      .modal-card {
        width: min(980px, 100%);
        max-height: calc(100vh - 20px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }
      .modal-body {
        padding: 12px;
        overflow: auto;
      }
      .insight-box {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: #10182d;
      }
      .insight-box h4 {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .resume-upload-box {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        margin-top: 12px;
        background: #10182d;
      }
      .resume-upload-box input[type="file"] {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p id="globalMsg" class="muted"></p>

      <div class="layout">
        <section class="card layout-col">
          <h2>Remote jobs</h2>
          <div class="row date-range-row">
            <span class="date-range">
              <label>From <input id="fromDate" type="date" /></label>
              <label>To <input id="toDate" type="date" /></label>
            </span>
          </div>
          <div class="row date-range-row">
            <label>Roles</label>
            <div class="skills-picker">
              <button id="skillPickerBtn" type="button" class="skills-picker-btn">All skills</button>
              <div id="skillPickerMenu" class="skills-picker-menu" role="listbox" aria-multiselectable="true"></div>
            </div>
          </div>
          <div class="row date-range-row">
            <button id="syncBtn">Search remote jobs</button>
            <span id="syncLoader" class="loader" aria-hidden="true"></span>
            <span class="pager">
              <button id="prevPageBtn" type="button" class="ghost-btn">Prev</button>
              <span id="pageInfo" class="muted">Page 1</span>
              <button id="nextPageBtn" type="button" class="ghost-btn">Next</button>
              <label>Page size
                <select id="pageSizeSel">
                  <option value="50">50</option>
                  <option value="100" selected>100</option>
                  <option value="200">200</option>
                </select>
              </label>
            </span>
          </div>
          <p id="dashMsg" class="muted"></p>
          <div class="layout-col-body">
            <div id="jobsList" class="jobs-list"></div>
          </div>
        </section>
      </div>
    </div>
    <div id="jobModal" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <strong>Job details</strong>
          <button id="jobModalClose" type="button" class="ghost-btn">Close</button>
        </div>
        <div class="modal-body">
          <div id="jobInfo" class="muted">Select a job to continue.</div>
          <div id="jobInsightBox" class="insight-box" style="display:none">
            <h4 id="jobInsightTitle"></h4>
            <p id="jobInsightText" class="job-summary" style="margin:0"></p>
          </div>
          <div id="jobActions" style="display:none">
            <div class="row">
              <label>Status
                <select id="statusSel">
                  <option value="new">new</option>
                  <option value="applied">applied</option>
                  <option value="skipped">skipped</option>
                </select>
              </label>
              <button id="genBtn">Generate Tailored CV + Cover Letter</button>
              <span id="jobLoader" class="loader" aria-hidden="true"></span>
            </div>
            <div class="artifacts" id="artifactLinks" style="margin-top:8px"></div>
            <label>Cover Letter</label>
            <textarea id="coverPreview" readonly></textarea>
            <p id="jobMsg" class="muted"></p>
          </div>
          <div id="jobNotesBlock" class="job-detail" style="display:none;margin-top:12px">
            <div class="skills-block">
              <h4>My notes</h4>
              <textarea id="notesText" aria-label="My notes"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="resumeRequiredModal" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <strong>Main resume required</strong>
          <button id="resumeRequiredClose" type="button" class="ghost-btn">Close</button>
        </div>
        <div class="modal-body">
          <p class="muted">To generate tailored CV and cover letter, upload your main resume first.</p>
          <div class="resume-upload-box">
            <input id="resumeFileInput" type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" />
            <div class="row" style="margin-top:8px">
              <button id="uploadResumeBtn" type="button">Upload resume</button>
              <span id="uploadResumeLoader" class="loader" aria-hidden="true"></span>
            </div>
            <p id="resumeUploadMsg" class="muted"></p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();
      const urlParams = new URLSearchParams(window.location.search);
      const devTelegramId = String(urlParams.get('devTelegramId') || '').trim();

      const API_BASE = '';
      const SKILLS_URL = '/api/admin/skills';
      const POSITIONS_URL = '/api/admin/positions';

      let seekerId = null;
      let skills = [];
      let positions = [];
      let applications = [];
      let selectedJob = null;
      let selectedApplication = null;
      let isSyncing = false;
      let isJobBusy = false;
      let pageInfo = { page: 1, pageSize: 100, hasMore: false, count: 0, totalRows: 0 };
      let isJobModalOpen = false;
      let dateBounds = { min: '', max: '' };
      let isSkillPickerOpen = false;
      let isResumeRequiredModalOpen = false;
      let currentResumeUrl = '';
      let continueGenerateAfterResumeUpload = false;

      function q() {
        const p = new URLSearchParams(location.search);
        return {
          from: p.get('from') || '',
          to: p.get('to') || '',
          skillIds: p.get('skillIds') || p.get('skillId') || '',
          jobId: p.get('jobId') || '',
          page: p.get('page') || '1',
          pageSize: p.get('pageSize') || '100',
        };
      }
      function setQ(next) {
        const p = new URLSearchParams(location.search);
        Object.entries(next).forEach(([k, v]) => {
          if (v == null || v === '') p.delete(k); else p.set(k, String(v));
        });
        history.replaceState(null, '', `?${p.toString()}`);
      }
      function setMsg(id, txt, isErr = false) {
        const el = document.getElementById(id);
        el.textContent = txt || '';
        el.className = isErr ? 'bad' : 'muted';
      }
      function esc(v) {
        return String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function attrEsc(v) {
        return String(v || '')
          .replace(/\r\n|\r|\n/g, ' ')
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;');
      }
      function skillDisplayLine(s) {
        const roleName = String(s.roleName || '').trim() || '—';
        const name = String(s.name || '').trim() || '—';
        return `${roleName} : ${name}`;
      }
      function renderJobSkillsHtml(skillsValue) {
        const list = Array.isArray(skillsValue) ? skillsValue : [];
        const primary = list.filter((s) => s.isHighlyRelevant === true);
        const secondary = list.filter((s) => s.isHighlyRelevant !== true);
        const chips = (arr, cls) =>
          arr
            .map((s) => {
              const label = esc(skillDisplayLine(s));
              const tip = attrEsc(s.justification || '');
              return `<span class="skill-tag ${cls}" data-justification="${tip}" title="${tip}">${label}</span>`;
            })
            .join('');
        let out = '<div class="skills-block">';
        out += `<h4>Primary skills</h4><div>${chips(primary, 'primary') || '<span class="muted">None</span>'}</div>`;
        out += `<h4>Secondary skills</h4><div>${chips(secondary, '') || '<span class="muted">None</span>'}</div>`;
        out += '</div>';
        return out;
      }
      function formatPostedDate(v) {
        const s = String(v || '').trim();
        if (!s) return '';
        if (s.includes('T')) return s.split('T')[0];
        return s;
      }
      function parseIsoDate(value) {
        const v = String(value || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(v)) return null;
        const d = new Date(`${v}T00:00:00`);
        if (Number.isNaN(d.getTime())) return null;
        return d;
      }
      function isoDate(value) {
        return new Date(value).toISOString().slice(0, 10);
      }
      function clampDateToBounds(value) {
        const d = parseIsoDate(value);
        const minD = parseIsoDate(dateBounds.min);
        const maxD = parseIsoDate(dateBounds.max);
        if (!d || !minD || !maxD) return dateBounds.max || value;
        if (d < minD) return dateBounds.min;
        if (d > maxD) return dateBounds.max;
        return isoDate(d);
      }
      function onLoading(id, on) {
        const el = document.getElementById(id);
        el.className = on ? 'loader on' : 'loader';
      }
      function setSyncBusy(on) {
        isSyncing = on;
        onLoading('syncLoader', on);
        ['syncBtn', 'fromDate', 'toDate', 'skillPickerBtn', 'prevPageBtn', 'nextPageBtn', 'pageSizeSel'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.disabled = on;
        });
      }
      function updatePagerUi() {
        const info = document.getElementById('pageInfo');
        const prev = document.getElementById('prevPageBtn');
        const next = document.getElementById('nextPageBtn');
        const sizeSel = document.getElementById('pageSizeSel');
        if (info) info.textContent = `Page ${pageInfo.page} · ${pageInfo.count} on page · Total ${pageInfo.totalRows}`;
        if (prev) prev.disabled = isSyncing || pageInfo.page <= 1;
        if (next) next.disabled = isSyncing || !pageInfo.hasMore;
        if (sizeSel) sizeSel.value = String(pageInfo.pageSize);
      }
      function setJobBusy(on) {
        isJobBusy = on;
        onLoading('jobLoader', on);
        ['statusSel', 'notesText', 'genBtn'].forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.disabled = on;
        });
      }
      function showInsight(title, text) {
        const box = document.getElementById('jobInsightBox');
        const titleEl = document.getElementById('jobInsightTitle');
        const textEl = document.getElementById('jobInsightText');
        titleEl.textContent = String(title || '').trim();
        textEl.textContent = String(text || '').trim() || 'Нет данных.';
        box.style.display = '';
      }
      function hideInsight() {
        const box = document.getElementById('jobInsightBox');
        document.getElementById('jobInsightTitle').textContent = '';
        document.getElementById('jobInsightText').textContent = '';
        box.style.display = 'none';
      }
      function bindJobDetailInteractions(job) {
        document.querySelectorAll('.skill-tag[data-justification]').forEach((el) => {
          el.addEventListener('click', () => {
            const justification = el.getAttribute('data-justification') || '';
            showInsight('Why AI highlighted this skill?', justification);
          });
        });
        const remoteBtn = document.getElementById('showRemoteReasonBtn');
        if (remoteBtn) {
          remoteBtn.addEventListener('click', () => {
            showInsight('Why AI thinks this job is remote?', job.remoteReasoning || 'No data.');
          });
        }
      }
      function openJobModal() {
        isJobModalOpen = true;
        document.getElementById('jobModal').classList.add('on');
      }
      function closeJobModal() {
        isJobModalOpen = false;
        document.getElementById('jobModal').classList.remove('on');
      }
      function openResumeRequiredModal() {
        isResumeRequiredModalOpen = true;
        document.getElementById('resumeRequiredModal').classList.add('on');
      }
      function closeResumeRequiredModal() {
        isResumeRequiredModalOpen = false;
        document.getElementById('resumeRequiredModal').classList.remove('on');
      }
      async function api(url, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        if (!tg?.initData && devTelegramId) headers['x-dev-telegram-id'] = devTelegramId;
        const res = await fetch(url, { ...options, headers });
        if (!res.ok) throw new Error(await res.text());
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (ct.includes('application/json')) return res.json();
        return res.text();
      }

      async function loadProfile() {
        const profile = await api('/api/app/profile');
        seekerId = Number(profile?.id || 0) || null;
        currentResumeUrl = String(profile?.resumeUrl || '').trim();
        if (!seekerId) throw new Error('Could not resolve current user.');
      }

      async function loadSkills() {
        const payload = await api(SKILLS_URL);
        skills = payload.skills || payload || [];
        const menu = document.getElementById('skillPickerMenu');
        const grouped = new Map();
        for (const s of skills) {
          const roleName = String(s.roleName || s.RoleName || '').trim() || 'Other';
          const skillName = String(s.name || s.Name || `${s.id}`).trim() || String(s.id);
          if (!grouped.has(roleName)) grouped.set(roleName, []);
          grouped.get(roleName).push({ id: s.id, name: skillName });
        }
        const sortedGroups = [...grouped.entries()].sort(([a], [b]) => a.localeCompare(b));
        const groupedOptionsHtml = sortedGroups.map(([roleName, items]) => {
          const optionsHtml = items
            .sort((a, b) => a.name.localeCompare(b.name))
            .map((item) =>
              `<label class="skill-check"><input type="checkbox" value="${item.id}" />${esc(item.name)}</label>`
            )
            .join('');
          return `<div class="skills-group"><div class="skills-group-title">${esc(roleName)}</div>${optionsHtml}</div>`;
        }).join('');
        menu.innerHTML = groupedOptionsHtml;
        renderSkillPickerSummary();
      }

      function getSelectedSkillIdsCsv() {
        const checked = document.querySelectorAll('#skillPickerMenu input[type="checkbox"]:checked');
        return [...checked]
          .map((opt) => String(opt.value || '').trim())
          .filter(Boolean)
          .join(',');
      }

      function applySelectedSkillIdsCsv(csv) {
        const selected = new Set(
          String(csv || '')
            .split(',')
            .map((v) => v.trim())
            .filter(Boolean)
        );
        const checkboxes = document.querySelectorAll('#skillPickerMenu input[type="checkbox"]');
        [...checkboxes].forEach((opt) => {
          opt.checked = selected.has(String(opt.value));
        });
        renderSkillPickerSummary();
      }

      function renderSkillPickerSummary() {
        const csv = getSelectedSkillIdsCsv();
        const btn = document.getElementById('skillPickerBtn');
        if (!csv) {
          btn.textContent = 'All skills';
          return;
        }
        const ids = csv.split(',').filter(Boolean);
        btn.textContent = `${ids.length} skill(s) selected`;
      }

      function openSkillPicker() {
        isSkillPickerOpen = true;
        document.getElementById('skillPickerMenu').classList.add('open');
      }

      function closeSkillPicker() {
        isSkillPickerOpen = false;
        document.getElementById('skillPickerMenu').classList.remove('open');
      }

      async function uploadMainResumeFromUi() {
        const fileInput = document.getElementById('resumeFileInput');
        const uploadBtn = document.getElementById('uploadResumeBtn');
        const loaderId = 'uploadResumeLoader';
        const file = fileInput.files?.[0];
        if (!file) throw new Error('Choose a file first.');
        if (file.size > 15 * 1024 * 1024) throw new Error('File is too large. Max 15MB.');
        const allowedTypes = ['application/pdf', 'image/png', 'image/jpeg', 'image/webp'];
        if (!allowedTypes.includes(file.type)) {
          throw new Error('Unsupported file type. Use PDF or image (JPG/PNG/WEBP).');
        }
        uploadBtn.disabled = true;
        onLoading(loaderId, true);
        try {
          const headers = {
            'Content-Type': 'application/octet-stream',
            'x-file-name': file.name || `resume-${Date.now()}`,
            'x-file-type': file.type || 'application/octet-stream',
          };
          if (tg?.initData) headers['x-init-data'] = tg.initData;
          if (!tg?.initData && devTelegramId) headers['x-dev-telegram-id'] = devTelegramId;
          const bytes = await file.arrayBuffer();
          const response = await fetch('/api/app/profile/resume-upload', {
            method: 'POST',
            headers,
            body: bytes,
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(typeof payload?.error === 'string' ? payload.error : 'Failed to upload resume');
          }
          currentResumeUrl = String(payload?.resumeUrl || '').trim();
          if (!currentResumeUrl) throw new Error('Resume uploaded but URL is missing.');
          setMsg('resumeUploadMsg', 'Resume uploaded successfully.');
          return true;
        } finally {
          onLoading(loaderId, false);
          uploadBtn.disabled = false;
        }
      }

      async function loadApplicationsByUser() {
        applications = await api(`${API_BASE}/api/app/applications/by-user?userId=${encodeURIComponent(seekerId)}&limit=100&offset=0`);
      }

      async function syncJobs() {
        if (isSyncing) return;
        let from = document.getElementById('fromDate').value;
        let to = document.getElementById('toDate').value;
        from = clampDateToBounds(from);
        to = clampDateToBounds(to);
        if (from > to) from = to;
        document.getElementById('fromDate').value = from;
        document.getElementById('toDate').value = to;
        const skillIds = getSelectedSkillIdsCsv();
        const query = q();
        const page = Math.max(1, Number.parseInt(String(query.page || '1'), 10) || 1);
        const pageSize = Math.min(200, Math.max(1, Number.parseInt(String(query.pageSize || '100'), 10) || 100));
        if (!from || !to) throw new Error('Set from and to dates.');

        setQ({ from, to, skillIds, page, pageSize });
        setSyncBusy(true);
        try {
          const posUrl = `${POSITIONS_URL}?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}${skillIds ? `&skillIds=${encodeURIComponent(skillIds)}` : ''}&page=${encodeURIComponent(page)}&pageSize=${encodeURIComponent(pageSize)}`;
          const data = await api(posUrl);
          positions = data.positions || [];
          pageInfo = {
            page: Number(data.page || page),
            pageSize: Number(data.pageSize || pageSize),
            hasMore: !!data.hasMore,
            count: Number(data.count || positions.length),
            totalRows: Number(data.totalRows || data.count || positions.length),
          };
          await loadApplicationsByUser();
          renderJobs();
          updatePagerUi();
          setMsg('dashMsg', `Loaded page ${pageInfo.page}: ${pageInfo.count} jobs. Total available: ${pageInfo.totalRows}.`);
        } finally {
          setSyncBusy(false);
          updatePagerUi();
        }
      }

      function appByScreenlyId(screenlyId) {
        return applications.find((a) => Number(a.ScreenlyJobId) === Number(screenlyId)) || null;
      }

      function renderJobs() {
        const body = document.getElementById('jobsList');
        if (!positions.length) {
          body.innerHTML = '<div class="muted">No jobs loaded.</div>';
          return;
        }
        body.innerHTML = positions.map((p) => {
          const app = appByScreenlyId(p.id);
          return `<div class="job-card" data-open-job="${p.id}">
            <div class="job-card-head">
              <div>
                <div class="job-card-title">${esc(p.title)}</div>
                <div class="job-card-sub">${esc(p.company)} · ${esc(p.location)}</div>
              </div>
              <span class="job-status-pill">${esc(app?.Status || 'new')}</span>
            </div>
            <div class="job-card-meta">
              <span>#${esc(p.id)}</span>
              <span>Posted: ${esc(formatPostedDate(p.publishedAt) || '—')}</span>
              <span>Apply: ${esc(p.applyType || '—')}</span>
            </div>
          </div>`;
        }).join('');
        body.querySelectorAll('[data-open-job]').forEach((row) => {
          row.addEventListener('click', () => {
            const id = Number(row.getAttribute('data-open-job'));
            setQ({ jobId: id });
            openJobById(id);
          });
        });
      }

      async function ensureApplication(job) {
        let app = appByScreenlyId(job.id);
        if (app) return app;
        app = await api(`${API_BASE}/api/app/applications`, {
          method: 'POST',
          body: JSON.stringify({
            userId: Number(seekerId),
            screenlyJobId: Number(job.id),
            vacancyTitle: job.title,
            companyName: job.company,
            source: job.source,
            appliedAt: new Date().toISOString(),
            metaJson: {
              positionId: job.id,
              applyUrl: job.applyUrl || null,
              location: job.location || null,
              shortSummary: job.shortSummary || null,
            },
          }),
        });
        await loadApplicationsByUser();
        return appByScreenlyId(job.id) || app;
      }

      function openJobById(id) {
        const job = positions.find((x) => Number(x.id) === Number(id));
        if (!job) {
          document.getElementById('jobNotesBlock').style.display = 'none';
          document.getElementById('jobActions').style.display = 'none';
          return;
        }
        selectedJob = job;
        selectedApplication = appByScreenlyId(job.id);
        document.getElementById('jobInfo').classList.remove('muted');
        document.getElementById('jobNotesBlock').style.display = 'block';
        document.getElementById('jobActions').style.display = 'block';
        hideInsight();
        const sumHtml = String(job.shortSummary || '').trim()
          ? `<div class="skills-block" style="margin-top:10px"><h4>Summary</h4><p class="job-summary" style="margin:0">${esc(job.shortSummary)}</p></div>`
          : '';
        const remoteHtml = String(job.remoteReasoning || '').trim()
          ? `<div class="skills-block"><h4>Remote</h4><button id="showRemoteReasonBtn" type="button" class="ghost-btn remote-reason-btn">Why AI thinks this job is remote?</button></div>`
          : '';
        document.getElementById('jobInfo').innerHTML =
          `<div class="job-detail">` +
          `<div><strong>${esc(job.title)}</strong></div>` +
          `<div class="sub">${esc(job.company)} · ${esc(job.location)}</div>` +
          `<div style="margin-top:6px"><a href="${esc(job.applyUrl || '#')}" target="_blank" rel="noopener noreferrer">Open source job link</a></div>` +
          remoteHtml +
          sumHtml +
          renderJobSkillsHtml(job.skills) +
          `</div>`;
        document.getElementById('statusSel').value = selectedApplication?.Status || 'new';
        document.getElementById('notesText').value = selectedApplication?.Notes || '';
        renderArtifacts();
        bindJobDetailInteractions(job);
        openJobModal();
      }

      function renderArtifacts() {
        const links = document.getElementById('artifactLinks');
        const cover = document.getElementById('coverPreview');
        if (!selectedApplication) {
          links.innerHTML = '';
          cover.value = '';
          return;
        }
        links.innerHTML = selectedApplication.TailoredCVURL
          ? `<a href="${esc(selectedApplication.TailoredCVURL)}" download target="_blank" rel="noopener noreferrer">Download Tailored CV</a>`
          : '';
        cover.value = selectedApplication.CoverLetter || '';
      }

      async function saveStatus() {
        if (isJobBusy) return;
        if (!selectedJob) throw new Error('Open a job first.');
        setJobBusy(true);
        try {
          const app = await ensureApplication(selectedJob);
          const updated = await api(`${API_BASE}/api/app/applications/${app.Id}`, {
            method: 'PATCH',
            body: JSON.stringify({
              status: document.getElementById('statusSel').value,
              notes: document.getElementById('notesText').value,
            }),
          });
          selectedApplication = updated;
          await loadApplicationsByUser();
          renderJobs();
          renderArtifacts();
          setMsg('jobMsg', 'Status saved.');
        } finally {
          setJobBusy(false);
        }
      }

      async function generateMaterials() {
        if (isJobBusy) return;
        if (!selectedJob) throw new Error('Open a job first.');
        if (!currentResumeUrl) {
          continueGenerateAfterResumeUpload = true;
          setMsg('resumeUploadMsg', 'Upload your main resume to continue.');
          openResumeRequiredModal();
          return;
        }
        setJobBusy(true);
        try {
          const app = await ensureApplication(selectedJob);
          const resumePayload = await api(`${API_BASE}/api/app/admin/users/${encodeURIComponent(seekerId)}/resume-text`);
          const mainResumeText = String(resumePayload.resumeText || '').trim();
          if (!mainResumeText) throw new Error('Resume text is empty for current user.');

          const [tailored, cover] = await Promise.all([
            api(`${API_BASE}/api/tailored-resume/upload`, {
              method: 'POST',
              body: JSON.stringify({
                seekerId: Number(seekerId),
                screenlyJobId: Number(selectedJob.id),
                jobTitle: selectedJob.title || '',
                jobDescription: `${selectedJob.shortSummary || ''}\n\n${selectedJob.contacts || ''}`,
                mainResumeText,
              }),
            }),
            api(`${API_BASE}/api/cover-letter`, {
              method: 'POST',
              body: JSON.stringify({
                jobTitle: selectedJob.title || '',
                jobDescription: `${selectedJob.shortSummary || ''}\n\n${selectedJob.contacts || ''}`,
                mainResumeText,
              }),
            }),
          ]);

          const updated = await api(`${API_BASE}/api/app/applications/${app.Id}`, {
            method: 'PATCH',
            body: JSON.stringify({
              tailoredCvUrl: tailored.tailoredCvUrl,
              coverLetter: cover.coverLetter,
              notes: document.getElementById('notesText').value,
            }),
          });
          selectedApplication = updated;
          await loadApplicationsByUser();
          renderJobs();
          renderArtifacts();
          setMsg('jobMsg', 'Tailored CV + cover letter generated and saved.');
        } finally {
          setJobBusy(false);
        }
      }

      function hydrateStateToInputs() {
        const s = q();
        const now = new Date();
        const to = isoDate(now);
        const prev = new Date(now);
        prev.setMonth(prev.getMonth() - 1);
        const from = isoDate(prev);
        dateBounds = { min: from, max: to };

        const fromInput = document.getElementById('fromDate');
        const toInput = document.getElementById('toDate');
        fromInput.min = from;
        fromInput.max = to;
        toInput.min = from;
        toInput.max = to;

        const resolvedFrom = clampDateToBounds(s.from || from);
        const resolvedTo = clampDateToBounds(s.to || to);
        const finalFrom = resolvedFrom > resolvedTo ? resolvedTo : resolvedFrom;
        const finalTo = resolvedTo < resolvedFrom ? resolvedFrom : resolvedTo;
        fromInput.value = finalFrom;
        toInput.value = finalTo;
        setQ({ from: finalFrom, to: finalTo });
      }

      async function boot() {
        hydrateStateToInputs();
        await Promise.all([loadProfile(), loadSkills()]);
        const s = q();
        if (s.skillIds) applySelectedSkillIdsCsv(s.skillIds);
        document.getElementById('pageSizeSel').value = String(Math.min(200, Math.max(1, Number.parseInt(String(s.pageSize || '100'), 10) || 100)));
        updatePagerUi();
      }

      document.getElementById('syncBtn').addEventListener('click', () => syncJobs().catch((e) => setMsg('dashMsg', e.message, true)));
      document.getElementById('prevPageBtn').addEventListener('click', () => {
        const cur = q();
        const nextPage = Math.max(1, (Number.parseInt(String(cur.page || '1'), 10) || 1) - 1);
        setQ({ page: nextPage });
        syncJobs().catch((e) => setMsg('dashMsg', e.message, true));
      });
      document.getElementById('nextPageBtn').addEventListener('click', () => {
        const cur = q();
        const nextPage = (Number.parseInt(String(cur.page || '1'), 10) || 1) + 1;
        setQ({ page: nextPage });
        syncJobs().catch((e) => setMsg('dashMsg', e.message, true));
      });
      document.getElementById('pageSizeSel').addEventListener('change', () => {
        const nextSize = Math.min(200, Math.max(1, Number.parseInt(document.getElementById('pageSizeSel').value, 10) || 100));
        setQ({ pageSize: nextSize, page: 1 });
        syncJobs().catch((e) => setMsg('dashMsg', e.message, true));
      });
      document.getElementById('statusSel').addEventListener('change', () => saveStatus().catch((e) => setMsg('jobMsg', e.message, true)));
      document.getElementById('notesText').addEventListener('blur', () => saveStatus().catch((e) => setMsg('jobMsg', e.message, true)));
      document.getElementById('genBtn').addEventListener('click', () => generateMaterials().catch((e) => setMsg('jobMsg', e.message, true)));
      document.getElementById('skillPickerBtn').addEventListener('click', () => {
        if (isSkillPickerOpen) closeSkillPicker(); else openSkillPicker();
      });
      document.getElementById('skillPickerMenu').addEventListener('change', () => {
        renderSkillPickerSummary();
      });
      document.getElementById('uploadResumeBtn').addEventListener('click', () => {
        uploadMainResumeFromUi()
          .then((ok) => {
            if (!ok) return;
            if (continueGenerateAfterResumeUpload) {
              continueGenerateAfterResumeUpload = false;
              closeResumeRequiredModal();
              generateMaterials().catch((e) => setMsg('jobMsg', e.message, true));
            }
          })
          .catch((err) => setMsg('resumeUploadMsg', err.message, true));
      });
      document.getElementById('resumeRequiredClose').addEventListener('click', () => {
        continueGenerateAfterResumeUpload = false;
        closeResumeRequiredModal();
      });
      document.getElementById('resumeRequiredModal').addEventListener('click', (event) => {
        if (event.target.id === 'resumeRequiredModal') {
          continueGenerateAfterResumeUpload = false;
          closeResumeRequiredModal();
        }
      });
      document.getElementById('jobModalClose').addEventListener('click', closeJobModal);
      document.getElementById('jobModal').addEventListener('click', (event) => {
        if (event.target.id === 'jobModal') closeJobModal();
      });
      document.addEventListener('click', (event) => {
        const picker = event.target.closest('.skills-picker');
        if (!picker && isSkillPickerOpen) closeSkillPicker();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (isJobModalOpen) closeJobModal();
          if (isSkillPickerOpen) closeSkillPicker();
          if (isResumeRequiredModalOpen) {
            continueGenerateAfterResumeUpload = false;
            closeResumeRequiredModal();
          }
        }
      });

      boot().catch((err) => {
        setMsg('globalMsg', `Failed to initialize seeker jobs page: ${err.message}`, true);
      });
    </script>
  </body>
</html>
