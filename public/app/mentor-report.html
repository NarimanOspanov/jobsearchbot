<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentor Report</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="./tma-i18n.js"></script>
    <style>
      :root { --bg:#0d1222; --card:#151b30; --text:#eaf0ff; --muted:#9eb0d1; --border:#273357; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background:var(--bg); color:var(--text); }
      .wrap { max-width: 1100px; margin:0 auto; padding:14px; display:grid; gap:12px; }
      .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; }
      .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
      .muted { color: var(--muted); }
      select, button, input { border-radius:8px; border:1px solid var(--border); background:#0f1730; color:var(--text); padding:8px; font:inherit; }
      button { cursor:pointer; }
      button[disabled] { opacity:0.45; cursor:not-allowed; }
      #searchInput { flex:1; min-width:160px; max-width:420px; }
      .dropdown { position: relative; display: inline-block; }
      .dd-toggle { min-width: 170px; text-align: left; display: inline-flex; justify-content: space-between; align-items: center; gap: 8px; }
      .dd-toggle .caret { opacity: 0.7; }
      .dd-menu { position: absolute; z-index: 50; margin-top: 4px; min-width: 230px; max-height: 300px; overflow: auto; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px; box-shadow: 0 10px 28px rgba(0,0,0,0.45); }
      .dd-menu[hidden] { display: none; }
      .dd-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 6px; cursor: pointer; user-select: none; }
      .dd-item:hover { background: rgba(79,124,255,0.12); }
      .dd-item input { width: 16px; height: 16px; cursor: pointer; }
      .dd-sep { height: 1px; background: var(--border); margin: 5px 2px; }
      table { width:100%; border-collapse: collapse; font-size:14px; }
      th, td { border-bottom: 1px solid var(--border); padding:10px; text-align:left; vertical-align:top; }
      th { font-size:12px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
      tr[data-row-id] { cursor:pointer; }
      tr[data-row-id]:hover { background: rgba(79,124,255,0.08); }
      .title-link { color: #7eb4ff; text-decoration: underline; font-size: 1.1em; }
      .title-link:hover { color: #c7ddff; }
      #jobTitle .title-link { font-size: 1.15em; font-weight: 700; }
      .apply-priority-block { border:1px solid var(--border); border-radius:8px; padding:10px; background:#10182d; }
      .apply-priority-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .empty { padding:16px; color:var(--muted); text-align:center; }
      .modal { position: fixed; inset:0; background: rgba(5,10,20,0.78); display:none; align-items:center; justify-content:center; padding:16px; z-index:999; }
      .modal.on { display:flex; }
      .modal-card { width:min(980px,100%); max-height:90vh; background:var(--card); border:1px solid var(--border); border-radius:12px; display:grid; grid-template-rows:auto 1fr; }
      .modal-head { display:flex; justify-content:space-between; align-items:center; gap:8px; border-bottom:1px solid var(--border); padding:10px 12px; }
      .modal-body { padding:12px; overflow:auto; display:grid; gap:10px; }
      .btn { border:1px solid var(--border); background:transparent; color:var(--text); border-radius:8px; padding:6px 10px; cursor:pointer; text-decoration:none; display:inline-block; }
      .btn[disabled] { opacity:0.45; cursor:not-allowed; pointer-events:none; }
      .artifacts { display:flex; gap:8px; flex-wrap:wrap; }
      .summary { border:1px solid var(--border); border-radius:8px; padding:10px; background:#10182d; white-space:pre-wrap; margin:0; }
      #screenshotPreview { max-width:100%; border:1px solid var(--border); border-radius:8px; display:none; }
      .chart-wrap { min-height: 280px; position: relative; overflow: auto; }
      .chart-wrap canvas { width: 100%; }
      h2 { margin: 0 0 10px; font-size: 1rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 id="titleText">Mentor report</h1>
        <div id="subtitleText" class="muted" style="margin-top:6px"></div>
      </div>
      <div class="card">
        <div class="row">
          <label class="muted" for="periodSel" id="periodLabel">Period</label>
          <select id="periodSel">
            <option value="24h">24h</option>
            <option value="7d">7d</option>
            <option value="30d">30d</option>
            <option value="all">All</option>
          </select>
          <label class="muted" id="clientLabel">Client</label>
          <div class="dropdown" id="clientDropdown">
            <button type="button" id="clientToggle" class="dd-toggle"><span id="clientToggleText">All clients</span><span class="caret">▾</span></button>
            <div id="clientMenu" class="dd-menu" hidden></div>
          </div>
          <label class="muted" for="applyTypeSel" id="applyTypeLabel">Apply type</label>
          <select id="applyTypeSel"></select>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
      </div>
      <div class="card">
        <div class="row" style="margin-bottom:10px; justify-content:space-between">
          <div class="row">
            <input id="searchInput" type="search" placeholder="Search" autocomplete="off" />
            <span class="muted" id="resultCount" style="white-space:nowrap"></span>
          </div>
          <div class="row">
            <label class="muted" for="pageSizeSel" id="pageSizeLabel">Per page</label>
            <select id="pageSizeSel">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="250">250</option>
            </select>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th id="thClient">Client</th>
              <th id="thAppliedAt">Applied at</th>
              <th id="thTitle">Title</th>
              <th id="thCompany">Company</th>
              <th id="thApplyType">Apply type</th>
            </tr>
          </thead>
          <tbody id="rowsBody"></tbody>
        </table>
        <div class="row" id="pager" style="margin-top:10px; justify-content:space-between">
          <span class="muted" id="pagerInfo"></span>
          <div class="row">
            <button id="prevPageBtn" type="button">Prev</button>
            <span class="muted" id="pagerPage"></span>
            <button id="nextPageBtn" type="button">Next</button>
          </div>
        </div>
      </div>
      <div class="card">
        <h2 id="chartTitle">Applications by client</h2>
        <p id="chartHint" class="muted" style="margin:0 0 10px"></p>
        <div id="chartWrap" class="chart-wrap"><canvas id="clientsChart"></canvas></div>
        <p id="chartEmpty" class="empty" hidden></p>
      </div>
    </div>

    <div id="jobModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="jobModalTitle">
      <div class="modal-card">
        <div class="modal-head">
          <strong id="jobModalTitle">Job details</strong>
          <button class="btn" id="closeModalBtn" type="button">Close</button>
        </div>
        <div class="modal-body">
          <div id="jobTitle"></div>
          <div class="muted" id="jobCompanyLine"></div>
          <div class="muted" id="jobAppliedAtLine"></div>
          <div class="muted" id="jobApplyTypeLine"></div>
          <div class="artifacts">
            <a id="tailoredCvLink" class="btn" target="_blank" rel="noopener noreferrer">Tailored CV</a>
            <button id="coverLetterBtn" class="btn" type="button">Cover letter</button>
            <a id="coverLetterUrlLink" class="btn" target="_blank" rel="noopener noreferrer">Cover letter file</a>
            <a id="screenshotLink" class="btn" target="_blank" rel="noopener noreferrer">Screenshot</a>
          </div>
          <img id="screenshotPreview" alt="Application screenshot" />
          <div>
            <strong id="summaryLabel">Summary</strong>
            <pre id="summaryText" class="summary"></pre>
          </div>
          <div id="applyPrioritySection" hidden>
            <strong id="applyPriorityLabel">Why applied</strong>
            <div id="applyPriorityBlock" class="apply-priority-block"></div>
          </div>
          <div>
            <strong id="coverLabel">Cover letter</strong>
            <pre id="coverLetterText" class="summary"></pre>
          </div>
        </div>
      </div>
    </div>

    <script>
      const STRINGS = {
        en: {
          pageTitle: 'Mentor report',
          subtitle: 'Track client applications by period and client.',
          period: 'Period',
          client: 'Client',
          refresh: 'Refresh',
          thClient: 'Client',
          thAppliedAt: 'Applied at',
          thTitle: 'Title',
          thCompany: 'Company',
          thApplyType: 'Apply type',
          thLocation: 'Location',
          applyTypeAll: 'All',
          allClients: 'All clients',
          selectedWord: 'selected',
          search: 'Search',
          perPage: 'Per page',
          prev: 'Prev',
          next: 'Next',
          found: 'found',
          empty: 'No applied jobs for selected filters.',
          modalTitle: 'Job details',
          close: 'Close',
          tailoredCv: 'Tailored CV',
          coverLetter: 'Cover letter',
          coverLetterFile: 'Cover letter file',
          screenshot: 'Screenshot',
          summary: 'Summary',
          appliedAt: 'Applied at',
          applyType: 'Apply type',
          noSummary: 'No summary.',
          noCover: 'No cover letter.',
          noLocation: '—',
          noData: '—',
          loadError: 'Failed to load mentor report',
          noClients: 'No assigned clients',
          whyApplied: 'Why applied',
          applyPriority: 'Apply priority',
          fitScore: 'Fit score',
          noApplyPriority: 'No apply priority analysis.',
          priorityHigh: 'High',
          priorityMedium: 'Medium',
          priorityLow: 'Low',
          prioritySkip: 'Skip',
          skipReason: 'Skip reason',
          analyzedAt: 'Analyzed at',
          chartTitle: 'Applications by client',
          chartHint: 'Compare assigned clients: date on X axis, application count on Y axis (one line per client).',
          chartEmpty: 'No application data for the selected period.',
          axisDate: 'Date',
          axisApplications: 'Applications',
        },
        ru: {
          pageTitle: 'Отчет ментора',
          subtitle: 'Отслеживание откликов клиентов по периоду и клиенту.',
          period: 'Период',
          client: 'Клиент',
          refresh: 'Обновить',
          thClient: 'Клиент',
          thAppliedAt: 'Время отклика',
          thTitle: 'Вакансия',
          thCompany: 'Компания',
          thApplyType: 'Тип отклика',
          thLocation: 'Локация',
          applyTypeAll: 'Все',
          allClients: 'Все клиенты',
          selectedWord: 'выбрано',
          search: 'Поиск',
          perPage: 'На странице',
          prev: 'Назад',
          next: 'Вперёд',
          found: 'найдено',
          empty: 'Нет откликов по выбранным фильтрам.',
          modalTitle: 'Детали вакансии',
          close: 'Закрыть',
          tailoredCv: 'Адаптированное резюме',
          coverLetter: 'Сопроводительное письмо',
          coverLetterFile: 'Файл письма',
          screenshot: 'Скриншот',
          summary: 'Кратко о вакансии',
          appliedAt: 'Время отклика',
          applyType: 'Тип отклика',
          noSummary: 'Нет краткого описания.',
          noCover: 'Нет сопроводительного письма.',
          noLocation: '—',
          noData: '—',
          loadError: 'Не удалось загрузить отчет ментора',
          noClients: 'Нет назначенных клиентов',
          whyApplied: 'Почему откликнулись',
          applyPriority: 'Приоритет отклика',
          fitScore: 'Оценка соответствия',
          noApplyPriority: 'Нет анализа приоритета отклика.',
          priorityHigh: 'Высокий',
          priorityMedium: 'Средний',
          priorityLow: 'Низкий',
          prioritySkip: 'Пропуск',
          skipReason: 'Причина пропуска',
          analyzedAt: 'Проанализировано',
          chartTitle: 'Отклики по клиентам',
          chartHint: 'Сравнение назначенных клиентов: дата по оси X, число откликов по оси Y (линия на клиента).',
          chartEmpty: 'Нет данных об откликах за выбранный период.',
          axisDate: 'Дата',
          axisApplications: 'Отклики',
        },
      };
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();
      const lang = window.TmaI18n ? window.TmaI18n.resolveLang(tg, new URLSearchParams(window.location.search)) : 'en';
      const t = (key, params) => (window.TmaI18n ? window.TmaI18n.t(STRINGS, lang, key, params) : key);
      let rows = [];
      let clients = [];
      let currentPage = 1;
      let clientsChart = null;
      let chartPayload = { dates: [], series: [] };
      const CLIENT_CHART_COLORS = ['#4f7cff', '#22c55e', '#f59e0b', '#ec4899', '#38bdf8', '#a78bfa', '#f97316', '#14b8a6'];
      const chartScale = {
        x: { ticks: { color: '#9eb0d1', maxRotation: 45, minRotation: 0 }, grid: { color: 'rgba(158,176,209,0.15)' }, title: { display: true, color: '#9eb0d1' } },
        y: { beginAtZero: true, ticks: { precision: 0, color: '#9eb0d1' }, grid: { color: 'rgba(158,176,209,0.15)' }, title: { display: true, color: '#9eb0d1' } },
      };
      function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        return fetch(path, { ...options, headers }).then(async (response) => {
          if (!response.ok) throw new Error(await response.text());
          return response.json();
        });
      }
      function esc(value) { return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
      function parseMetaJson(meta) { if (!meta) return null; if (typeof meta === 'object') return meta; try { return JSON.parse(meta); } catch { return null; } }
      function metaApplyUrl(meta) { return String(meta?.applyUrl || meta?.applyURL || '').trim(); }
      function rowApplyUrl(row, meta) {
        return String(row?.applyUrl || metaApplyUrl(meta) || '').trim();
      }
      function rowApplyPriority(row) {
        return row?.applyPriority ?? row?.applyPriorityJson ?? null;
      }
      function parseApplyPriorityJson(raw) {
        if (!raw) return null;
        const parsed = typeof raw === 'object' ? raw : (() => { try { return JSON.parse(raw); } catch { return null; } })();
        if (!parsed || typeof parsed !== 'object') return null;
        const applyRank = Number(parsed.applyRank) || 0;
        const score = parsed.score != null && !Number.isNaN(Number(parsed.score)) ? Number(parsed.score) : null;
        const priority = String(parsed.priority || '').trim();
        const justification = String(parsed.justification || '').trim();
        const skipReason = String(parsed.skipReason || '').trim() || null;
        if (!applyRank && score == null && !priority && !justification && !skipReason) return null;
        return {
          applyRank,
          score,
          priority,
          justification,
          skipReason,
          analyzedAt: parsed.analyzedAt || null,
        };
      }
      function priorityLabel(priority) {
        const key = String(priority || '').toLowerCase();
        if (key === 'high') return t('priorityHigh');
        if (key === 'medium') return t('priorityMedium');
        if (key === 'low') return t('priorityLow');
        if (key === 'skip') return t('prioritySkip');
        return priority || t('noData');
      }
      function setJobTitleEl(title, applyUrl) {
        const el = document.getElementById('jobTitle');
        const safeTitle = esc(title || t('noData'));
        const url = String(applyUrl || '').trim();
        if (url) {
          el.innerHTML = `<strong><a class="title-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${safeTitle}</a></strong>`;
          const link = el.querySelector('a.title-link');
          if (link && tg?.openLink) {
            link.addEventListener('click', (event) => {
              event.preventDefault();
              tg.openLink(url);
            }, { once: true });
          }
        } else {
          el.innerHTML = `<strong>${safeTitle}</strong>`;
        }
      }
      function renderApplyPrioritySection(applyPriority) {
        const section = document.getElementById('applyPrioritySection');
        const block = document.getElementById('applyPriorityBlock');
        const parsed = parseApplyPriorityJson(applyPriority);
        if (!parsed) {
          section.setAttribute('hidden', '');
          block.innerHTML = '';
          return;
        }
        section.removeAttribute('hidden');
        const parts = [];
        if (parsed.applyRank) parts.push(`#${esc(parsed.applyRank)}`);
        if (parsed.priority) parts.push(esc(priorityLabel(parsed.priority)));
        if (parsed.score != null && !Number.isNaN(parsed.score)) parts.push(`${esc(t('fitScore'))}: ${esc(parsed.score)}`);
        let html = parts.length ? `<div><strong>${esc(t('applyPriority'))}</strong> · ${parts.join(' · ')}</div>` : '';
        if (parsed.justification) html += `<div style="margin-top:8px;white-space:pre-wrap">${esc(parsed.justification)}</div>`;
        if (parsed.skipReason) html += `<div class="apply-priority-meta" style="margin-top:8px"><strong>${esc(t('skipReason'))}:</strong> ${esc(parsed.skipReason)}</div>`;
        if (parsed.analyzedAt) html += `<div class="apply-priority-meta">${esc(t('analyzedAt'))}: ${esc(fmtDateTime(parsed.analyzedAt))}</div>`;
        block.innerHTML = html || esc(t('noApplyPriority'));
      }
      function fmtDateTime(value) { const date = new Date(value); if (Number.isNaN(date.getTime())) return t('noData'); return date.toLocaleString(lang === 'ru' ? 'ru-RU' : 'en-US'); }
      function clientLabel(client) {
        const first = String(client?.firstName || '').trim();
        const last = String(client?.lastName || '').trim();
        const tgName = String(client?.telegramUserName || '').trim();
        const full = [first, last].filter(Boolean).join(' ').trim();
        return full || tgName || `#${client?.id || '?'}`;
      }
      function applyStaticUi() {
        document.title = t('pageTitle');
        document.getElementById('titleText').textContent = t('pageTitle');
        document.getElementById('subtitleText').textContent = t('subtitle');
        document.getElementById('periodLabel').textContent = t('period');
        document.getElementById('clientLabel').textContent = t('client');
        document.getElementById('applyTypeLabel').textContent = t('applyType');
        document.getElementById('refreshBtn').textContent = t('refresh');
        document.getElementById('searchInput').placeholder = t('search');
        document.getElementById('pageSizeLabel').textContent = t('perPage');
        document.getElementById('prevPageBtn').textContent = t('prev');
        document.getElementById('nextPageBtn').textContent = t('next');
        document.getElementById('thClient').textContent = t('thClient');
        document.getElementById('thAppliedAt').textContent = t('thAppliedAt');
        document.getElementById('thTitle').textContent = t('thTitle');
        document.getElementById('thCompany').textContent = t('thCompany');
        document.getElementById('thApplyType').textContent = t('thApplyType');
        document.getElementById('jobModalTitle').textContent = t('modalTitle');
        document.getElementById('closeModalBtn').textContent = t('close');
        document.getElementById('tailoredCvLink').textContent = t('tailoredCv');
        document.getElementById('coverLetterBtn').textContent = t('coverLetter');
        document.getElementById('coverLetterUrlLink').textContent = t('coverLetterFile');
        document.getElementById('screenshotLink').textContent = t('screenshot');
        document.getElementById('summaryLabel').textContent = t('summary');
        document.getElementById('coverLabel').textContent = t('coverLetter');
        document.getElementById('applyPriorityLabel').textContent = t('whyApplied');
        document.getElementById('chartTitle').textContent = t('chartTitle');
        document.getElementById('chartHint').textContent = t('chartHint');
        document.getElementById('chartEmpty').textContent = t('chartEmpty');
        chartScale.x.title.text = t('axisDate');
        chartScale.y.title.text = t('axisApplications');
      }
      function formatChartDateLabel(value) {
        const raw = String(value || '').slice(0, 10);
        if (!raw) return t('noData');
        const parts = raw.split('-');
        if (parts.length !== 3) return raw;
        return lang === 'ru' ? `${parts[2]}.${parts[1]}` : `${parts[1]}/${parts[2]}`;
      }
      function destroyClientsChart() {
        if (clientsChart) {
          clientsChart.destroy();
          clientsChart = null;
        }
      }
      function renderClientsChart() {
        const canvas = document.getElementById('clientsChart');
        const wrap = document.getElementById('chartWrap');
        const emptyEl = document.getElementById('chartEmpty');
        const dates = Array.isArray(chartPayload?.dates) ? chartPayload.dates : [];
        const series = Array.isArray(chartPayload?.series) ? chartPayload.series : [];
        const hasData = series.some((item) => (item.counts || []).some((count) => Number(count) > 0));
        if (!window.Chart || !dates.length || !series.length || !hasData) {
          destroyClientsChart();
          wrap.hidden = true;
          emptyEl.hidden = false;
          return;
        }
        wrap.hidden = false;
        emptyEl.hidden = true;
        wrap.style.minHeight = '320px';
        destroyClientsChart();
        clientsChart = new Chart(canvas, {
          type: 'line',
          data: {
            labels: dates.map(formatChartDateLabel),
            datasets: series.map((item, index) => {
              const color = CLIENT_CHART_COLORS[index % CLIENT_CHART_COLORS.length];
              return {
                label: item.clientName || `#${item.clientUserId}`,
                data: (item.counts || []).map((count) => Number(count) || 0),
                borderColor: color,
                backgroundColor: color,
                tension: 0.35,
                fill: false,
                pointRadius: 4,
                pointHoverRadius: 6,
                borderWidth: 2,
              };
            }),
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            plugins: { legend: { labels: { color: '#eaf0ff' } } },
            scales: chartScale,
          },
        });
      }
      // Custom checkbox dropdown: an "All clients" master + one checkbox per client.
      function renderClientOptions() {
        const menu = document.getElementById('clientMenu');
        const toggle = document.getElementById('clientToggle');
        if (!clients.length) {
          menu.innerHTML = `<div class="dd-item muted">${esc(t('noClients'))}</div>`;
          toggle.disabled = true;
          updateClientToggleText();
          return;
        }
        toggle.disabled = false;
        const allItem = `<label class="dd-item"><input type="checkbox" id="clientAll" checked /><span>${esc(t('allClients'))}</span></label><div class="dd-sep"></div>`;
        const items = clients.map((client) =>
          `<label class="dd-item"><input type="checkbox" class="client-cb" value="${esc(client.id)}" checked /><span>${esc(clientLabel(client))}</span></label>`
        ).join('');
        menu.innerHTML = allItem + items;
        updateClientToggleText();
      }
      function clientCheckboxes() { return [...document.querySelectorAll('#clientMenu .client-cb')]; }
      // Selected client ids; none checked => every assigned client (avoids an empty report).
      function selectedClientIds() {
        const checked = clientCheckboxes().filter((cb) => cb.checked).map((cb) => cb.value);
        return checked.length ? checked : clients.map((c) => String(c.id));
      }
      function updateClientToggleText() {
        const el = document.getElementById('clientToggleText');
        if (!el) return;
        const boxes = clientCheckboxes();
        const checked = boxes.filter((cb) => cb.checked);
        if (!clients.length) { el.textContent = t('noClients'); return; }
        if (!checked.length || checked.length === clients.length) { el.textContent = t('allClients'); return; }
        if (checked.length === 1) { el.textContent = clientNameById(checked[0].value); return; }
        el.textContent = `${checked.length} ${t('selectedWord')}`;
      }
      function clientNameById(id) {
        const c = clients.find((x) => String(x.id) === String(id));
        return c ? clientLabel(c) : `#${id}`;
      }
      function rowApplyType(row) { return String(row?.applyType || '').trim(); }
      function renderApplyTypeOptions() {
        const sel = document.getElementById('applyTypeSel');
        const prev = sel.value || '';
        const types = [...new Set(rows.map(rowApplyType).filter(Boolean))].sort();
        sel.innerHTML = [`<option value="">${esc(t('applyTypeAll'))}</option>`]
          .concat(types.map((ty) => `<option value="${esc(ty)}">${esc(ty)}</option>`)).join('');
        sel.value = prev && types.includes(prev) ? prev : '';
      }
      // Lowercased searchable text for a row (client, title, company, apply type, location).
      function rowSearchText(row) {
        const meta = parseMetaJson(row.meta);
        return [clientNameById(row.userId), row.vacancyTitle, row.companyName, rowApplyType(row), meta?.location]
          .filter(Boolean).join(' ').toLowerCase();
      }
      // All rows after the apply-type filter + search query (client-side).
      function getVisibleRows() {
        const selectedType = document.getElementById('applyTypeSel').value || '';
        const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
        let out = selectedType ? rows.filter((row) => rowApplyType(row) === selectedType) : rows;
        if (q) out = out.filter((row) => rowSearchText(row).includes(q));
        return out;
      }
      function pageSize() { return Number(document.getElementById('pageSizeSel').value) || 25; }
      function rowToHtml(row) {
        const meta = parseMetaJson(row.meta);
        const applyUrl = rowApplyUrl(row, meta);
        const safeTitle = esc(row.vacancyTitle || t('noData'));
        const titleHtml = applyUrl ? `<a class="title-link" href="${esc(applyUrl)}" target="_blank" rel="noopener noreferrer">${safeTitle}</a>` : safeTitle;
        return `<tr data-row-id="${esc(row.id)}"><td>${esc(clientNameById(row.userId))}</td><td>${esc(fmtDateTime(row.appliedAt))}</td><td>${titleHtml}</td><td>${esc(row.companyName || t('noData'))}</td><td>${esc(rowApplyType(row) || t('noData'))}</td></tr>`;
      }
      function renderRows() {
        const body = document.getElementById('rowsBody');
        const visible = getVisibleRows();
        const size = pageSize();
        const total = visible.length;
        const pages = Math.max(1, Math.ceil(total / size));
        if (currentPage > pages) currentPage = pages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * size;
        const pageRows = visible.slice(start, start + size);
        body.innerHTML = pageRows.length
          ? pageRows.map(rowToHtml).join('')
          : `<tr><td colspan="5" class="empty">${esc(t('empty'))}</td></tr>`;
        document.getElementById('resultCount').textContent = `${total} ${t('found')}`;
        const info = document.getElementById('pagerInfo');
        const pageEl = document.getElementById('pagerPage');
        info.textContent = total ? `${start + 1}–${start + pageRows.length} / ${total}` : '0';
        pageEl.textContent = `${currentPage} / ${pages}`;
        document.getElementById('prevPageBtn').disabled = currentPage <= 1;
        document.getElementById('nextPageBtn').disabled = currentPage >= pages;
      }
      function closeModal() { document.getElementById('jobModal').classList.remove('on'); }
      function toggleButton(el, on, href = '') {
        if (!el) return;
        if (el.tagName === 'A') {
          if (on) { el.removeAttribute('disabled'); el.href = href; } else { el.setAttribute('disabled', 'disabled'); el.removeAttribute('href'); }
          return;
        }
        el.disabled = !on;
      }
      function openModalById(id) {
        const row = rows.find((item) => String(item.id) === String(id));
        if (!row) return;
        const meta = parseMetaJson(row.meta);
        setJobTitleEl(row.vacancyTitle, rowApplyUrl(row, meta));
        document.getElementById('jobCompanyLine').textContent = `${row.companyName || t('noData')} · ${meta?.location || t('noLocation')} · ${row.source || t('noData')}`;
        document.getElementById('jobAppliedAtLine').textContent = `${t('appliedAt')}: ${fmtDateTime(row.appliedAt)}`;
        document.getElementById('jobApplyTypeLine').textContent = `${t('applyType')}: ${row.applyType || t('noData')}`;
        document.getElementById('summaryText').textContent = String(meta?.shortSummary || '').trim() || t('noSummary');
        renderApplyPrioritySection(rowApplyPriority(row));
        document.getElementById('coverLetterText').textContent = String(row.coverLetter || '').trim() || t('noCover');
        const tailoredCvLink = document.getElementById('tailoredCvLink');
        const coverLetterUrlLink = document.getElementById('coverLetterUrlLink');
        const screenshotLink = document.getElementById('screenshotLink');
        const coverLetterBtn = document.getElementById('coverLetterBtn');
        const screenshotPreview = document.getElementById('screenshotPreview');
        toggleButton(tailoredCvLink, Boolean(row.tailoredCvUrl), row.tailoredCvUrl || '');
        toggleButton(coverLetterUrlLink, Boolean(row.coverLetterUrl), row.coverLetterUrl || '');
        toggleButton(screenshotLink, Boolean(row.screenshotArtifactUrl), row.screenshotArtifactUrl || '');
        toggleButton(coverLetterBtn, Boolean(row.coverLetter));
        coverLetterBtn.onclick = () => { document.getElementById('coverLetterText').textContent = String(row.coverLetter || '').trim() || t('noCover'); };
        if (row.screenshotArtifactUrl) { screenshotPreview.src = row.screenshotArtifactUrl; screenshotPreview.style.display = ''; }
        else { screenshotPreview.removeAttribute('src'); screenshotPreview.style.display = 'none'; }
        document.getElementById('jobModal').classList.add('on');
      }
      async function loadClients() {
        const payload = await api('/api/app/mentor/clients');
        clients = Array.isArray(payload?.clients) ? payload.clients : [];
        renderClientOptions();
      }
      async function loadChart() {
        const period = document.getElementById('periodSel').value || '24h';
        const payload = await api(`/api/app/mentor/report/chart?period=${encodeURIComponent(period)}`);
        chartPayload = {
          dates: Array.isArray(payload?.dates) ? payload.dates : [],
          series: Array.isArray(payload?.series) ? payload.series : [],
        };
        renderClientsChart();
      }
      async function loadRows() {
        const ids = selectedClientIds();
        const period = document.getElementById('periodSel').value || '24h';
        if (!ids.length) { rows = []; renderApplyTypeOptions(); renderRows(); return; }
        const results = await Promise.all(ids.map((id) =>
          api(`/api/app/mentor/report?clientUserId=${encodeURIComponent(id)}&period=${encodeURIComponent(period)}`)
            .then((p) => (Array.isArray(p?.rows) ? p.rows : []))
            .catch(() => [])
        ));
        rows = results.flat().sort((a, b) => new Date(b.appliedAt || 0) - new Date(a.appliedAt || 0));
        currentPage = 1;
        renderApplyTypeOptions();
        renderRows();
      }
      async function boot() {
        applyStaticUi();
        await loadClients();
        await Promise.all([loadRows(), loadChart()]);
      }
      async function reloadReport() {
        await Promise.all([loadRows(), loadChart()]);
      }
      document.getElementById('refreshBtn').addEventListener('click', () => { reloadReport().catch(showLoadError); });
      document.getElementById('periodSel').addEventListener('change', () => { reloadReport().catch(showLoadError); });
      // Client checkbox dropdown: open/close, master "All" sync, reload on change.
      document.getElementById('clientToggle').addEventListener('click', (event) => {
        event.stopPropagation();
        const menu = document.getElementById('clientMenu');
        menu.hidden = !menu.hidden;
      });
      document.addEventListener('click', (event) => {
        const dd = document.getElementById('clientDropdown');
        if (dd && !dd.contains(event.target)) document.getElementById('clientMenu').hidden = true;
      });
      document.getElementById('clientMenu').addEventListener('change', (event) => {
        const target = event.target;
        if (target.id === 'clientAll') {
          clientCheckboxes().forEach((cb) => { cb.checked = target.checked; });
        } else if (target.classList.contains('client-cb')) {
          const boxes = clientCheckboxes();
          const all = document.getElementById('clientAll');
          if (all) all.checked = boxes.every((cb) => cb.checked);
        } else {
          return;
        }
        updateClientToggleText();
        loadRows().catch(showLoadError);
      });
      document.getElementById('applyTypeSel').addEventListener('change', () => { currentPage = 1; renderRows(); });
      document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderRows(); });
      document.getElementById('pageSizeSel').addEventListener('change', () => { currentPage = 1; renderRows(); });
      document.getElementById('prevPageBtn').addEventListener('click', () => { currentPage -= 1; renderRows(); });
      document.getElementById('nextPageBtn').addEventListener('click', () => { currentPage += 1; renderRows(); });
      document.getElementById('rowsBody').addEventListener('click', (event) => {
        if (event.target.closest('a.title-link')) return;
        const row = event.target.closest('tr[data-row-id]');
        if (!row) return;
        openModalById(row.getAttribute('data-row-id'));
      });
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('jobModal').addEventListener('click', (event) => { if (event.target.id === 'jobModal') closeModal(); });
      document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeModal(); });
      function showLoadError(err) {
        const body = document.getElementById('rowsBody');
        body.innerHTML = `<tr><td colspan="5" class="empty">${esc(t('loadError'))}: ${esc(err.message || err)}</td></tr>`;
      }
      boot().catch(showLoadError);
    </script>
  </body>
</html>
