<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Agent Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --ok: #23c483;
        --border: #273357;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }
      h1, h2 { margin: 0 0 12px; }
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child { border-bottom: none; }
      .muted { color: var(--muted); }
      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        color: var(--muted);
      }
      input, select, textarea, button {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0f1730;
        color: var(--text);
        padding: 10px;
        font: inherit;
      }
      textarea { min-height: 80px; resize: vertical; }
      button {
        cursor: pointer;
        background: var(--accent);
        border-color: var(--accent);
        font-weight: 600;
      }
      button.secondary {
        background: transparent;
        border-color: var(--border);
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .full { grid-column: 1 / -1; }
      .apps {
        display: grid;
        gap: 10px;
      }
      .app-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        background: #10182d;
      }
      .ok { color: var(--ok); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Job Agent</h1>

      <section class="card">
        <h2>Profile</h2>
        <div class="row"><span>Telegram</span><span id="profileUser" class="muted">loading...</span></div>
        <div class="row"><span>Chat ID</span><span id="profileChatId" class="muted">loading...</span></div>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <div class="row"><span>HeadHunter</span><input id="hhEnabled" type="checkbox" /></div>
        <div class="row"><span>LinkedIn</span><input id="linkedInEnabled" type="checkbox" /></div>
        <div class="row"><span>Indeed</span><input id="indeedEnabled" type="checkbox" /></div>
        <div class="row"><span>Company sites</span><input id="companySitesEnabled" type="checkbox" /></div>
        <div class="row"><span>Email founders</span><input id="emailFoundersEnabled" type="checkbox" /></div>
        <div class="row"><span>Email recruiters</span><input id="emailRecruitersEnabled" type="checkbox" /></div>
        <div style="display:flex; gap:10px; margin-top:12px;">
          <button id="saveSettingsBtn">Save settings</button>
          <button id="reloadBtn" class="secondary">Reload</button>
        </div>
        <p id="saveStatus" class="muted"></p>
      </section>

      <section class="card">
        <h2>Add application</h2>
        <form id="appForm" class="form-grid">
          <input class="full" id="vacancyTitle" placeholder="Vacancy title *" required />
          <input id="companyName" placeholder="Company name" />
          <select id="source">
            <option value="">Source</option>
            <option value="headhunter">HeadHunter</option>
            <option value="linkedin">LinkedIn</option>
            <option value="indeed">Indeed</option>
            <option value="company_site">Company site</option>
            <option value="founder_email">Founder email</option>
            <option value="recruiter_email">Recruiter email</option>
          </select>
          <select id="status">
            <option value="applied">Applied</option>
            <option value="interview">Interview</option>
            <option value="rejected">Rejected</option>
            <option value="offer">Offer</option>
          </select>
          <textarea id="notes" class="full" placeholder="Notes (optional)"></textarea>
          <button class="full" type="submit">Add application</button>
        </form>
      </section>

      <section class="card">
        <h2>Applications</h2>
        <div id="appsList" class="apps"></div>
      </section>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      async function api(path, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
        if (tg?.initData) headers['x-init-data'] = tg.initData;
        const response = await fetch(path, { ...options, headers });
        if (!response.ok) {
          const errBody = await response.text();
          throw new Error(errBody || `Request failed: ${response.status}`);
        }
        return response.json();
      }

      function mapSettingsFromUI() {
        return {
          hhEnabled: document.getElementById('hhEnabled').checked,
          linkedInEnabled: document.getElementById('linkedInEnabled').checked,
          indeedEnabled: document.getElementById('indeedEnabled').checked,
          companySitesEnabled: document.getElementById('companySitesEnabled').checked,
          emailFoundersEnabled: document.getElementById('emailFoundersEnabled').checked,
          emailRecruitersEnabled: document.getElementById('emailRecruitersEnabled').checked,
        };
      }

      function applySettingsToUI(settings) {
        document.getElementById('hhEnabled').checked = !!settings.hhEnabled;
        document.getElementById('linkedInEnabled').checked = !!settings.linkedInEnabled;
        document.getElementById('indeedEnabled').checked = !!settings.indeedEnabled;
        document.getElementById('companySitesEnabled').checked = !!settings.companySitesEnabled;
        document.getElementById('emailFoundersEnabled').checked = !!settings.emailFoundersEnabled;
        document.getElementById('emailRecruitersEnabled').checked = !!settings.emailRecruitersEnabled;
      }

      function renderApplications(rows) {
        const list = document.getElementById('appsList');
        if (!rows.length) {
          list.innerHTML = '<p class="muted">No applications yet.</p>';
          return;
        }
        list.innerHTML = rows.map((row) => {
          const appliedAt = row.AppliedAt ? new Date(row.AppliedAt).toLocaleString() : '-';
          return `
            <article class="app-item">
              <div style="display:flex;justify-content:space-between;gap:10px;">
                <strong>${(row.VacancyTitle || '').replace(/</g, '&lt;')}</strong>
                <span class="pill">${(row.Status || 'applied').replace(/</g, '&lt;')}</span>
              </div>
              <div class="muted" style="margin-top:6px;">${(row.CompanyName || 'Unknown company').replace(/</g, '&lt;')}</div>
              <div class="muted" style="margin-top:4px;">Source: ${(row.Source || '-').replace(/</g, '&lt;')}</div>
              <div class="muted" style="margin-top:4px;">Applied: ${appliedAt}</div>
              ${row.Notes ? `<div style="margin-top:8px;">${String(row.Notes).replace(/</g, '&lt;')}</div>` : ''}
            </article>
          `;
        }).join('');
      }

      async function loadProfileAndApps() {
        const profile = await api('/api/app/profile');
        document.getElementById('profileUser').textContent = profile.telegramUserName ? `@${profile.telegramUserName}` : '(no username)';
        document.getElementById('profileChatId').textContent = profile.telegramChatId;
        applySettingsToUI(profile.settings || {});

        const apps = await api('/api/app/applications?limit=30&offset=0');
        renderApplications(apps);
      }

      document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
        const statusEl = document.getElementById('saveStatus');
        statusEl.textContent = 'Saving...';
        try {
          const payload = mapSettingsFromUI();
          await api('/api/app/profile/settings', { method: 'PATCH', body: JSON.stringify(payload) });
          statusEl.textContent = 'Saved';
          statusEl.className = 'ok';
        } catch (err) {
          statusEl.textContent = `Failed: ${err.message}`;
          statusEl.className = 'muted';
        }
      });

      document.getElementById('reloadBtn').addEventListener('click', () => {
        loadProfileAndApps().catch((err) => alert(err.message));
      });

      document.getElementById('appForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = {
          vacancyTitle: document.getElementById('vacancyTitle').value.trim(),
          companyName: document.getElementById('companyName').value.trim(),
          source: document.getElementById('source').value || null,
          status: document.getElementById('status').value || 'applied',
          notes: document.getElementById('notes').value.trim(),
        };
        if (!payload.vacancyTitle) return;
        await api('/api/app/applications', { method: 'POST', body: JSON.stringify(payload) });
        event.target.reset();
        await loadProfileAndApps();
      });

      loadProfileAndApps().catch((err) => {
        alert(`Failed to initialize mini app: ${err.message}`);
      });
    </script>
  </body>
</html>
