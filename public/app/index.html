<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Agent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <script>
      (function bootstrapMiniAppStartParamRedirect() {
        const tg = window.Telegram?.WebApp;
        if (tg) tg.ready();

        const fallbackUrl = '/app/applications';
        const params = new URLSearchParams(window.location.search);
        const directStartApp = params.get('startapp') || params.get('startApp') || '';
        const initStartParam = tg?.initDataUnsafe?.start_param || '';
        const rawStart = String(initStartParam || directStartApp || '').trim();

        if (!rawStart) {
          window.location.replace(fallbackUrl);
          return;
        }

        if (rawStart.startsWith('search__')) {
          let rawQ = rawStart.slice('search__'.length).trim();
          if (!rawQ) {
            window.location.replace(fallbackUrl);
            return;
          }

          try {
            rawQ = decodeURIComponent(rawQ);
          } catch {
            // Keep token as-is when already decoded.
          }

          const targetUrl = `https://screenly.work/JobSearch/Search?q=${encodeURIComponent(rawQ)}`;
          window.location.replace(targetUrl);
          return;
        }

        if (rawStart.startsWith('seekerjobs__')) {
          let rawQuery = rawStart.slice('seekerjobs__'.length).trim();
          try {
            rawQuery = decodeURIComponent(rawQuery);
          } catch {
            // Keep payload as-is when already decoded.
          }

          // Telegram splits `startapp` at the first `&`, so e.g.
          // ?startapp=seekerjobs__from=2026-03-17&to=2026-04-15&skillIds=9,72
          // yields startapp=seekerjobs__from=2026-03-17 only — merge all other query keys.
          const allowedKeys = [
            'from',
            'to',
            'skillIds',
            'sourceIds',
            'page',
            'pageSize',
            'showOnlyHighlyRelevant',
            'jobId',
          ];
          const merged = new Map();
          const inner = new URLSearchParams(rawQuery.startsWith('?') ? rawQuery.slice(1) : rawQuery);
          allowedKeys.forEach((key) => {
            const v = String(inner.get(key) || '').trim();
            if (v) merged.set(key, v);
          });
          for (const [key, value] of params.entries()) {
            if (key === 'startapp' || key === 'startApp') continue;
            if (!allowedKeys.includes(key)) continue;
            const v = String(value || '').trim();
            if (v) merged.set(key, v);
          }
          const nextParts = [];
          allowedKeys.forEach((key) => {
            if (merged.has(key)) nextParts.push(`${encodeURIComponent(key)}=${encodeURIComponent(merged.get(key))}`);
          });
          const targetUrl = nextParts.length ? `/app/seeker-jobs?${nextParts.join('&')}` : '/app/seeker-jobs';
          window.location.replace(targetUrl);
          return;
        }

        window.location.replace(fallbackUrl);
      })();
    </script>
  </body>
</html>
