    <script>
      (function bootstrapMiniAppStartParamRedirect() {
        const tg = window.Telegram?.WebApp;
        if (tg) tg.ready();

        const fallbackUrl = '/app/applications';
        const params = new URLSearchParams(window.location.search);
        const directStartApp = params.get('startapp') || params.get('startApp') || '';
        const initStartParam = tg?.initDataUnsafe?.start_param || '';
        const rawStart = String(initStartParam || directStartApp || '').trim();

        if (!rawStart) {
          window.location.replace(fallbackUrl);
          return;
        }

        if (rawStart.startsWith('search__')) {
          let rawQ = rawStart.slice('search__'.length).trim();
          if (!rawQ) {
            window.location.replace(fallbackUrl);
            return;
          }

          try {
            rawQ = decodeURIComponent(rawQ);
          } catch {
            // Keep token as-is when already decoded.
          }

          const targetUrl = `https://anyhires.com/JobSearch/Search?q=${encodeURIComponent(rawQ)}`;
          window.location.replace(targetUrl);
          return;
        }

        if (rawStart.startsWith('seekerjobs__')) {
          let rawQuery = rawStart.slice('seekerjobs__'.length).trim().replace(/^_+/, '');
          try {
            rawQuery = decodeURIComponent(rawQuery);
          } catch {
            // Keep payload as-is when already decoded.
          }

          const allowedKeys = [
            'from',
            'to',
            'skillIds',
            'sourceIds',
            'page',
            'pageSize',
            'showOnlyHighlyRelevant',
            'jobId',
          ];
          const hashFrag = window.location.hash || '';

          function decodeBase64UrlToUtf8(b64) {
            let s = String(b64).trim().replace(/-/g, '+').replace(/_/g, '/');
            const padLen = (4 - (s.length % 4)) % 4;
            s += '='.repeat(padLen);
            const bin = atob(s);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i += 1) bytes[i] = bin.charCodeAt(i);
            return new TextDecoder('utf-8', { fatal: true }).decode(bytes);
          }

          function innerParamsFromSeekerPayload(raw) {
            let r = String(raw || '').trim();
            if (!r) return new URLSearchParams();
            const tryParse = (s) => new URLSearchParams(String(s).startsWith('?') ? String(s).slice(1) : String(s));
            const keys = allowedKeys.concat(['skillId']);
            const hasAny = (sp) => keys.some((k) => String(sp.get(k) || '').trim());
            const direct = tryParse(r);
            if (hasAny(direct)) return direct;
            try {
              const decoded = decodeBase64UrlToUtf8(r);
              const inner = tryParse(decoded);
              if (hasAny(inner)) return inner;
            } catch (e) {
              // not base64utf8 query
            }
            return new URLSearchParams();
          }

          const inner = innerParamsFromSeekerPayload(rawQuery);
          const keysCheck = allowedKeys.concat(['skillId']);
          const hasStructured = keysCheck.some((k) => String(inner.get(k) || '').trim());

          if (!hasStructured) {
            const targetUrl = '/app/seeker-jobs-deeplink?q=' + encodeURIComponent(rawQuery);
            window.location.replace(targetUrl + hashFrag);
            return;
          }

          // Telegram splits `startapp` at the first `&`, so merge other query keys.
          const merged = new Map();
          allowedKeys.forEach((key) => {
            const v = String(inner.get(key) || '').trim();
            if (v) merged.set(key, v);
          });
          for (const [key, value] of params.entries()) {
            if (key === 'startapp' || key === 'startApp') continue;
            if (!allowedKeys.includes(key)) continue;
            const v = String(value || '').trim();
            if (v) merged.set(key, v);
          }
          const nextParts = [];
          allowedKeys.forEach((key) => {
            if (merged.has(key)) nextParts.push(`${encodeURIComponent(key)}=${encodeURIComponent(merged.get(key))}`);
          });
          const targetUrl = nextParts.length ? `/app/seeker-jobs-deeplink?${nextParts.join('&')}` : '/app/seeker-jobs-deeplink';
          window.location.replace(targetUrl + hashFrag);
          return;
        }

        window.location.replace(fallbackUrl);
      })();
    </script>
