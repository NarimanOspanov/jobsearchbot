<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stat2 Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
      :root {
        --bg: #0d1222;
        --card: #151b30;
        --text: #eaf0ff;
        --muted: #9eb0d1;
        --accent: #4f7cff;
        --border: #273357;
        --bad: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }
      h1, h2, h3 { margin: 0; }
      .muted { color: var(--muted); }
      .bad { color: var(--bad); }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      select, button {
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0f1730;
        color: var(--text);
        padding: 8px 10px;
        font: inherit;
      }
      button {
        border-color: var(--accent);
        background: var(--accent);
        cursor: pointer;
        font-weight: 600;
      }
      .metrics {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
      .metric-title {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }
      .metric-value {
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
      }
      .metric-card {
        cursor: pointer;
        transition: transform 0.15s ease, border-color 0.15s ease;
      }
      .metric-card:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(5, 10, 20, 0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 16px;
      }
      .modal {
        width: min(980px, 100%);
        max-height: 85vh;
        overflow: hidden;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
      }
      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }
      .modal-body {
        overflow: auto;
        padding: 8px 12px 14px;
      }
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th,
      .table td {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(158, 176, 209, 0.2);
        font-size: 13px;
      }
      .table th {
        color: var(--muted);
        font-weight: 600;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #chartWrap {
        min-height: 320px;
      }
      canvas {
        width: 100%;
        max-height: 420px;
      }
    </style>

  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>Stat2</h1>
        <p class="muted" style="margin:8px 0 0;">Users, invites, payments, required channel joins, and job detail opens by period.</p>
      </section>

      <section class="card">
        <div class="toolbar">
          <label class="muted">
            Period (days):
            <select id="periodSel">
              <option value="1">1</option>
              <option value="7">7</option>
              <option value="30">30</option>
              <option value="90">90</option>
            </select>
          </label>
          <button id="reloadBtn" type="button">Reload</button>
          <span id="msg" class="muted"></span>
        </div>
      </section>

      <section class="metrics">
        <article class="card metric-card" data-metric="usersJoined" data-title="Users joined (last 100)">
          <div class="metric-title">Users joined</div>
          <div id="usersJoined" class="metric-value">-</div>
        </article>
        <article class="card metric-card" data-metric="usersJoinedByInvite" data-title="Users joined by invite (last 100)">
          <div class="metric-title">Users joined by invite</div>
          <div id="usersJoinedByInvite" class="metric-value">-</div>
        </article>
        <article class="card metric-card" data-metric="payments" data-title="Payments (last 100)">
          <div class="metric-title">Payments</div>
          <div id="payments" class="metric-value">-</div>
        </article>
        <article class="card metric-card" data-metric="requiredChannelUsers" data-title="Required channel users (last 100)">
          <div class="metric-title">Required channel users</div>
          <div id="requiredChannelUsers" class="metric-value">-</div>
        </article>
        <article class="card metric-card" data-metric="jobDetailsOpens" data-title="Job details opens by user (top 100 in period)">
          <div class="metric-title">Job details opens</div>
          <div id="jobDetailsOpens" class="metric-value">-</div>
        </article>
      </section>

      <section id="chartWrap" class="card">
        <canvas id="trendChart"></canvas>
      </section>
    </div>
    <div id="metricModalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-head">
          <h3 id="metricModalTitle">Details</h3>
          <button id="metricModalClose" type="button">Close</button>
        </div>
        <div id="metricModalBody" class="modal-body">
          <p class="muted">Loading...</p>
        </div>
      </div>
    </div>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) tg.ready();

      const urlParams = new URLSearchParams(window.location.search);
      const periodFromUrl = String(urlParams.get('period') || '').trim();
      const devTelegramId = String(urlParams.get('devTelegramId') || '').trim();
      const chartCanvas = document.getElementById('trendChart');
      let trendChart = null;
      const metricModalBackdrop = document.getElementById('metricModalBackdrop');
      const metricModalTitle = document.getElementById('metricModalTitle');
      const metricModalBody = document.getElementById('metricModalBody');

      function toInt(value, fallback) {
        const parsed = Number.parseInt(String(value || ''), 10);
        if (!Number.isSafeInteger(parsed) || parsed <= 0) return fallback;
        return parsed;
      }

      function getInitDataString() {
        const fromSdk = String(tg?.initData || '').trim();
        if (fromSdk) return fromSdk;
        try {
          const q = new URLSearchParams(window.location.search);
          const raw = q.get('tgWebAppData');
          if (!raw) return '';
          try {
            return decodeURIComponent(String(raw).replace(/\+/g, '%20'));
          } catch {
            return String(raw);
          }
        } catch {
          return '';
        }
      }

      async function api(path) {
        const headers = { 'Content-Type': 'application/json' };
        const initData = getInitDataString();
        if (initData) {
          headers['x-init-data'] = initData;
          headers.Authorization = `tma ${initData}`;
        } else if (devTelegramId) {
          headers['x-dev-telegram-id'] = devTelegramId;
        }
        const response = await fetch(path, { headers });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload?.error || response.statusText || 'Request failed');
        }
        return payload;
      }

      function setMetric(id, value) {
        const el = document.getElementById(id);
        el.textContent = Number(value || 0).toLocaleString('en-US');
      }

      function esc(v) {
        return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function formatDateTime(value) {
        if (!value) return '-';
        const dt = new Date(value);
        if (Number.isNaN(dt.getTime())) return String(value);
        return dt.toLocaleString('en-GB', { hour12: false });
      }

      function openModal() {
        metricModalBackdrop.style.display = 'flex';
      }

      function closeModal() {
        metricModalBackdrop.style.display = 'none';
      }

      function renderMetricDetailsTable(metric, items) {
        if (!Array.isArray(items) || items.length === 0) {
          metricModalBody.innerHTML = '<p class="muted">No records found.</p>';
          return;
        }
        const withInvitedBy = metric === 'usersJoinedByInvite';
        const isJobDetailsOpens = metric === 'jobDetailsOpens';
        const rows = items.map((item) => {
          if (isJobDetailsOpens) {
            const userId = item?.userId ?? '-';
            const username = esc(item?.telegramUserName || '');
            const chatId = esc(item?.telegramChatId ?? '');
            const opens = Number(item?.numberOfJobDetailsOpens || 0).toLocaleString('en-US');
            return `
              <tr>
                <td class="mono">${esc(userId)}</td>
                <td>${username || '<span class="muted">—</span>'}</td>
                <td class="mono">${chatId || '<span class="muted">—</span>'}</td>
                <td class="mono">${opens}</td>
              </tr>
            `;
          }
          return `
            <tr>
              <td>${esc(item?.user || '-')}</td>
              <td class="mono">${formatDateTime(item?.datetime)}</td>
              ${withInvitedBy ? `<td>${esc(item?.invitedBy || '-')}</td>` : ''}
            </tr>
          `;
        }).join('');
        metricModalBody.innerHTML = `
          <table class="table">
            <thead>
              <tr>
                ${
                  isJobDetailsOpens
                    ? '<th>UserId</th><th>telegramUserName</th><th>TelegramChatId</th><th>NumberOfJobDetailsOpens</th>'
                    : `<th>User</th><th>DateTime</th>${withInvitedBy ? '<th>Invited by</th>' : ''}`
                }
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      async function openMetricDetails(metric, title) {
        metricModalTitle.textContent = title || 'Details';
        metricModalBody.innerHTML = '<p class="muted">Loading...</p>';
        openModal();
        try {
          const period = toInt(document.getElementById('periodSel').value, 7);
          const periodParam = metric === 'jobDetailsOpens' ? `&period=${encodeURIComponent(period)}` : '';
          const payload = await api(
            `/api/app/admin/stat2/details?metric=${encodeURIComponent(metric)}&limit=100${periodParam}`
          );
          renderMetricDetailsTable(metric, Array.isArray(payload?.items) ? payload.items : []);
        } catch (err) {
          metricModalBody.innerHTML = `<p class="bad">Failed to load details: ${err?.message || 'Unknown error'}</p>`;
        }
      }

      function renderTotals(totals) {
        setMetric('usersJoined', totals?.usersJoined || 0);
        setMetric('usersJoinedByInvite', totals?.usersJoinedByInvite || 0);
        setMetric('payments', totals?.payments || 0);
        setMetric('requiredChannelUsers', totals?.requiredChannelUsers || 0);
        setMetric('jobDetailsOpens', totals?.jobDetailsOpens || 0);
      }

      function renderChart(series) {
        const labels = Array.isArray(series) ? series.map((row) => String(row?.date || '').slice(5)) : [];
        const usersJoined = series.map((row) => Number(row?.usersJoined || 0));
        const usersJoinedByInvite = series.map((row) => Number(row?.usersJoinedByInvite || 0));
        const payments = series.map((row) => Number(row?.payments || 0));
        const requiredChannelUsers = series.map((row) => Number(row?.requiredChannelUsers || 0));
        const jobDetailsOpens = series.map((row) => Number(row?.jobDetailsOpens || 0));
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(chartCanvas, {
          type: 'line',
          data: {
            labels,
            datasets: [
              { label: 'Users joined', data: usersJoined, borderColor: '#4f7cff', backgroundColor: 'rgba(79,124,255,0.2)', tension: 0.2 },
              { label: 'Users joined by invite', data: usersJoinedByInvite, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.2)', tension: 0.2 },
              { label: 'Payments', data: payments, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.2)', tension: 0.2 },
              { label: 'Required channel users', data: requiredChannelUsers, borderColor: '#e879f9', backgroundColor: 'rgba(232,121,249,0.2)', tension: 0.2 },
              { label: 'Job details opens', data: jobDetailsOpens, borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.2)', tension: 0.2 },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { labels: { color: '#eaf0ff' } },
              tooltip: { mode: 'index', intersect: false },
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            scales: {
              x: { ticks: { color: '#9eb0d1' }, grid: { color: 'rgba(158,176,209,0.15)' } },
              y: { beginAtZero: true, ticks: { precision: 0, color: '#9eb0d1' }, grid: { color: 'rgba(158,176,209,0.15)' } },
            },
          },
        });
      }

      async function load() {
        const msg = document.getElementById('msg');
        msg.className = 'muted';
        msg.textContent = 'Loading...';
        const period = toInt(document.getElementById('periodSel').value, 7);
        try {
          const payload = await api(`/api/app/admin/stat2?period=${encodeURIComponent(period)}`);
          renderTotals(payload?.totals || {});
          renderChart(Array.isArray(payload?.series) ? payload.series : []);
          msg.textContent = `Updated for ${period} day(s)`;
          const current = new URL(window.location.href);
          current.searchParams.set('period', String(period));
          window.history.replaceState(null, '', current.toString());
        } catch (err) {
          msg.className = 'bad';
          msg.textContent = `Failed to load: ${err?.message || 'Unknown error'}`;
        }
      }

      const periodSel = document.getElementById('periodSel');
      periodSel.value = String(toInt(periodFromUrl, 7));
      document.getElementById('reloadBtn').addEventListener('click', load);
      periodSel.addEventListener('change', load);
      document.getElementById('metricModalClose').addEventListener('click', closeModal);
      metricModalBackdrop.addEventListener('click', (event) => {
        if (event.target === metricModalBackdrop) closeModal();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeModal();
      });
      document.querySelectorAll('.metric-card[data-metric]').forEach((card) => {
        card.addEventListener('click', () => {
          const metric = String(card.dataset.metric || '').trim();
          const title = String(card.dataset.title || 'Details').trim();
          if (!metric) return;
          openMetricDetails(metric, title);
        });
      });
      load();
    </script>
  </body>
</html>
